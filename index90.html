<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Marvalous Bingo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:
radial-gradient(circle at top,#42006f 0%,#150022 45%,#050008 100%);
color:white;
overflow-x:hidden;
padding:14px;
}

.container{
width:100%;
max-width:900px;
margin:auto;
}

/* LOGO */

.logo{
text-align:center;
margin-bottom:18px;
}

.logo h1{
font-size:42px;
font-weight:900;
line-height:1;
color:white;
text-shadow:
0 0 10px #ff4df2,
0 0 30px #ff4df2;
}

.logo p{
margin-top:8px;
font-size:12px;
letter-spacing:6px;
color:#4ffcff;
}

/* STREAM */

.streamWrap{
border:3px solid #b84dff;
border-radius:24px;
padding:8px;
background:#12071f;
box-shadow:0 0 25px rgba(255,0,255,.35);
margin-bottom:18px;
}

.streamBox{
width:100%;
aspect-ratio:16/9;
overflow:hidden;
border-radius:18px;
background:black;
}

.streamBox iframe{
width:100%;
height:100%;
border:none;
}

/* CHAT */

.chatWrap{
border:3px solid #b84dff;
border-radius:24px;
padding:14px;
background:#1b1233;
box-shadow:0 0 20px rgba(255,0,255,.18);
margin-bottom:25px;
}

.messages{
height:130px;
overflow-y:auto;
background:#090014;
border-radius:16px;
padding:14px;
margin-bottom:12px;
text-align:left;
}

.msg{
margin-bottom:10px;
font-size:18px;
}

.msg b{
color:#4ffcff;
}

.chatInputs{
display:flex;
gap:10px;
}

.chatInputs input{
flex:1;
height:52px;
border:none;
border-radius:14px;
background:#0b0115;
padding:0 14px;
color:white;
font-size:16px;
outline:none;
}

.sendBtn{
width:95px;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#c84dff,#ff4df2);
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
}

/* CURRENT NUMBER */

.numberWrap{
text-align:center;
margin-bottom:25px;
}

#currentNumber{
font-size:92px;
font-weight:900;
line-height:1;
color:white;
text-shadow:
0 0 12px #ff4df2,
0 0 35px #ff4df2;
}

#mode{
font-size:20px;
margin-top:10px;
color:#4ffcff;
font-weight:600;
}

/* TICKETS */

#tickets{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
margin-bottom:25px;
}

.ticket{
background:#090014;
border:3px solid #b84dff;
border-radius:18px;
overflow:hidden;
box-shadow:0 0 15px rgba(255,0,255,.18);
}

.ticketGrid{
display:grid;
grid-template-columns:repeat(9,1fr);
}

.cell{
aspect-ratio:1/1;
border-right:1px solid #7a25b9;
border-bottom:1px solid #7a25b9;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:600;
background:#090014;
}

.cell:nth-child(9n){
border-right:none;
}

.cell:nth-last-child(-n+9){
border-bottom:none;
}

.blank{
background:#12071f;
color:transparent;
}

.marked{
background:
linear-gradient(45deg,#00ffe1,#3cf7ff);
color:black;
font-weight:900;
box-shadow:
0 0 12px #00ffe1,
inset 0 0 10px rgba(255,255,255,.5);
}

/* CALLED BOARD */

#calledBoard{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:6px;
margin-bottom:28px;
}

.calledNum{
background:#1b1233;
border-radius:10px;
height:48px;
display:flex;
align-items:center;
justify-content:center;
font-size:15px;
color:#d7d7d7;
}

.calledActive{
background:#ff4df2;
color:white;
font-weight:700;
}

.latest{
background:#28ffe7 !important;
color:black !important;
font-weight:900;
box-shadow:0 0 15px #28ffe7;
}

/* BINGO BUTTON */

.bingoBtn{
display:block;
margin:0 auto 40px auto;
width:260px;
height:78px;
border:none;
border-radius:24px;
background:
linear-gradient(45deg,#22f7e7,#4ffcff);
font-size:28px;
font-weight:900;
color:black;
box-shadow:
0 0 20px #28ffe7;
cursor:pointer;
}

/* MOBILE */

@media(max-width:700px){

.logo h1{
font-size:28px;
}

.logo p{
font-size:9px;
letter-spacing:4px;
}

.messages{
height:110px;
}

.msg{
font-size:15px;
}

.chatInputs{
gap:6px;
}

.chatInputs input{
height:44px;
font-size:14px;
}

.sendBtn{
width:72px;
font-size:14px;
}

#currentNumber{
font-size:82px;
}

#mode{
font-size:16px;
}

#tickets{
grid-template-columns:1fr;
gap:14px;
}

.cell{
font-size:15px;
}

#calledBoard{
gap:4px;
}

.calledNum{
height:34px;
font-size:11px;
}

.bingoBtn{
width:170px;
height:58px;
font-size:20px;
border-radius:18px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<h1>MARVALOUS BINGO</h1>
<p>REAL PEOPLE • REAL WINNERS</p>
</div>

<div class="streamWrap">

<div class="streamBox">

<iframe
src="https://player.twitch.tv/?channel=marvalouscomps&parent=bingo.netlify.app"
allowfullscreen>
</iframe>

</div>

</div>

<div class="chatWrap">

<div class="messages" id="messages"></div>

<div class="chatInputs">

<input id="name" placeholder="Name">

<input id="msg" placeholder="Type message...">

<button class="sendBtn" onclick="sendMsg()">
Send
</button>

</div>

</div>

<div class="numberWrap">

<div id="currentNumber">-</div>

<div id="mode">Mode: 1 LINE</div>

</div>

<div id="tickets"></div>

<div id="calledBoard"></div>

<button class="bingoBtn" onclick="checkBingo()">
BINGO
</button>

</div>

<script>

const firebaseConfig={
 apiKey:"AIzaSyD-4DJXkJUhgxA4RBJoWnvDKtwpzx69eQQ",
 databaseURL:"https://marvalous-bingo-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let playerName=localStorage.getItem('playerName')||'Player';

let playerId=localStorage.getItem('playerId');

if(!playerId){

 playerId=Date.now().toString();

 localStorage.setItem('playerId',playerId);

}

function generateTicket(){

const ranges=[
[1,9],[10,19],[20,29],[30,39],[40,49],
[50,59],[60,69],[70,79],[80,90]
];

let ticket=[
["","","","","","","","",""],
["","","","","","","","",""],
["","","","","","","","",""]
];

let used=new Set();

for(let row=0;row<3;row++){

let cols=[];

while(cols.length<5){

let col=Math.floor(Math.random()*9);

if(!cols.includes(col)) cols.push(col);

}

cols.sort((a,b)=>a-b);

cols.forEach(col=>{

let min=ranges[col][0];
let max=ranges[col][1];

let num;

do{
num=Math.floor(Math.random()*(max-min+1))+min;
}
while(used.has(num));

used.add(num);

ticket[row][col]=num;

});

}

for(let col=0;col<9;col++){

let nums=[];

for(let row=0;row<3;row++){

if(ticket[row][col]!=="") nums.push(ticket[row][col]);

}

nums.sort((a,b)=>a-b);

let i=0;

for(let row=0;row<3;row++){

if(ticket[row][col]!==""){

ticket[row][col]=nums[i];
i++;

}

}

}

return ticket;

}

let savedCards=localStorage.getItem('cards');

let cards=savedCards
?JSON.parse(savedCards)
:[
generateTicket(),
generateTicket(),
generateTicket(),
generateTicket()
];

localStorage.setItem('cards',JSON.stringify(cards));

function renderBoards(){

const wrap=document.getElementById('tickets');

wrap.innerHTML='';

cards.forEach(ticket=>{

let board=document.createElement('div');

board.className='ticket';

let grid=document.createElement('div');

grid.className='ticketGrid';

ticket.flat().forEach(n=>{

let div=document.createElement('div');

if(n===''){

div.className='cell blank';

}
else{

div.className='cell';

div.innerText=n;

div.dataset.num=n;

}

grid.appendChild(div);

});

board.appendChild(grid);

wrap.appendChild(board);

});

}

renderBoards();

let currentGameId;

db.ref('gameId').on('value',snap=>{

let gameId=snap.val();

if(!gameId) return;

if(currentGameId!==gameId){

currentGameId=gameId;

let savedGame=localStorage.getItem('gameId');

if(savedGame!==String(gameId)){

cards=[
generateTicket(),
generateTicket(),
generateTicket(),
generateTicket()
];

localStorage.setItem('cards',JSON.stringify(cards));

localStorage.setItem('gameId',gameId);

location.reload();

}

db.ref('players/'+playerId).set({

name:playerName,
cards:cards

});

}

});

for(let i=1;i<=90;i++){

let div=document.createElement('div');

div.className='calledNum';

div.id='called-'+i;

div.innerText=i;

document.getElementById('calledBoard').appendChild(div);

}

let lastCalled=0;

db.ref('calledNumbers').on('value',snap=>{

const called=Object.values(snap.val()||{});

document.querySelectorAll('.cell').forEach(c=>{

c.classList.remove('marked');

});

called.forEach(num=>{

document.querySelectorAll('.cell').forEach(c=>{

if(c.dataset.num==num){

c.classList.add('marked');

}

});

});

document.querySelectorAll('.calledNum').forEach(c=>{

c.classList.remove('calledActive');
c.classList.remove('latest');

});

called.forEach(num=>{

let ball=document.getElementById('called-'+num);

if(ball){

ball.classList.add('calledActive');

}

});

let latest=called[called.length-1];

if(latest){

let latestBall=document.getElementById('called-'+latest);

if(latestBall){

latestBall.classList.add('latest');

}

}

});

db.ref('currentNumber').on('value',snap=>{

let num=snap.val();

if(!num) return;

document.getElementById('currentNumber').innerText=num;

if(lastCalled!==num){

lastCalled=num;

let speech=new SpeechSynthesisUtterance(num);

speech.rate=.9;

speechSynthesis.cancel();

speechSynthesis.speak(speech);

}

});

db.ref('mode').on('value',snap=>{

let mode=snap.val()||'1line';

document.getElementById('mode').innerText=
'Mode: '+(
mode==='1line'?'1 LINE':
mode==='2lines'?'2 LINES':'FULL HOUSE'
);

});

function checkBingo(){

db.ref('bingoClaims').push({

name:playerName,
time:Date.now()

});

db.ref('bingoSound').set(Date.now());

alert('🎉 Bingo claimed!');

}

function sendMsg(){

let name=document.getElementById('name').value||'Player';

let msg=document.getElementById('msg').value;

if(!msg) return;

localStorage.setItem('playerName',name);

db.ref('chat').push({

name:name,
message:msg

});

document.getElementById('msg').value='';

}

db.ref('chat').limitToLast(50).on('child_added',snap=>{

let d=snap.val();

let div=document.createElement('div');

div.className='msg';

div.innerHTML='<b>'+d.name+':</b> '+d.message;

let box=document.getElementById('messages');

box.appendChild(div);

box.scrollTop=box.scrollHeight;

});

const bingoAudio=new Audio(
'https://www.soundjay.com/human/cheering-01.mp3'
);

bingoAudio.volume=1;

document.body.addEventListener('click',()=>{

bingoAudio.play()
.then(()=>{

bingoAudio.pause();

bingoAudio.currentTime=0;

})
.catch(()=>{});

},{once:true});

db.ref('bingoSound').on('value',snap=>{

if(!snap.val()) return;

bingoAudio.currentTime=0;

bingoAudio.play().catch(()=>{});

});

</script>

</body>
</html>
