<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marvalous Bingo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
background:#090512;
font-family:'Poppins',sans-serif;
color:white;
height:100vh;
overflow:hidden;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at top,#8c2dff55,transparent 40%),
radial-gradient(circle at bottom,#ff4df222,transparent 40%);
z-index:-1;
}

.app{
max-width:430px;
height:100vh;
margin:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
overflow:hidden;
}

/* TOP */

.topBar{
display:grid;
grid-template-columns:60px 1fr 70px;
align-items:center;
}

.menu{
font-size:40px;
font-weight:700;
text-align:center;
}

.logo{
text-align:center;
line-height:0.9;
}

.logo h1{
font-size:24px;
font-weight:800;
text-shadow:
0 0 10px #ff4df2,
0 0 25px #ff4df2;
}

.sideInfo{
text-align:right;
font-size:12px;
font-weight:700;
}

/* MAIN AREA */

.mainArea{
display:flex;
align-items:center;
justify-content:center;
position:relative;
height:180px;
}

.stream{
position:absolute;
left:0;
top:50%;
transform:translateY(-50%);
width:82px;
height:82px;
border-radius:18px;
overflow:hidden;
border:3px solid #d94dff;
background:#120d28;
box-shadow:0 0 18px #d94dff;
}

.stream iframe{
width:100%;
height:100%;
border:none;
}

.ball{
width:170px;
height:170px;
border-radius:50%;
border:5px solid #ff4df2;
display:flex;
align-items:center;
justify-content:center;
font-size:72px;
font-weight:800;
background:radial-gradient(circle,#220833,#090512);
box-shadow:
0 0 20px #ff4df2,
0 0 50px #ff4df2;
}

/* RECENT NUMBERS */

.recent{
display:grid;
grid-template-columns:repeat(5,1fr);
border-radius:18px;
overflow:hidden;
border:2px solid #b84dff;
}

.recent div{
background:#120d28;
padding:10px 0;
text-align:center;
font-size:18px;
font-weight:700;
border-right:2px solid #b84dff;
}

.recent div:last-child{
border-right:none;
}

/* TICKET */

.ticketPanel{
background:#1b1034;
border:3px solid #b84dff;
border-radius:28px;
padding:12px;
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
}

.ticketHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
}

.arrow{
font-size:34px;
font-weight:700;
cursor:pointer;
user-select:none;
}

.ticketTitle{
font-size:24px;
font-weight:700;
}

.ticket{
background:#120d28;
border:2px solid #7d4dff;
border-radius:22px;
padding:10px;
}

.board{
display:grid;
grid-template-columns:repeat(9,1fr);
gap:4px;
}

.cell{
height:34px;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
font-weight:700;
background:#090512;
border-radius:8px;
}

.blank{
background:transparent;
}

.marked{
background:#48e7ff;
color:white;
box-shadow:0 0 12px #48e7ff;
}

/* BOTTOM */

.bottom{
display:grid;
grid-template-columns:1fr 140px;
gap:10px;
height:170px;
}

.chat{
background:#1b1034;
border:3px solid #7d4dff;
border-radius:24px;
padding:12px;
display:flex;
flex-direction:column;
}

.chat h2{
font-size:20px;
margin-bottom:6px;
}

.messages{
flex:1;
overflow-y:auto;
font-size:14px;
}

.messages div{
margin-bottom:6px;
}

.messages b{
color:#48e7ff;
}

.chat input{
width:100%;
padding:8px;
margin-top:6px;
background:#120d28;
border:2px solid #38255e;
border-radius:10px;
color:white;
font-size:13px;
outline:none;
}

.chat button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#b84dff,#ff4df2);
color:white;
font-weight:700;
font-size:16px;
}

.bingoBtn{
border:none;
border-radius:26px;
background:linear-gradient(45deg,#48f3ff,#29d9ff);
font-size:34px;
font-weight:800;
color:white;
box-shadow:0 0 20px #48e7ff;
}

/* MOBILE */

@media(max-width:400px){

.ball{
width:150px;
height:150px;
font-size:62px;
}

.cell{
height:30px;
font-size:14px;
}

.ticketTitle{
font-size:20px;
}

}

</style>
</head>

<body>

<div class="app">

<div class="topBar">

<div class="menu">☰</div>

<div class="logo">
<h1>MARVALOUS<br>BINGO</h1>
</div>

<div class="sideInfo">
2 LINES<br><br>
GAME 90
</div>

</div>

<div class="mainArea">

<div class="stream">
<iframe src="https://player.twitch.tv/?channel=marvalouscomps&parent=bingo.netlify.app&muted=true"></iframe>
</div>

<div class="ball" id="currentNumber">66</div>

</div>

<div class="recent" id="recentNumbers">
<div>24</div>
<div>74</div>
<div>19</div>
<div>27</div>
<div>45</div>
</div>

<div class="ticketPanel">

<div class="ticketHeader">

<div class="arrow" onclick="prevTicket()">‹</div>

<div class="ticketTitle">
Ticket <span id="ticketNum">1</span> / 4
</div>

<div class="arrow" onclick="nextTicket()">›</div>

</div>

<div class="ticket">

<div class="board" id="ticketBoard"></div>

</div>

</div>

<div class="bottom">

<div class="chat">

<h2>Live Chat</h2>

<div class="messages" id="messages"></div>

<input id="name" placeholder="Name">
<input id="msg" placeholder="Message...">

<button onclick="sendMsg()">Send</button>

</div>

<button class="bingoBtn" onclick="checkBingo()">
BINGO!
</button>

</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyD-4DJXkJUhgxA4RBJoWnvDKtwpzx69eQQ",
databaseURL:"https://marvalous-bingo-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let playerName=localStorage.getItem('playerName')||'Player';
let playerId=localStorage.getItem('playerId');

if(!playerId){
playerId=Date.now().toString();
localStorage.setItem('playerId',playerId);
}

if(localStorage.getItem('fixedCardsV7')!=="yes"){
localStorage.removeItem('cards');
localStorage.setItem('fixedCardsV7',"yes");
}

/* TICKET GENERATOR */

function generateTicket(){

const ranges=[
[1,9],[10,19],[20,29],[30,39],[40,49],
[50,59],[60,69],[70,79],[80,90]
];

let ticket=[
["","","","","","","","",""],
["","","","","","","","",""],
["","","","","","","","",""]
];

let used=new Set();

for(let row=0;row<3;row++){

let cols=[];

while(cols.length<5){

let col=Math.floor(Math.random()*9);

if(!cols.includes(col)) cols.push(col);

}

cols.sort((a,b)=>a-b);

cols.forEach(col=>{

let min=ranges[col][0];
let max=ranges[col][1];

let num;

do{
num=Math.floor(Math.random()*(max-min+1))+min;
}while(used.has(num));

used.add(num);

ticket[row][col]=num;

});

}

for(let col=0;col<9;col++){

let nums=[];

for(let row=0;row<3;row++){

if(ticket[row][col]!==""){
nums.push(ticket[row][col]);
}

}

nums.sort((a,b)=>a-b);

let i=0;

for(let row=0;row<3;row++){

if(ticket[row][col]!==""){

ticket[row][col]=nums[i];
i++;

}

}

}

return ticket;

}

/* LOAD */

let savedCards=localStorage.getItem('cards');

let cards=savedCards
?JSON.parse(savedCards)
:[
generateTicket(),
generateTicket(),
generateTicket(),
generateTicket()
];

localStorage.setItem('cards',JSON.stringify(cards));

let currentTicket=0;

function renderTicket(){

document.getElementById('ticketNum').innerText=currentTicket+1;

const board=document.getElementById('ticketBoard');

board.innerHTML='';

cards[currentTicket].flat().forEach(n=>{

let div=document.createElement('div');

if(n===''){

div.className='cell blank';

}else{

div.className='cell';
div.innerText=n;
div.dataset.num=n;

}

board.appendChild(div);

});

}

renderTicket();

function nextTicket(){

currentTicket++;

if(currentTicket>=cards.length){
currentTicket=0;
}

renderTicket();
markNumbers();

}

function prevTicket(){

currentTicket--;

if(currentTicket<0){
currentTicket=cards.length-1;
}

renderTicket();
markNumbers();

}

/* RESET SYSTEM */

let currentGameId;

db.ref('gameId').on('value',snap=>{

let gameId=snap.val();

if(!gameId) return;

if(currentGameId!==gameId){

currentGameId=gameId;

let savedGame=localStorage.getItem('gameId');

if(savedGame!==String(gameId)){

cards=[
generateTicket(),
generateTicket(),
generateTicket(),
generateTicket()
];

localStorage.setItem('cards',JSON.stringify(cards));
localStorage.setItem('gameId',gameId);

location.reload();

}

}

});

/* MARKING */

let calledNums=[];

function markNumbers(){

document.querySelectorAll('.cell').forEach(c=>{
c.classList.remove('marked');
});

calledNums.forEach(num=>{

document.querySelectorAll('.cell').forEach(c=>{

if(c.dataset.num==num){

c.classList.add('marked');

}

});

});

}

db.ref('calledNumbers').on('value',snap=>{

calledNums=Object.values(snap.val()||{});

markNumbers();

});

/* CURRENT NUMBER */

db.ref('currentNumber').on('value',snap=>{

let num=snap.val();

if(!num) return;

document.getElementById('currentNumber').innerText=num;

});

/* CHAT */

function sendMsg(){

let name=document.getElementById('name').value||'Player';

let msg=document.getElementById('msg').value;

if(!msg) return;

localStorage.setItem('playerName',name);

db.ref('chat').push({

name:name,
message:msg

});

document.getElementById('msg').value='';

}

db.ref('chat').limitToLast(25).on('child_added',snap=>{

let d=snap.val();

let div=document.createElement('div');

div.innerHTML='<b>'+d.name+':</b> '+d.message;

let box=document.getElementById('messages');

box.appendChild(div);

box.scrollTop=box.scrollHeight;

});

/* BINGO */

function checkBingo(){

db.ref('bingoClaims').push({

name:playerName,
time:Date.now()

});

alert('🎉 Bingo Claimed!');

}

</script>

</body>
</html>
