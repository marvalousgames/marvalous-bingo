<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marvalous Bingo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#090512;
font-family:'Poppins',sans-serif;
color:white;
overflow-y:auto;
overflow-x:hidden;
min-height:100vh;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at top,#8c2dff55,transparent 45%),
radial-gradient(circle at bottom,#ff4df222,transparent 40%);
z-index:-1;
}

.app{
display:flex;
flex-direction:column;
padding:8px;
gap:8px;
min-height:100vh;
padding-bottom:40px;
max-width:430px;
margin:auto;
}

/* TOP */

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
padding:5px 4px;
}

.menu{
font-size:42px;
font-weight:700;
width:50px;
text-align:center;
}

.logo{
text-align:center;
flex:1;
}

.logo h1{
font-size:30px;
line-height:0.9;
font-weight:800;
text-shadow:
0 0 10px #ff4df2,
0 0 25px #ff4df2;
}

.topInfo{
position:absolute;
right:10px;
top:105px;
text-align:right;
font-weight:700;
font-size:15px;
line-height:1.2;
}

/* BALL AREA */

.ballWrap{
display:flex;
justify-content:center;
align-items:center;
position:relative;
margin-top:-5px;
margin-bottom:4px;
}

.bigBall{
width:240px;
height:240px;
border-radius:50%;
border:6px solid #ff4df2;
display:flex;
align-items:center;
justify-content:center;
font-size:105px;
font-weight:800;
background:radial-gradient(circle,#2b1040,#090512);
box-shadow:
0 0 20px #ff4df2,
0 0 50px #ff4df2;
margin:auto;
}

.streamBtn{
position:absolute;
left:0;
top:50%;
transform:translateY(-50%);
width:85px;
height:85px;
border-radius:18px;
overflow:hidden;
border:3px solid #d94dff;
box-shadow:0 0 15px #d94dff;
background:#120d28;
}

.streamBtn iframe{
width:100%;
height:100%;
border:none;
pointer-events:none;
}

/* CALLED NUMBERS */

.calledStrip{
display:grid;
grid-template-columns:repeat(5,1fr);
border:3px solid #b84dff;
border-radius:18px;
overflow:hidden;
background:#120d28;
}

.calledCell{
padding:14px 0;
text-align:center;
font-size:22px;
font-weight:700;
border-right:2px solid #b84dff;
}

.calledCell:last-child{
border-right:none;
}

/* TICKETS */

.ticketSection{
background:#1a1033;
border:3px solid #b84dff;
border-radius:26px;
padding:12px;
}

.ticketHeader{
text-align:center;
font-size:24px;
font-weight:700;
margin-bottom:12px;
}

.ticketGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.ticket{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:4px;
background:#120d28;
padding:8px;
border-radius:18px;
border:2px solid #7d3cff;
box-shadow:
0 0 12px rgba(180,77,255,.25),
inset 0 0 10px rgba(255,255,255,.03);
}

.cell{
height:42px;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
font-weight:700;
background:#090512;
border-radius:8px;
}

.marked{
background:#45e7ff;
color:white;
box-shadow:0 0 14px #45e7ff;
}

/* BOTTOM AREA */

.bottomArea{
display:grid;
grid-template-columns:1.1fr .9fr;
gap:10px;
align-items:stretch;
}

.chatBox{
background:#1a1033;
border:3px solid #7f4dff;
border-radius:24px;
padding:14px;
display:flex;
flex-direction:column;
}

.chatTitle{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

#messages{
height:120px;
overflow-y:auto;
font-size:14px;
padding-right:5px;
}

.msg{
margin-bottom:8px;
}

.msg b{
color:#45e7ff;
}

#chat-input{
display:flex;
flex-direction:column;
gap:8px;
margin-top:10px;
}

#chat-input input{
width:100%;
padding:10px;
background:#120d28;
border:2px solid #3f2c66;
border-radius:12px;
color:white;
font-size:14px;
outline:none;
}

#chat-input button{
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#b84dff,#ff4df2);
color:white;
font-weight:700;
font-size:16px;
}

.bingoBtn{
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(45deg,#45f3ff,#27d9ff);
border-radius:24px;
font-size:42px;
font-weight:800;
color:white;
box-shadow:0 0 20px #45f3ff;
min-height:230px;
}

/* MOBILE */

@media(max-width:430px){

.bigBall{
width:220px;
height:220px;
font-size:90px;
}

.streamBtn{
width:75px;
height:75px;
}

.cell{
height:38px;
font-size:15px;
}

.calledCell{
font-size:20px;
}

.bingoBtn{
font-size:36px;
min-height:210px;
}

}

</style>
</head>

<body>

</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyD-4DJXkJUhgxA4RBJoWnvDKtwpzx69eQQ",
databaseURL:"https://marvalous-bingo-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

function checkBingo(){

db.ref('bingoClaims').push({
time:Date.now()
});

alert('🎉 Bingo Claimed!');

}

function sendMsg(){

let name=document.getElementById('name').value || 'Player';

let msg=document.getElementById('msg').value;

if(!msg) return;

db.ref('chat').push({
name:name,
message:msg
});

document.getElementById('msg').value='';

}

db.ref('chat').limitToLast(20).on('child_added',snap=>{

let d=snap.val();

let div=document.createElement('div');

div.className='msg';

div.innerHTML='<b>'+d.name+':</b> '+d.message;

let box=document.getElementById('messages');

box.appendChild(div);

box.scrollTop=box.scrollHeight;

});

db.ref('currentNumber').on('value',snap=>{

let num=snap.val();

if(!num) return;

document.getElementById('currentNumber').innerText=num;

});

db.ref('mode').on('value',snap=>{

let mode=snap.val() || '2lines';

let text=
mode==='1line'?'1 LINE':
mode==='2lines'?'2 LINES':
'FULL HOUSE';

document.getElementById('modeText').innerText=text;

});

</script>

</body>
</html>
