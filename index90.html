<!DOCTYPE html>
<html>
<head>
  <title>Marvalous Bingo 90</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>

    body{
      margin:0;
      background:#0e0b1f;
      color:white;
      font-family:'Poppins',sans-serif;
      text-align:center;
    }

    h1{
      color:#d94dff;
      margin-top:15px;
    }

    #video-container{
      width:95%;
      max-width:700px;
      height:320px;
      margin:15px auto;
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 0 25px rgba(217,77,255,.4);
      background:#1c1735;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
    }

    #chat-box{
      width:95%;
      max-width:700px;
      margin:15px auto;
      background:#1c1735;
      border-radius:16px;
      padding:10px;
    }

    #messages{
      height:180px;
      overflow-y:auto;
      text-align:left;
      padding:10px;
    }

    .msg{
      margin-bottom:6px;
    }

    .msg b{
      color:#00ffcc;
    }

    #chat-input{
      display:flex;
      gap:6px;
    }

    #chat-input input{
      flex:1;
      padding:10px;
      border:none;
      border-radius:8px;
    }

    #chat-input button{
      background:#d94dff;
      color:white;
      border:none;
      padding:10px 14px;
      border-radius:8px;
    }

    #currentNumber{
      font-size:70px;
      color:#ff4df2;
      font-weight:bold;
      margin-top:10px;
    }

    #mode{
      color:#00ffcc;
      margin-bottom:20px;
    }

    #tickets{
      width:95%;
      max-width:900px;
      margin:auto;
    }

    .ticket{
      display:grid;
      grid-template-columns:repeat(9,1fr);
      gap:2px;
      margin-bottom:18px;
      background:#b84dff;
      padding:3px;
      border-radius:12px;
    }

    .cell{
      background:#120d28;
      min-height:58px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      border-radius:4px;
    }

    .blank{
      background:#0b0818;
    }

    .marked{
      background:linear-gradient(45deg,#b84dff,#ff4df2);
      color:white;
      font-weight:bold;
      box-shadow:0 0 10px rgba(255,77,242,.6);
    }

    #calledBoard{
      width:95%;
      max-width:900px;
      margin:20px auto;
      display:grid;
      grid-template-columns:repeat(10,1fr);
      gap:5px;
    }

    .calledNum{
      background:#1c1735;
      padding:10px;
      border-radius:8px;
      font-size:14px;
    }

    .calledActive{
      background:#ff4df2;
    }

    .latest{
      background:#00ffcc !important;
      color:black;
    }

    button.main{
      background:#00ffcc;
      border:none;
      padding:14px 24px;
      border-radius:10px;
      font-weight:bold;
      margin:20px;
    }

  </style>
</head>

<body>

<h1>MARVALOUS BINGO</h1>

<div id="video-container">
  <iframe src="https://player.twitch.tv/?channel=marvalouscomps&parent=marvalous-bingo.netlify.app"></iframe>
</div>

<div id="chat-box">

  <div id="messages"></div>

  <div id="chat-input">
    <input id="name" placeholder="Name">
    <input id="msg" placeholder="Type message...">
    <button onclick="sendMsg()">Send</button>
  </div>

</div>

<div id="currentNumber">-</div>

<div id="mode">Mode: 1 LINE</div>

<div id="tickets"></div>

<div id="calledBoard"></div>

<button class="main" onclick="checkBingo()">BINGO</button>

<script>

const firebaseConfig={
 apiKey:"AIzaSyD-4DJXkJUhgxA4RBJoWnvDKtwpzx69eQQ",
 databaseURL:"https://marvalous-bingo-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let playerName=localStorage.getItem('playerName')||'Player';

let playerId=localStorage.getItem('playerId');

if(!playerId){

 playerId=Date.now().toString();

 localStorage.setItem('playerId',playerId);

}

/* PROPER 90 BALL GENERATOR */

function generateTicket(){

  const ranges = [
    [1,9],
    [10,19],
    [20,29],
    [30,39],
    [40,49],
    [50,59],
    [60,69],
    [70,79],
    [80,90]
  ];

  let ticket = [
    ["","","","","","","","",""],
    ["","","","","","","","",""],
    ["","","","","","","","",""]
  ];

  let usedNumbers = [];

  for(let col=0; col<9; col++){

    let row = Math.floor(Math.random()*3);

    let min = ranges[col][0];
    let max = ranges[col][1];

    let num;

    do{

      num = Math.floor(Math.random()*(max-min+1))+min;

    }while(usedNumbers.includes(num));

    usedNumbers.push(num);

    ticket[row][col] = num;

  }

  for(let row=0; row<3; row++){

    while(ticket[row].filter(x=>x!=="").length < 5){

      let col = Math.floor(Math.random()*9);

      if(ticket[row][col] !== "") continue;

      let min = ranges[col][0];
      let max = ranges[col][1];

      let num;

      do{

        num = Math.floor(Math.random()*(max-min+1))+min;

      }while(usedNumbers.includes(num));

      usedNumbers.push(num);

      ticket[row][col] = num;

    }

  }

  for(let col=0; col<9; col++){

    let nums = [];

    for(let row=0; row<3; row++){

      if(ticket[row][col] !== ""){

        nums.push(ticket[row][col]);

      }

    }

    nums.sort((a,b)=>a-b);

    let i = 0;

    for(let row=0; row<3; row++){

      if(ticket[row][col] !== ""){

        ticket[row][col] = nums[i];

        i++;

      }

    }

  }

  return ticket;

}

/* LOAD CARDS */

let savedCards=localStorage.getItem('cards');

let cards=savedCards
?JSON.parse(savedCards)
:[generateTicket(),generateTicket(),generateTicket()];

/* RENDER */

function renderBoards(){

 const wrap=document.getElementById('tickets');

 wrap.innerHTML='';

 cards.forEach(ticket=>{

  let board=document.createElement('div');

  board.className='ticket';

  ticket.flat().forEach(n=>{

   let div=document.createElement('div');

   if(n===''){

    div.className='cell blank';

   }else{

    div.className='cell';

    div.innerText=n;

    div.dataset.num=n;

   }

   board.appendChild(div);

  });

  wrap.appendChild(board);

 });

}

renderBoards();

/* SAVE PLAYER */

let currentGameId;

db.ref('gameId').on('value',snap=>{

 let gameId=snap.val();

 if(!gameId) return;

 if(currentGameId!==gameId){

  currentGameId=gameId;

  let savedGame=localStorage.getItem('gameId');

  if(savedGame!==String(gameId)){

   cards=[
    generateTicket(),
    generateTicket(),
    generateTicket()
   ];

   localStorage.setItem('cards',JSON.stringify(cards));

   localStorage.setItem('gameId',gameId);

   location.reload();

  }

  db.ref('players/'+playerId).set({

   name:playerName,

   cards:cards

  });

 }

});

/* CALLED BOARD */

for(let i=1;i<=90;i++){

 let div=document.createElement('div');

 div.className='calledNum';

 div.id='called-'+i;

 div.innerText=i;

 document.getElementById('calledBoard').appendChild(div);

}

/* AUTO MARK */

let lastCalled=0;

db.ref('calledNumbers').on('value',snap=>{

 const called=Object.values(snap.val()||{});

 document.querySelectorAll('.cell').forEach(c=>{

  c.classList.remove('marked');

 });

 called.forEach(num=>{

  document.querySelectorAll('.cell').forEach(c=>{

   if(c.dataset.num==num){

    c.classList.add('marked');

   }

  });

 });

 document.querySelectorAll('.calledNum').forEach(c=>{

  c.classList.remove('calledActive');

  c.classList.remove('latest');

 });

 called.forEach(num=>{

  let ball=document.getElementById('called-'+num);

  if(ball){

   ball.classList.add('calledActive');

  }

 });

 let latest=called[called.length-1];

 if(latest){

  let latestBall=document.getElementById('called-'+latest);

  if(latestBall){

   latestBall.classList.add('latest');

  }

 }

});

/* CURRENT NUMBER */

db.ref('currentNumber').on('value',snap=>{

 let num=snap.val();

 if(!num) return;

 document.getElementById('currentNumber').innerText=num;

 if(lastCalled!==num){

  lastCalled=num;

  let speech=new SpeechSynthesisUtterance(num);

  speech.rate=.9;

  speechSynthesis.cancel();

  speechSynthesis.speak(speech);

 }

});

/* MODE */

db.ref('mode').on('value',snap=>{

 let mode=snap.val()||'1line';

 document.getElementById('mode').innerText=
 'Mode: '+(
  mode==='1line'?'1 LINE':
  mode==='2lines'?'2 LINES':'FULL HOUSE'
 );

});

/* BINGO */

function checkBingo(){

 db.ref('bingoClaims').push({

  name:playerName,

  time:Date.now()

 });

 db.ref('bingoSound').set(Date.now());

 alert('🎉 Bingo claimed!');

}

/* CHAT */

function sendMsg(){

 let name=document.getElementById('name').value||'Player';

 let msg=document.getElementById('msg').value;

 if(!msg) return;

 localStorage.setItem('playerName',name);

 db.ref('chat').push({

  name:name,

  message:msg

 });

 document.getElementById('msg').value='';

}

db.ref('chat').limitToLast(50).on('child_added',snap=>{

 let d=snap.val();

 let div=document.createElement('div');

 div.className='msg';

 div.innerHTML='<b>'+d.name+':</b> '+d.message;

 let box=document.getElementById('messages');

 box.appendChild(div);

 box.scrollTop=box.scrollHeight;

});

/* SOUND */

const bingoAudio=new Audio(
 'https://www.soundjay.com/human/cheering-01.mp3'
);

bingoAudio.volume=1;

document.body.addEventListener('click',()=>{

 bingoAudio.play()
 .then(()=>{

  bingoAudio.pause();

  bingoAudio.currentTime=0;

 })
 .catch(()=>{});

},{once:true});

db.ref('bingoSound').on('value',snap=>{

 if(!snap.val()) return;

 bingoAudio.currentTime=0;

 bingoAudio.play().catch(()=>{});

});

</script>

</body>
</html>
