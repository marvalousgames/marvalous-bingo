<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marvalous Bingo 90</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#090512;
font-family:'Poppins',sans-serif;
color:white;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at top,#8c2dff44,transparent 40%),
radial-gradient(circle at bottom,#ff4df222,transparent 35%);
z-index:-1;
}

.container{
width:95%;
max-width:900px;
margin:auto;
padding:18px 0 50px;
}

/* TITLE */

h1{
text-align:center;
font-size:42px;
margin:10px 0 5px;
font-weight:800;
color:white;
text-shadow:
0 0 10px #ff4df2,
0 0 30px #ff4df2,
0 0 50px #8c2dff;
}

.subTitle{
text-align:center;
color:#00ffcc;
font-size:12px;
letter-spacing:3px;
margin-bottom:20px;
}

/* PANELS */

.panel{
background:#1c1735;
border:2px solid #b84dff;
border-radius:22px;
padding:16px;
margin-bottom:20px;
box-shadow:
0 0 25px rgba(184,77,255,.25),
inset 0 0 15px rgba(255,255,255,.03);
}

.panelTitle{
text-align:center;
font-size:20px;
font-weight:700;
margin-bottom:14px;
}

/* STREAM */

#video-container{
width:100%;
height:240px;
border-radius:16px;
overflow:hidden;
border:2px solid #d94dff;
background:#120d28;
}

iframe{
width:100%;
height:100%;
border:none;
}

/* NUMBER */

.numberWrap{
margin-top:18px;
background:#120d28;
border:2px solid #d94dff;
border-radius:20px;
padding:20px;
text-align:center;
position:relative;
overflow:hidden;
}

.numberWrap::before{
content:'';
position:absolute;
width:400px;
height:400px;
background:radial-gradient(circle,#ff4df233,transparent 70%);
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

#currentNumber{
position:relative;
z-index:2;
font-size:110px;
font-weight:900;
line-height:1;
color:white;
text-shadow:
0 0 15px #ff4df2,
0 0 35px #ff4df2,
0 0 60px #8c2dff;
}

#mode{
position:relative;
z-index:2;
color:#00ffcc;
font-size:18px;
font-weight:700;
margin-top:10px;
}

/* BUTTON */

.mainButton{
width:100%;
margin-top:18px;
padding:18px;
border:none;
border-radius:16px;
background:linear-gradient(45deg,#00ffcc,#00d9ff);
font-size:22px;
font-weight:800;
color:black;
cursor:pointer;
box-shadow:0 0 20px rgba(0,255,204,.5);
}

/* CHAT */

#messages{
height:170px;
overflow-y:auto;
background:#120d28;
border:1px solid #31245f;
border-radius:12px;
padding:12px;
margin-bottom:10px;
}

.msg{
margin-bottom:8px;
font-size:14px;
}

.msg b{
color:#00ffcc;
}

#chat-input{
display:flex;
gap:6px;
}

#chat-input input{
flex:1;
padding:12px;
background:#120d28;
border:1px solid #44336f;
border-radius:10px;
color:white;
outline:none;
}

#chat-input button{
padding:0 18px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#b84dff,#ff4df2);
color:white;
font-weight:700;
}

/* TICKETS */

#tickets{
display:flex;
flex-direction:column;
gap:16px;
}

.ticket{
display:grid;
grid-template-columns:repeat(9,1fr);
gap:2px;
background:#d94dff;
padding:3px;
border-radius:14px;
overflow:hidden;
}

.cell{
min-height:50px;
display:flex;
align-items:center;
justify-content:center;
background:#120d28;
font-size:18px;
font-weight:600;
}

.blank{
background:#0b0818;
}

.marked{
background:linear-gradient(45deg,#b84dff,#ff4df2);
font-weight:800;
box-shadow:0 0 12px rgba(255,77,242,.7);
}

/* INFO */

.infoGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.infoCard{
background:#1c1735;
border:2px solid #b84dff;
border-radius:16px;
padding:14px;
text-align:center;
}

.infoCard h3{
margin:0;
font-size:12px;
color:#00ffcc;
letter-spacing:1px;
}

.infoCard p{
margin:8px 0 0;
font-size:24px;
font-weight:800;
}

/* MOBILE */

@media(max-width:700px){

h1{
font-size:34px;
}

#currentNumber{
font-size:82px;
}

.cell{
min-height:38px;
font-size:15px;
}

}

</style>
</head>

<body>
  <h1 style="color:red;font-size:60px;">TEST VERSION</h1>

<div class="container">

<h1>MARVALOUS BINGO</h1>

<div class="subTitle">
REAL PEOPLE • REAL WINNERS
</div>

<!-- STREAM FIRST -->

<div class="panel">

<div id="video-container">
<iframe src="https://player.twitch.tv/?channel=marvalouscomps&parent=marvalous-bingo.netlify.app"></iframe>
</div>

<div class="numberWrap">

<div id="currentNumber">-</div>

<div id="mode">Mode: 1 LINE</div>

</div>

<button class="mainButton" onclick="checkBingo()">
🎉 BINGO 🎉
</button>

<!-- CHAT UNDER STREAM -->

<div class="panelTitle" style="margin-top:25px;">
LIVE CHAT
</div>

<div id="messages"></div>

<div id="chat-input">

<input id="name" placeholder="Name">

<input id="msg" placeholder="Type message...">

<button onclick="sendMsg()">Send</button>

</div>

</div>

<!-- TICKETS SECOND -->

<div class="panel">

<div class="panelTitle">
YOUR TICKETS
</div>

<div id="tickets"></div>

</div>

<!-- INFO LAST -->

<div class="infoGrid">

<div class="infoCard">
<h3>GAME MODE</h3>
<p id="topMode">1 LINE</p>
</div>

<div class="infoCard">
<h3>TICKETS</h3>
<p>4</p>
</div>

<div class="infoCard">
<h3>LIVE GAME</h3>
<p>90 BALL</p>
</div>

<div class="infoCard">
<h3>STATUS</h3>
<p>LIVE</p>
</div>

</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyD-4DJXkJUhgxA4RBJoWnvDKtwpzx69eQQ",
databaseURL:"https://marvalous-bingo-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let playerName=localStorage.getItem('playerName')||'Player';

let playerId=localStorage.getItem('playerId');

if(!playerId){

playerId=Date.now().toString();

localStorage.setItem('playerId',playerId);

}

/* FIX OLD CARDS */

if(localStorage.getItem('fixedCardsV3')!=="yes"){

localStorage.removeItem('cards');

localStorage.setItem('fixedCardsV3',"yes");

}

/* TICKET GENERATOR */

function generateTicket(){

const ranges=[
[1,9],[10,19],[20,29],[30,39],[40,49],
[50,59],[60,69],[70,79],[80,90]
];

let ticket=[
["","","","","","","","",""],
["","","","","","","","",""],
["","","","","","","","",""]
];

let used=new Set();

for(let row=0;row<3;row++){

let cols=[];

while(cols.length<5){

let col=Math.floor(Math.random()*9);

if(!cols.includes(col)) cols.push(col);

}

cols.sort((a,b)=>a-b);

cols.forEach(col=>{

let min=ranges[col][0];
let max=ranges[col][1];

let num;

do{

num=Math.floor(Math.random()*(max-min+1))+min;

}while(used.has(num));

used.add(num);

ticket[row][col]=num;

});

}

for(let col=0;col<9;col++){

let nums=[];

for(let row=0;row<3;row++){

if(ticket[row][col]!=="") nums.push(ticket[row][col]);

}

nums.sort((a,b)=>a-b);

let i=0;

for(let row=0;row<3;row++){

if(ticket[row][col]!==""){

ticket[row][col]=nums[i];

i++;

}

}

}

return ticket;

}

/* LOAD TICKETS */

let savedCards=localStorage.getItem('cards');

let cards=savedCards
?JSON.parse(savedCards)
:[
generateTicket(),
generateTicket(),
generateTicket(),
generateTicket()
];

localStorage.setItem('cards',JSON.stringify(cards));

/* RENDER */

function renderBoards(){

const wrap=document.getElementById('tickets');

wrap.innerHTML='';

cards.forEach(ticket=>{

let board=document.createElement('div');

board.className='ticket';

ticket.flat().forEach(n=>{

let div=document.createElement('div');

if(n===''){

div.className='cell blank';

}else{

div.className='cell';

div.innerText=n;

div.dataset.num=n;

}

board.appendChild(div);

});

wrap.appendChild(board);

});

}

renderBoards();

/* SAVE PLAYER */

let currentGameId;

db.ref('gameId').on('value',snap=>{

let gameId=snap.val();

if(!gameId) return;

if(currentGameId!==gameId){

currentGameId=gameId;

let savedGame=localStorage.getItem('gameId');

if(savedGame!==String(gameId)){

cards=[
generateTicket(),
generateTicket(),
generateTicket(),
generateTicket()
];

localStorage.setItem('cards',JSON.stringify(cards));

localStorage.setItem('gameId',gameId);

location.reload();

}

db.ref('players/'+playerId).set({

name:playerName,
cards:cards

});

}

});

/* AUTO MARK */

let lastCalled=0;

db.ref('calledNumbers').on('value',snap=>{

const called=Object.values(snap.val()||{});

document.querySelectorAll('.cell').forEach(c=>{

c.classList.remove('marked');

});

called.forEach(num=>{

document.querySelectorAll('.cell').forEach(c=>{

if(c.dataset.num==num){

c.classList.add('marked');

}

});

});

});

/* CURRENT NUMBER */

db.ref('currentNumber').on('value',snap=>{

let num=snap.val();

if(!num) return;

document.getElementById('currentNumber').innerText=num;

if(lastCalled!==num){

lastCalled=num;

let speech=new SpeechSynthesisUtterance(num);

speech.rate=.9;

speechSynthesis.cancel();

speechSynthesis.speak(speech);

}

});

/* MODE */

db.ref('mode').on('value',snap=>{

let mode=snap.val()||'1line';

let text=
mode==='1line'?'1 LINE':
mode==='2lines'?'2 LINES':'FULL HOUSE';

document.getElementById('mode').innerText='Mode: '+text;

document.getElementById('topMode').innerText=text;

});

/* BINGO */

function checkBingo(){

db.ref('bingoClaims').push({

name:playerName,
time:Date.now()

});

db.ref('bingoSound').set(Date.now());

alert('🎉 Bingo claimed!');

}

/* CHAT */

function sendMsg(){

let name=document.getElementById('name').value||'Player';

let msg=document.getElementById('msg').value;

if(!msg) return;

localStorage.setItem('playerName',name);

db.ref('chat').push({

name:name,
message:msg

});

document.getElementById('msg').value='';

}

db.ref('chat').limitToLast(50).on('child_added',snap=>{

let d=snap.val();

let div=document.createElement('div');

div.className='msg';

div.innerHTML='<b>'+d.name+':</b> '+d.message;

let box=document.getElementById('messages');

box.appendChild(div);

box.scrollTop=box.scrollHeight;

});

/* SOUND */

const bingoAudio=new Audio(
'https://www.soundjay.com/human/cheering-01.mp3'
);

bingoAudio.volume=1;

document.body.addEventListener('click',()=>{

bingoAudio.play()
.then(()=>{

bingoAudio.pause();

bingoAudio.currentTime=0;

})
.catch(()=>{});

},{once:true});

db.ref('bingoSound').on('value',snap=>{

if(!snap.val()) return;

bingoAudio.currentTime=0;

bingoAudio.play().catch(()=>{});

});

</script>

</body>
</html>
