<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marvalous Bingo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#090512;
font-family:'Poppins',sans-serif;
color:white;
overflow-y:auto;
overflow-x:hidden;
min-height:100vh;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at top,#8c2dff55,transparent 45%),
radial-gradient(circle at bottom,#ff4df222,transparent 40%);
z-index:-1;
}

.app{
display:flex;
flex-direction:column;
padding:10px;
gap:10px;
min-height:100vh;
padding-bottom:100px;
max-width:700px;
margin:auto;
}

/* TOP */

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
padding:5px 10px;
}

.logo{
text-align:center;
flex:1;
}

.logo h1{
font-size:46px;
line-height:0.9;
font-weight:800;
text-shadow:
0 0 10px #ff4df2,
0 0 30px #ff4df2;
}

.menu{
font-size:52px;
font-weight:700;
width:60px;
text-align:center;
}

.topInfo{
position:absolute;
right:15px;
top:110px;
text-align:right;
font-weight:700;
font-size:18px;
}

/* MAIN BALL */

.ballWrap{
display:flex;
justify-content:center;
align-items:center;
position:relative;
margin-top:10px;
}

.bigBall{
width:360px;
height:360px;
border-radius:50%;
border:8px solid #ff4df2;
display:flex;
align-items:center;
justify-content:center;
font-size:140px;
font-weight:800;
background:radial-gradient(circle,#2b1040,#090512);
box-shadow:
0 0 30px #ff4df2,
0 0 80px #ff4df2;
}

.streamBtn{
position:absolute;
left:0;
top:50%;
transform:translateY(-50%);
width:130px;
height:130px;
border-radius:25px;
overflow:hidden;
border:4px solid #d94dff;
box-shadow:0 0 20px #d94dff;
background:#120d28;
}

.streamBtn iframe{
width:100%;
height:100%;
border:none;
pointer-events:none;
}

/* LAST CALLED */

.calledStrip{
display:grid;
grid-template-columns:repeat(5,1fr);
border:3px solid #b84dff;
border-radius:20px;
overflow:hidden;
background:#120d28;
}

.calledCell{
padding:18px 0;
text-align:center;
font-size:34px;
font-weight:700;
border-right:2px solid #b84dff;
}

.calledCell:last-child{
border-right:none;
}

/* TICKETS */

.ticketSection{
background:#1a1033;
border:4px solid #b84dff;
border-radius:30px;
padding:15px;
}

.ticketHeader{
text-align:center;
font-size:28px;
font-weight:700;
margin-bottom:15px;
}

.ticketGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.ticket{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:4px;
background:#22103b;
padding:6px;
border-radius:20px;
}

.cell{
height:54px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:700;
background:#0b0818;
border-radius:10px;
}

.marked{
background:#45e7ff;
color:white;
box-shadow:0 0 15px #45e7ff;
}

/* CHAT + BINGO */

.bottomArea{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.chatBox{
background:#1a1033;
border:4px solid #7f4dff;
border-radius:25px;
padding:15px;
}

.chatTitle{
font-size:24px;
font-weight:700;
margin-bottom:10px;
}

#messages{
height:120px;
overflow-y:auto;
font-size:14px;
}

.msg{
margin-bottom:8px;
}

.msg b{
color:#45e7ff;
}

#chat-input{
display:flex;
gap:6px;
margin-top:12px;
flex-wrap:wrap;
}

#chat-input input{
flex:1;
min-width:120px;
padding:10px;
background:#120d28;
border:2px solid #3f2c66;
border-radius:12px;
color:white;
font-size:14px;
}

#chat-input button{
padding:10px 16px;
border:none;
border-radius:12px;
background:#ff4df2;
color:white;
font-weight:700;
}

.bingoBtn{
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(45deg,#45f3ff,#27d9ff);
border-radius:25px;
font-size:64px;
font-weight:800;
color:white;
box-shadow:0 0 25px #45f3ff;
}

/* MOBILE */

@media(max-width:700px){

.logo h1{
font-size:34px;
}

.bigBall{
width:240px;
height:240px;
font-size:110px;
}

.streamBtn{
width:90px;
height:90px;
left:0;
}

.calledCell{
font-size:22px;
padding:12px 0;
}

.ticketGrid{
grid-template-columns:1fr 1fr;
gap:10px;
}

.ticket{
gap:3px;
padding:4px;
}

.cell{
height:42px;
font-size:16px;
}

.bottomArea{
grid-template-columns:1fr 1fr;
}

.bingoBtn{
font-size:48px;
min-height:220px;
}

.topInfo{
font-size:16px;
top:95px;
}

}

</style>
</head>

<body>

<script>

const firebaseConfig={
apiKey:"AIzaSyD-4DJXkJUhgxA4RBJoWnvDKtwpzx69eQQ",
databaseURL:"https://marvalous-bingo-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

function checkBingo(){

db.ref('bingoClaims').push({
time:Date.now()
});

alert('🎉 Bingo Claimed!');

}

function sendMsg(){

let name=document.getElementById('name').value || 'Player';

let msg=document.getElementById('msg').value;

if(!msg) return;

db.ref('chat').push({
name:name,
message:msg
});

document.getElementById('msg').value='';

}

db.ref('chat').limitToLast(20).on('child_added',snap=>{

let d=snap.val();

let div=document.createElement('div');

div.className='msg';

div.innerHTML='<b>'+d.name+':</b> '+d.message;

let box=document.getElementById('messages');

box.appendChild(div);

box.scrollTop=box.scrollHeight;

});

db.ref('currentNumber').on('value',snap=>{

let num=snap.val();

if(!num) return;

document.getElementById('currentNumber').innerText=num;

});

db.ref('mode').on('value',snap=>{

let mode=snap.val() || '2lines';

let text=
mode==='1line'?'1 LINE':
mode==='2lines'?'2 LINES':
'FULL HOUSE';

document.getElementById('modeText').innerText=text;

});

</script>

</html>
