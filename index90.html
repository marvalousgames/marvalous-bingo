<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marvalous Bingo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#090512;
font-family:'Poppins',sans-serif;
color:white;
overflow-y:auto;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at top,#8c2dff55,transparent 45%),
radial-gradient(circle at bottom,#ff4df222,transparent 40%);
z-index:-1;
}

.app{
max-width:420px;
margin:auto;
padding:6px;
padding-bottom:20px;
}

/* TOP */

.top{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:4px;
}

.menu{
font-size:42px;
font-weight:700;
padding:5px 10px;
}

.logo{
text-align:center;
flex:1;
margin-top:6px;
}

.logo h1{
font-size:24px;
line-height:0.9;
font-weight:800;
text-shadow:
0 0 10px #ff4df2,
0 0 25px #ff4df2;
}

.sideInfo{
font-size:12px;
font-weight:700;
text-align:right;
padding:8px 6px 0 0;
}

/* MAIN BALL */

.ballArea{
position:relative;
display:flex;
justify-content:center;
align-items:center;
margin-top:-10px;
}

.ball{
width:190px;
height:190px;
border-radius:50%;
border:5px solid #ff4df2;
display:flex;
align-items:center;
justify-content:center;
font-size:88px;
font-weight:800;
background:radial-gradient(circle,#240b39,#090512);
box-shadow:
0 0 20px #ff4df2,
0 0 45px #ff4df2;
}

.streamBox{
position:absolute;
left:0;
top:50%;
transform:translateY(-50%);
width:70px;
height:70px;
border-radius:18px;
overflow:hidden;
border:3px solid #d94dff;
box-shadow:0 0 15px #d94dff;
background:#120d28;
}

.streamBox iframe{
width:100%;
height:100%;
border:none;
pointer-events:none;
}

/* LAST NUMBERS */

.called{
display:grid;
grid-template-columns:repeat(5,1fr);
margin-top:8px;
border:2px solid #b84dff;
border-radius:16px;
overflow:hidden;
}

.called div{
padding:10px 0;
text-align:center;
font-size:18px;
font-weight:700;
background:#120d28;
border-right:2px solid #b84dff;
}

.called div:last-child{
border-right:none;
}

/* TICKETS */

.ticketWrap{
margin-top:10px;
background:#1b1034;
border:3px solid #b84dff;
border-radius:24px;
padding:10px;
}

.ticketTitle{
text-align:center;
font-size:20px;
font-weight:700;
margin-bottom:10px;
}

.ticketGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.ticket{
background:#120d28;
padding:5px;
border-radius:16px;
border:2px solid #7d3cff;
}

.ticketBoard{
display:grid;
grid-template-columns:repeat(9,1fr);
gap:2px;
}

.cell{
height:24px;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:700;
background:#090512;
border-radius:5px;
}

.blank{
background:transparent;
}

.marked{
background:#48e7ff;
color:white;
box-shadow:0 0 10px #48e7ff;
}

/* BOTTOM */

.bottom{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:10px;
}

.chat{
background:#1b1034;
border:3px solid #7d4dff;
border-radius:22px;
padding:10px;
}

.chat h2{
font-size:18px;
margin-bottom:8px;
}

.messages{
height:85px;
overflow-y:auto;
font-size:13px;
margin-bottom:8px;
}

.messages div{
margin-bottom:6px;
}

.messages b{
color:#48e7ff;
}

.chat input{
width:100%;
margin-bottom:6px;
padding:8px;
background:#120d28;
border:2px solid #38255e;
border-radius:10px;
color:white;
font-size:13px;
outline:none;
}

.chat button{
width:100%;
padding:10px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#b84dff,#ff4df2);
color:white;
font-weight:700;
font-size:16px;
}

.bingo{
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(45deg,#48f3ff,#29d9ff);
border-radius:24px;
font-size:38px;
font-weight:800;
box-shadow:0 0 18px #48f3ff;
min-height:210px;
}

/* MOBILE */

@media(max-width:400px){

.ball{
width:170px;
height:170px;
font-size:78px;
}

.logo h1{
font-size:22px;
}

.cell{
height:22px;
font-size:11px;
}

.bingo{
font-size:32px;
min-height:190px;
}

}

</style>
</head>
