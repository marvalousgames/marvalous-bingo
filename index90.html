<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Marvalous Bingo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
background:#090512;
font-family:'Poppins',sans-serif;
color:white;
height:100vh;
overflow:hidden;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at top,#8c2dff55,transparent 40%),
radial-gradient(circle at bottom,#ff4df222,transparent 35%);
z-index:-1;
}

.app{
height:100vh;
display:flex;
flex-direction:column;
padding:10px;
gap:8px;
}

/* TOP */

.topBar{
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:10px;
}

.liveThumb{
width:72px;
height:58px;
border-radius:14px;
overflow:hidden;
border:2px solid #d94dff;
box-shadow:0 0 18px rgba(255,77,242,.4);
flex-shrink:0;
cursor:pointer;
}

.liveThumb img{
width:100%;
height:100%;
object-fit:cover;
}

.logo{
flex:1;
text-align:center;
}

.logo h1{
font-size:24px;
line-height:0.95;
font-weight:800;
text-shadow:
0 0 10px #ff4df2,
0 0 25px #ff4df2;
}

.logo span{
display:block;
font-size:10px;
letter-spacing:3px;
color:#00ffcc;
margin-top:6px;
}

.sideInfo{
width:60px;
text-align:center;
font-size:12px;
font-weight:700;
line-height:1.1;
}

/* NUMBER */

.numberWrap{
display:flex;
justify-content:center;
align-items:center;
}

.numberCircle{
width:170px;
height:170px;
border-radius:50%;
border:4px solid #ff4df2;
display:flex;
justify-content:center;
align-items:center;
box-shadow:
0 0 18px #ff4df2,
0 0 45px rgba(255,77,242,.35),
inset 0 0 25px rgba(255,77,242,.15);
}

#currentNumber{
font-size:72px;
font-weight:900;
text-shadow:
0 0 10px #ff4df2,
0 0 25px #ff4df2;
}

/* RECENT */

.recentRow{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:2px;
background:#b84dff;
padding:2px;
border-radius:14px;
overflow:hidden;
}

.recentCell{
background:#120d28;
height:38px;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
font-weight:700;
}

/* TICKETS */

.ticketWrap{
height:250px;
background:rgba(28,23,53,.96);
border:2px solid #b84dff;
border-radius:22px;
padding:8px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.ticketHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px;
}

.ticketHeader button{
background:none;
border:none;
color:white;
font-size:30px;
font-weight:bold;
width:34px;
}

.ticketTitle{
font-size:18px;
font-weight:700;
}

.ticket{
flex:1;
display:grid;
grid-template-columns:repeat(9,1fr);
gap:2px;
background:#d94dff;
padding:2px;
border-radius:14px;
overflow:hidden;
}

.cell{
background:#120d28;
display:flex;
justify-content:center;
align-items:center;
font-size:16px;
font-weight:700;
}

.blank{
background:#0b0818;
}

.marked{
background:#27d8ff;
color:white;
box-shadow:0 0 10px #27d8ff;
}

/* BOTTOM */

.bottomRow{
display:grid;
grid-template-columns:0.9fr 1.1fr;
gap:10px;
}

.chatMini{
background:#1c1735;
border:2px solid #b84dff;
border-radius:18px;
padding:10px;
height:78px;
overflow:hidden;
}

.chatMini h3{
font-size:16px;
margin-bottom:3px;
}

.chatMini p{
font-size:13px;
color:#ccc;
}

.bingoBtn{
border:none;
border-radius:18px;
background:linear-gradient(45deg,#00d9ff,#00ffcc);
font-size:26px;
font-weight:800;
color:#001018;
box-shadow:0 0 20px rgba(0,255,204,.45);
}

/* NAV */

.nav{
height:58px;
background:#140d26;
border-top:2px solid #b84dff;
border-radius:18px;
display:grid;
grid-template-columns:repeat(4,1fr);
}

.navItem{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:11px;
font-weight:600;
}

/* MODALS */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
display:none;
justify-content:center;
align-items:center;
z-index:999;
padding:15px;
}

.modalContent{
background:#1c1735;
border:2px solid #b84dff;
border-radius:20px;
width:100%;
max-width:500px;
padding:15px;
}

.closeBtn{
width:100%;
padding:14px;
margin-top:12px;
background:#ff4df2;
border:none;
border-radius:12px;
color:white;
font-weight:700;
}

#video-container{
width:100%;
height:240px;
border-radius:14px;
overflow:hidden;
}

iframe{
width:100%;
height:100%;
border:none;
}

#messages{
height:240px;
overflow-y:auto;
background:#120d28;
border-radius:12px;
padding:10px;
margin-bottom:10px;
}

.msg{
margin-bottom:8px;
font-size:14px;
}

.msg b{
color:#00ffcc;
}

#chat-input{
display:flex;
gap:6px;
}

#chat-input input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#120d28;
color:white;
min-width:0;
}

#chat-input button{
padding:12px 14px;
border:none;
border-radius:10px;
background:#ff4df2;
color:white;
font-weight:700;
flex-shrink:0;
}

</style>
</head>

<body>

<div class="app">

<div class="topBar">

<div class="liveThumb" onclick="openStream()">
<img src="https://static-cdn.jtvnw.net/previews-ttv/live_user_marvalouscomps-320x180.jpg">
</div>

<div class="logo">
<h1>MARVALOUS<br>BINGO</h1>
<span>REAL PEOPLE • REAL WINNERS</span>
</div>

<div class="sideInfo">
<div id="topMode">1 LINE</div>
<br>
<div>GAME<br>90</div>
</div>

</div>

<div class="numberWrap">

<div class="numberCircle">
<div id="currentNumber">-</div>
</div>

</div>

<div class="recentRow" id="recentRow">

<div class="recentCell">-</div>
<div class="recentCell">-</div>
<div class="recentCell">-</div>
<div class="recentCell">-</div>
<div class="recentCell">-</div>

</div>

<div class="ticketWrap">

<div class="ticketHeader">

<button onclick="prevTicket()">‹</button>

<div class="ticketTitle">
Your Tickets: <span id="ticketNum">1</span>/4
</div>

<button onclick="nextTicket()">›</button>

</div>

<div class="ticket" id="ticketBoard"></div>

</div>

<div class="bottomRow">

<div class="chatMini" onclick="openChat()">
<h3>Live Chat</h3>
<p id="chatPreview">Waiting for messages...</p>
</div>

<button class="bingoBtn" onclick="checkBingo()">
BINGO!
</button>

</div>

<div class="nav">

<div class="navItem">
🏠<br>Mode
</div>

<div class="navItem">
🎟️<br>Tickets
</div>

<div class="navItem">
🎮<br>Game
</div>

<div class="navItem" onclick="openStream()">
📺<br>Live
</div>

</div>

</div>

<!-- STREAM MODAL -->

<div class="modal" id="streamModal">

<div class="modalContent">

<div id="video-container">
<iframe src="https://player.twitch.tv/?channel=marvalouscomps&parent=marvalous-bingo.netlify.app"></iframe>
</div>

<button class="closeBtn" onclick="closeStream()">
Close Stream
</button>

</div>

</div>

<!-- CHAT MODAL -->

<div class="modal" id="chatModal">

<div class="modalContent">

<div id="messages"></div>

<div id="chat-input">

<input id="name" placeholder="Name">

<input id="msg" placeholder="Message...">

<button onclick="sendMsg()">Send</button>

</div>

<button class="closeBtn" onclick="closeChat()">
Close Chat
</button>

</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyD-4DJXkJUhgxA4RBJoWnvDKtwpzx69eQQ",
databaseURL:"https://marvalous-bingo-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let playerName=localStorage.getItem('playerName')||'Player';

let playerId=localStorage.getItem('playerId');

if(!playerId){

playerId=Date.now().toString();

localStorage.setItem('playerId',playerId);

}

function generateTicket(){

const ranges=[
[1,9],[10,19],[20,29],[30,39],[40,49],
[50,59],[60,69],[70,79],[80,90]
];

let ticket=[
["","","","","","","","",""],
["","","","","","","","",""],
["","","","","","","","",""]
];

let used=new Set();

for(let row=0;row<3;row++){

let cols=[];

while(cols.length<5){

let col=Math.floor(Math.random()*9);

if(!cols.includes(col)) cols.push(col);

}

cols.sort((a,b)=>a-b);

cols.forEach(col=>{

let min=ranges[col][0];
let max=ranges[col][1];

let num;

do{
num=Math.floor(Math.random()*(max-min+1))+min;
}
while(used.has(num));

used.add(num);

ticket[row][col]=num;

});

}

for(let col=0;col<9;col++){

let nums=[];

for(let row=0;row<3;row++){

if(ticket[row][col]!=="") nums.push(ticket[row][col]);

}

nums.sort((a,b)=>a-b);

let i=0;

for(let row=0;row<3;row++){

if(ticket[row][col]!==""){

ticket[row][col]=nums[i];
i++;

}

}

}

return ticket;

}

let savedCards=localStorage.getItem('cards');

let cards=savedCards
?JSON.parse(savedCards)
:[
generateTicket(),
generateTicket(),
generateTicket(),
generateTicket()
];

localStorage.setItem('cards',JSON.stringify(cards));

let currentTicket=0;

function renderTicket(){

document.getElementById('ticketNum').innerText=currentTicket+1;

const board=document.getElementById('ticketBoard');

board.innerHTML='';

cards[currentTicket].flat().forEach(n=>{

let div=document.createElement('div');

if(n===''){

div.className='cell blank';

}else{

div.className='cell';

div.innerText=n;

div.dataset.num=n;

}

board.appendChild(div);

});

}

renderTicket();

function nextTicket(){

currentTicket++;

if(currentTicket>=cards.length) currentTicket=0;

renderTicket();

}

function prevTicket(){

currentTicket--;

if(currentTicket<0) currentTicket=cards.length-1;

renderTicket();

}

let recent=[];

db.ref('calledNumbers').on('value',snap=>{

const called=Object.values(snap.val()||{});

recent=called.slice(-5).reverse();

renderRecent();

document.querySelectorAll('.cell').forEach(c=>{

c.classList.remove('marked');

});

called.forEach(num=>{

document.querySelectorAll('.cell').forEach(c=>{

if(c.dataset.num==num){

c.classList.add('marked');

}

});

});

});

function renderRecent(){

const row=document.getElementById('recentRow');

row.innerHTML='';

recent.forEach(n=>{

let d=document.createElement('div');

d.className='recentCell';

d.innerText=n;

row.appendChild(d);

});

while(row.children.length<5){

let d=document.createElement('div');

d.className='recentCell';

d.innerText='-';

row.appendChild(d);

}

}

db.ref('currentNumber').on('value',snap=>{

let num=snap.val();

if(!num) return;

document.getElementById('currentNumber').innerText=num;

});

db.ref('mode').on('value',snap=>{

let mode=snap.val()||'1line';

let text=
mode==='1line'?'1 LINE':
mode==='2lines'?'2 LINES':'FULL HOUSE';

document.getElementById('topMode').innerText=text;

});

function checkBingo(){

db.ref('bingoClaims').push({

name:playerName,
time:Date.now()

});

alert('🎉 Bingo claimed!');

}

function openStream(){

document.getElementById('streamModal').style.display='flex';

}

function closeStream(){

document.getElementById('streamModal').style.display='none';

}

function openChat(){

document.getElementById('chatModal').style.display='flex';

}

function closeChat(){

document.getElementById('chatModal').style.display='none';

}

function sendMsg(){

let name=document.getElementById('name').value||'Player';

let msg=document.getElementById('msg').value;

if(!msg) return;

db.ref('chat').push({

name:name,
message:msg

});

document.getElementById('msg').value='';

}

db.ref('chat').limitToLast(20).on('child_added',snap=>{

let d=snap.val();

let div=document.createElement('div');

div.className='msg';

div.innerHTML='<b>'+d.name+':</b> '+d.message;

let box=document.getElementById('messages');

box.appendChild(div);

box.scrollTop=box.scrollHeight;

document.getElementById('chatPreview').innerText=
d.name+': '+d.message;

});

</script>

</body>
</html>
