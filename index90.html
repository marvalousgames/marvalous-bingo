<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marvalous Bingo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
background:
radial-gradient(circle at top,#45006d 0%,#170022 45%,#050008 100%);
font-family:'Poppins',sans-serif;
color:white;
overflow-x:hidden;
}

.container{
width:100%;
max-width:900px;
margin:auto;
padding:12px;
}

/* LOGO */

.logo{
text-align:center;
margin-bottom:14px;
}

.logo h1{
font-size:68px;
line-height:.9;
font-weight:900;
color:white;
text-shadow:
0 0 10px #ff4df2,
0 0 30px #ff4df2;
}

.logo p{
margin-top:10px;
font-size:12px;
letter-spacing:6px;
color:#49ffee;
}

/* STREAM */

.streamWrap{
background:#12051d;
border:3px solid #c04dff;
border-radius:26px;
padding:6px;
box-shadow:0 0 25px rgba(255,0,255,.4);
margin-bottom:16px;
}

.streamBox{
width:100%;
aspect-ratio:16/9;
border-radius:20px;
overflow:hidden;
background:black;
}

.streamBox iframe{
width:100%;
height:100%;
border:none;
}

/* CHAT */

.chatWrap{
background:#12051d;
border:3px solid #c04dff;
border-radius:26px;
padding:14px;
box-shadow:0 0 20px rgba(255,0,255,.25);
margin-bottom:24px;
}

.messages{
height:150px;
overflow-y:auto;
background:#050008;
border-radius:18px;
padding:14px;
margin-bottom:12px;
}

.msg{
margin-bottom:10px;
font-size:22px;
}

.msg b{
color:#49ffee;
}

.chatInputs{
display:grid;
grid-template-columns:1fr 1fr 120px;
gap:10px;
}

.chatInputs input{
height:56px;
border:none;
border-radius:14px;
background:black;
padding:0 18px;
font-size:20px;
color:white;
outline:none;
}

.sendBtn{
border:none;
border-radius:14px;
font-size:22px;
font-weight:700;
background:linear-gradient(45deg,#b84dff,#ff4df2);
color:white;
cursor:pointer;
}

/* NUMBER */

.numberWrap{
text-align:center;
margin-bottom:20px;
}

.currentNumber{
font-size:120px;
font-weight:900;
line-height:1;
color:white;
text-shadow:
0 0 15px #ff4df2,
0 0 40px #ff4df2;
}

.modeText{
font-size:28px;
font-weight:700;
color:#49ffee;
margin-top:6px;
}

/* TICKETS */

#tickets{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
margin-bottom:22px;
}

.ticket{
background:#090014;
border:3px solid #d94dff;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 18px rgba(255,0,255,.25);
}

.ticketGrid{
display:grid;
grid-template-columns:repeat(9,1fr);
}

.cell{
height:72px;
border-right:1px solid #d94dff;
border-bottom:1px solid #d94dff;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
font-weight:700;
background:#090014;
}

.ticketGrid .cell:nth-child(9n){
border-right:none;
}

.ticketGrid .cell:nth-last-child(-n+9){
border-bottom:none;
}

.blank{
background:#0a0012;
color:transparent;
}

.marked{
background:#38f6ff;
color:black;
font-weight:900;
box-shadow:
0 0 18px #38f6ff,
inset 0 0 12px rgba(255,255,255,.5);
}

/* CALLED BOARD */

#calledBoard{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:8px;
margin-bottom:24px;
}

.calledNum{
height:52px;
background:#1a1233;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

.calledActive{
background:#d94dff;
}

.latest{
background:#38f6ff!important;
color:black;
font-weight:900;
}

/* BINGO BUTTON */

.bingoBtn{
display:block;
width:260px;
height:84px;
margin:0 auto 30px;
border:none;
border-radius:24px;
background:linear-gradient(45deg,#38f6ff,#2de0ff);
font-size:48px;
font-weight:900;
color:black;
box-shadow:0 0 25px #38f6ff;
cursor:pointer;
}

/* MOBILE */

@media(max-width:700px){

.logo h1{
font-size:44px;
}

.logo p{
font-size:8px;
letter-spacing:4px;
}

.currentNumber{
font-size:86px;
}

.modeText{
font-size:18px;
}

.messages{
height:110px;
}

.msg{
font-size:14px;
}

.chatInputs{
grid-template-columns:1fr 1fr 90px;
gap:6px;
}

.chatInputs input{
height:44px;
font-size:14px;
padding:0 12px;
}

.sendBtn{
font-size:16px;
}

#tickets{
grid-template-columns:1fr 1fr;
gap:10px;
}

.cell{
height:48px;
font-size:14px;
}

#calledBoard{
gap:5px;
}

.calledNum{
height:38px;
font-size:12px;
}

.bingoBtn{
width:170px;
height:60px;
font-size:24px;
border-radius:18px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<h1>MARVALOUS BINGO</h1>
<p>REAL PEOPLE • REAL WINNERS</p>
</div>

<div class="streamWrap">

<div class="streamBox">

<iframe
src="https://player.twitch.tv/?channel=marvalouscomps&parent=bingo.netlify.app"
allowfullscreen>
</iframe>

</div>

</div>

<div class="chatWrap">

<div class="messages" id="messages"></div>

<div class="chatInputs">

<input id="name" placeholder="Name">

<input id="msg" placeholder="Type message...">

<button class="sendBtn" onclick="sendMsg()">
Send
</button>

</div>

</div>

<div class="numberWrap">

<div class="currentNumber" id="currentNumber">
-
</div>

<div class="modeText" id="mode">
Mode: 1 LINE
</div>

</div>

<div id="tickets"></div>

<div id="calledBoard"></div>

<button class="bingoBtn" onclick="checkBingo()">
BINGO
</button>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyD-4DJXkJUhgxA4RBJoWnvDKtwpzx69eQQ",
databaseURL:"https://marvalous-bingo-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let playerName=localStorage.getItem('playerName')||'Player';

let playerId=localStorage.getItem('playerId');

if(!playerId){

playerId=Date.now().toString();

localStorage.setItem('playerId',playerId);

}

function generateTicket(){

const ranges=[
[1,9],
[10,19],
[20,29],
[30,39],
[40,49],
[50,59],
[60,69],
[70,79],
[80,90]
];

let ticket=[
["","","","","","","","",""],
["","","","","","","","",""],
["","","","","","","","",""]
];

let used=new Set();

for(let row=0;row<3;row++){

let cols=[];

while(cols.length<5){

let col=Math.floor(Math.random()*9);

if(!cols.includes(col)) cols.push(col);

}

cols.sort((a,b)=>a-b);

cols.forEach(col=>{

let min=ranges[col][0];
let max=ranges[col][1];

let num;

do{

num=Math.floor(Math.random()*(max-min+1))+min;

}while(used.has(num));

used.add(num);

ticket[row][col]=num;

});

}

for(let col=0;col<9;col++){

let nums=[];

for(let row=0;row<3;row++){

if(ticket[row][col]!==""){

nums.push(ticket[row][col]);

}

}

nums.sort((a,b)=>a-b);

let i=0;

for(let row=0;row<3;row++){

if(ticket[row][col]!==""){

ticket[row][col]=nums[i];
i++;

}

}

}

return ticket;

}

let savedCards=localStorage.getItem('cards');

let cards=savedCards
?JSON.parse(savedCards)
:[
generateTicket(),
generateTicket(),
generateTicket(),
generateTicket()
];

localStorage.setItem('cards',JSON.stringify(cards));

function renderBoards(){

const wrap=document.getElementById('tickets');

wrap.innerHTML='';

cards.forEach(ticket=>{

let board=document.createElement('div');

board.className='ticket';

let grid=document.createElement('div');

grid.className='ticketGrid';

ticket.flat().forEach(n=>{

let div=document.createElement('div');

if(n===''){

div.className='cell blank';
div.innerHTML='';

}else{

div.className='cell';
div.innerText=n;
div.dataset.num=n;

}

grid.appendChild(div);

});

board.appendChild(grid);

wrap.appendChild(board);

});

}

renderBoards();

for(let i=1;i<=90;i++){

let div=document.createElement('div');

div.className='calledNum';

div.id='called-'+i;

div.innerText=i;

document.getElementById('calledBoard').appendChild(div);

}

db.ref('calledNumbers').on('value',snap=>{

const called=Object.values(snap.val()||{});

document.querySelectorAll('.cell').forEach(c=>{

c.classList.remove('marked');

});

called.forEach(num=>{

document.querySelectorAll('.cell').forEach(c=>{

if(c.dataset.num==num){

c.classList.add('marked');

}

});

});

document.querySelectorAll('.calledNum').forEach(c=>{

c.classList.remove('calledActive');
c.classList.remove('latest');

});

called.forEach(num=>{

let ball=document.getElementById('called-'+num);

if(ball){

ball.classList.add('calledActive');

}

});

let latest=called[called.length-1];

if(latest){

let latestBall=document.getElementById('called-'+latest);

if(latestBall){

latestBall.classList.add('latest');

}

}

});

db.ref('currentNumber').on('value',snap=>{

let num=snap.val();

if(!num) return;

document.getElementById('currentNumber').innerText=num;

});

db.ref('mode').on('value',snap=>{

let mode=snap.val()||'1line';

document.getElementById('mode').innerText=
'Mode: '+(
mode==='1line'?'1 LINE':
mode==='2lines'?'2 LINES':'FULL HOUSE'
);

});

function sendMsg(){

let name=document.getElementById('name').value||'Player';

let msg=document.getElementById('msg').value;

if(!msg) return;

localStorage.setItem('playerName',name);

db.ref('chat').push({

name:name,
message:msg

});

document.getElementById('msg').value='';

}

db.ref('chat').limitToLast(50).on('child_added',snap=>{

let d=snap.val();

let div=document.createElement('div');

div.className='msg';

div.innerHTML='<b>'+d.name+':</b> '+d.message;

let box=document.getElementById('messages');

box.appendChild(div);

box.scrollTop=box.scrollHeight;

});

function checkBingo(){

db.ref('bingoClaims').push({

name:playerName,
time:Date.now()

});

alert('🎉 Bingo claimed!');

}

</script>

</body>
</html>
