<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marvalous Bingo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:
radial-gradient(circle at top,#55107d 0%,#14051f 55%,#07010d 100%);
color:white;
overflow-x:hidden;
}

.app{
max-width:430px;
margin:auto;
padding:10px 10px 25px;
}

/* HEADER */

.header{
text-align:center;
position:relative;
margin-bottom:10px;
}

.logo{
font-size:46px;
font-weight:800;
line-height:.9;
color:white;
text-shadow:
0 0 12px #ff4df2,
0 0 30px #ff4df2;
}

.sub{
margin-top:8px;
font-size:12px;
letter-spacing:4px;
color:#42fff5;
}

/* TOP AREA */

.topArea{
display:grid;
grid-template-columns:75px 1fr 70px;
gap:8px;
align-items:center;
margin-top:10px;
}

/* TWITCH */

.stream{
width:75px;
height:75px;
border-radius:20px;
overflow:hidden;
border:3px solid #db4dff;
background:#12071f;
box-shadow:0 0 15px #ff4df2;
}

.stream iframe{
width:100%;
height:100%;
border:none;
}

/* NUMBER BALL */

.ballWrap{
display:flex;
justify-content:center;
align-items:center;
}

.ball{
width:210px;
height:210px;
border-radius:50%;
border:6px solid #ff4df2;
display:flex;
align-items:center;
justify-content:center;
font-size:96px;
font-weight:800;
background:#12071f;
box-shadow:
0 0 25px #ff4df2,
inset 0 0 25px #44105c;
}

/* SIDE */

.sideStats{
display:flex;
flex-direction:column;
gap:18px;
text-align:center;
font-weight:800;
font-size:14px;
}

/* LAST NUMBERS */

.lastWrap{
margin-top:12px;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:3px;
border:3px solid #c84dff;
border-radius:24px;
overflow:hidden;
background:#c84dff;
}

.lastNum{
height:58px;
background:#12071f;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:800;
}

/* TICKETS */

.ticketPanel{
margin-top:12px;
background:#1b1034;
border:3px solid #bb4dff;
border-radius:30px;
padding:14px;
}

.ticketTitle{
text-align:center;
font-size:24px;
font-weight:800;
margin-bottom:12px;
}

.ticketGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.ticket{
background:#12071f;
border:3px solid #8847ff;
border-radius:22px;
padding:8px;
display:grid;
grid-template-columns:repeat(9,1fr);
gap:3px;
}

.cell{
aspect-ratio:1;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
font-size:11px;
font-weight:700;
background:#090312;
}

.blank{
background:transparent;
}

.marked{
background:#59ecff;
color:white;
box-shadow:0 0 10px #59ecff;
}

/* BOTTOM */

.bottom{
margin-top:12px;
display:grid;
grid-template-columns:1fr 115px;
gap:10px;
align-items:stretch;
}

.chat{
background:#1a1033;
border:3px solid #7647ff;
border-radius:28px;
padding:12px;
display:flex;
flex-direction:column;
height:260px;
}

.chat h2{
font-size:22px;
margin-bottom:6px;
}

#messages{
flex:1;
overflow-y:auto;
font-size:13px;
margin-bottom:8px;
}

.msg{
margin-bottom:6px;
}

.msg b{
color:#4fe9ff;
}

.chat input{
width:100%;
padding:10px;
margin-bottom:6px;
border:none;
border-radius:14px;
background:#12071f;
color:white;
font-size:14px;
outline:none;
}

.sendBtn{
padding:10px;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#b84dff,#ff4df2);
color:white;
font-size:16px;
font-weight:700;
}

.bingoBtn{
border:none;
border-radius:24px;
background:linear-gradient(45deg,#48f3ff,#29d9ff);
color:white;
font-size:28px;
font-weight:800;
box-shadow:0 0 18px #48e7ff;
height:120px;
margin-top:auto;
margin-bottom:auto;
}

/* MOBILE */

@media(max-width:430px){

.logo{
font-size:42px;
}

.ball{
width:190px;
height:190px;
font-size:88px;
}

.ticket{
padding:6px;
}

.cell{
font-size:10px;
}

.bottom{
grid-template-columns:1fr 105px;
}

}

</style>
</head>

<body>

<div class="app">

<!-- HEADER -->

<div class="header">

<div class="logo">
MARVALOUS<br>BINGO
</div>

<div class="sub">
REAL PEOPLE • REAL WINNERS
</div>

</div>

<!-- TOP -->

<div class="topArea">

<div class="stream">
<iframe
src="https://player.twitch.tv/?channel=marvalouscomps&parent=bingo.netlify.app&muted=true"
allowfullscreen>
</iframe>
</div>

<div class="ballWrap">
<div class="ball" id="currentNumber">-</div>
</div>

<div class="sideStats">
<div id="modeText">2 LINES</div>
<div>GAME 90</div>
</div>

</div>

<!-- LAST NUMBERS -->

<div class="lastWrap" id="lastNumbers">

<div class="lastNum">-</div>
<div class="lastNum">-</div>
<div class="lastNum">-</div>
<div class="lastNum">-</div>
<div class="lastNum">-</div>

</div>

<!-- TICKETS -->

<div class="ticketPanel">

<div class="ticketTitle">
Your Tickets: 4
</div>

<div class="ticketGrid" id="tickets"></div>

</div>

<!-- BOTTOM -->

<div class="bottom">

<div class="chat">

<h2>Live Chat</h2>

<div id="messages"></div>

<input id="name" placeholder="Name">

<input id="msg" placeholder="Message...">

<button class="sendBtn" onclick="sendMsg()">
Send
</button>

</div>

<button class="bingoBtn" onclick="checkBingo()">
BINGO!
</button>

</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyD-4DJXkJUhgxA4RBJoWnvDKtwpzx69eQQ",
databaseURL:"https://marvalous-bingo-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let playerId=localStorage.getItem('playerId');

if(!playerId){

playerId=Date.now().toString();

localStorage.setItem('playerId',playerId);

}

let playerName=localStorage.getItem('playerName')||'Player';

/* RESET SAFE */

if(localStorage.getItem('fixedCardsV8')!=="yes"){

localStorage.removeItem('cards');

localStorage.setItem('fixedCardsV8',"yes");

}

/* TICKET GENERATOR */

function generateTicket(){

const ranges=[
[1,9],[10,19],[20,29],[30,39],[40,49],
[50,59],[60,69],[70,79],[80,90]
];

let ticket=[
["","","","","","","","",""],
["","","","","","","","",""],
["","","","","","","","",""]
];

let used=new Set();

for(let row=0;row<3;row++){

let cols=[];

while(cols.length<5){

let col=Math.floor(Math.random()*9);

if(!cols.includes(col)) cols.push(col);

}

cols.sort((a,b)=>a-b);

cols.forEach(col=>{

let min=ranges[col][0];
let max=ranges[col][1];

let num;

do{

num=Math.floor(Math.random()*(max-min+1))+min;

}while(used.has(num));

used.add(num);

ticket[row][col]=num;

});

}

for(let col=0;col<9;col++){

let nums=[];

for(let row=0;row<3;row++){

if(ticket[row][col]!=="") nums.push(ticket[row][col]);

}

nums.sort((a,b)=>a-b);

let i=0;

for(let row=0;row<3;row++){

if(ticket[row][col]!==""){

ticket[row][col]=nums[i];
i++;

}

}

}

return ticket;

}

/* LOAD */

let savedCards=localStorage.getItem('cards');

let cards=savedCards
?JSON.parse(savedCards)
:[
generateTicket(),
generateTicket(),
generateTicket(),
generateTicket()
];

localStorage.setItem('cards',JSON.stringify(cards));

/* RENDER */

function renderBoards(){

const wrap=document.getElementById('tickets');

wrap.innerHTML='';

cards.forEach(ticket=>{

let board=document.createElement('div');

board.className='ticket';

ticket.flat().forEach(n=>{

let div=document.createElement('div');

if(n===''){

div.className='cell blank';

}else{

div.className='cell';
div.innerText=n;
div.dataset.num=n;

}

board.appendChild(div);

});

wrap.appendChild(board);

});

}

renderBoards();

/* RESET SYSTEM */

let currentGameId;

db.ref('gameId').on('value',snap=>{

let gameId=snap.val();

if(!gameId) return;

if(currentGameId!==gameId){

currentGameId=gameId;

let savedGame=localStorage.getItem('gameId');

if(savedGame!==String(gameId)){

cards=[
generateTicket(),
generateTicket(),
generateTicket(),
generateTicket()
];

localStorage.setItem('cards',JSON.stringify(cards));

localStorage.setItem('gameId',gameId);

location.reload();

}

}

});

/* CALLED */

db.ref('calledNumbers').on('value',snap=>{

const called=Object.values(snap.val()||{});

document.querySelectorAll('.cell').forEach(c=>{

c.classList.remove('marked');

});

called.forEach(num=>{

document.querySelectorAll('.cell').forEach(c=>{

if(c.dataset.num==num){

c.classList.add('marked');

}

});

});

const last=called.slice(-5).reverse();

const boxes=document.querySelectorAll('.lastNum');

boxes.forEach((b,i)=>{

b.innerText=last[i]||'-';

});

});

/* CURRENT */

db.ref('currentNumber').on('value',snap=>{

let num=snap.val();

if(!num) return;

document.getElementById('currentNumber').innerText=num;

});

/* MODE */

db.ref('mode').on('value',snap=>{

let mode=snap.val()||'1line';

let text=
mode==='1line'?'1 LINE':
mode==='2lines'?'2 LINES':'FULL HOUSE';

document.getElementById('modeText').innerText=text;

});

/* BINGO */

function checkBingo(){

db.ref('bingoClaims').push({

name:playerName,
time:Date.now()

});

alert('BINGO CLAIMED!');

}

/* CHAT */

function sendMsg(){

let name=document.getElementById('name').value||'Player';

let msg=document.getElementById('msg').value;

if(!msg) return;

localStorage.setItem('playerName',name);

db.ref('chat').push({

name:name,
message:msg

});

document.getElementById('msg').value='';

}

db.ref('chat').limitToLast(50).on('child_added',snap=>{

let d=snap.val();

let div=document.createElement('div');

div.className='msg';

div.innerHTML='<b>'+d.name+':</b> '+d.message;

let box=document.getElementById('messages');

box.appendChild(div);

box.scrollTop=box.scrollHeight;

});

</script>

</body>
</html>
