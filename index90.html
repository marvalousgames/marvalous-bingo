<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marvalous Bingo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
background:#090512;
font-family:'Poppins',sans-serif;
color:white;
overflow:hidden;
height:100vh;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at top,#8c2dff44,transparent 35%),
radial-gradient(circle at bottom,#ff4df222,transparent 40%);
z-index:-1;
}

.app{
height:100vh;
display:flex;
flex-direction:column;
padding:10px;
gap:10px;
}

/* TOP BAR */

.top{
display:flex;
justify-content:space-between;
align-items:flex-start;
}

.menuBtn{
font-size:34px;
font-weight:bold;
width:50px;
text-align:center;
}

.logo{
text-align:center;
flex:1;
}

.logo h1{
font-size:28px;
line-height:0.95;
font-weight:800;
text-shadow:
0 0 10px #ff4df2,
0 0 30px #ff4df2;
}

.liveThumb{
width:86px;
height:70px;
border-radius:16px;
overflow:hidden;
border:2px solid #b84dff;
box-shadow:0 0 15px rgba(255,77,242,.5);
cursor:pointer;
}

.liveThumb img{
width:100%;
height:100%;
object-fit:cover;
}

/* NUMBER */

.numberWrap{
display:flex;
justify-content:center;
align-items:center;
}

.numberCircle{
width:190px;
height:190px;
border-radius:50%;
border:4px solid #ff4df2;
display:flex;
justify-content:center;
align-items:center;
box-shadow:
0 0 25px #ff4df2,
0 0 70px rgba(255,77,242,.4),
inset 0 0 40px rgba(255,77,242,.2);
}

#currentNumber{
font-size:78px;
font-weight:900;
text-shadow:
0 0 10px #ff4df2,
0 0 25px #ff4df2;
}

/* RECENT */

.recentNumbers{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:2px;
background:#b84dff;
padding:2px;
border-radius:18px;
overflow:hidden;
}

.recentCell{
height:55px;
background:#171028;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
font-weight:700;
}

/* TICKETS */

.ticketArea{
flex:1;
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.ticket{
background:#1b1430;
border:2px solid #3a3155;
border-radius:18px;
padding:6px;
display:grid;
grid-template-columns:repeat(5,1fr);
grid-template-rows:repeat(5,1fr);
gap:2px;
}

.ticketCell{
background:#120d20;
display:flex;
justify-content:center;
align-items:center;
font-size:15px;
font-weight:700;
border-radius:4px;
}

.marked{
background:#3ee7ff;
color:white;
box-shadow:0 0 10px #3ee7ff;
}

.ticketFooter{
text-align:center;
font-size:14px;
margin-top:2px;
opacity:.9;
}

/* BOTTOM */

.bottom{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.chatPreview{
background:#1c1735;
border:2px solid #3a3155;
border-radius:18px;
padding:12px;
height:100px;
overflow:hidden;
}

.chatPreview h3{
font-size:18px;
margin-bottom:4px;
}

.chatLine{
font-size:14px;
color:#00eaff;
margin-top:3px;
}

.bingoBtn{
border:none;
border-radius:20px;
background:linear-gradient(45deg,#00d9ff,#52ffe8);
font-size:38px;
font-weight:800;
color:white;
box-shadow:0 0 20px rgba(0,255,204,.6);
}

/* NAV */

.nav{
height:68px;
background:#120d20;
border-top:2px solid #2d2546;
border-radius:20px;
display:grid;
grid-template-columns:repeat(4,1fr);
}

.navItem{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:12px;
font-weight:600;
}

/* MODALS */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
display:none;
justify-content:center;
align-items:center;
padding:15px;
z-index:999;
}

.modalContent{
background:#1c1735;
border:2px solid #b84dff;
border-radius:20px;
padding:15px;
width:100%;
max-width:500px;
}

#video-container{
width:100%;
height:260px;
border-radius:14px;
overflow:hidden;
margin-bottom:10px;
}

iframe{
width:100%;
height:100%;
border:none;
}

.closeBtn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#ff4df2;
color:white;
font-weight:700;
}

#messages{
height:260px;
overflow-y:auto;
background:#120d28;
border-radius:12px;
padding:10px;
margin-bottom:10px;
}

.msg{
margin-bottom:8px;
font-size:14px;
}

.msg b{
color:#00ffcc;
}

#chat-input{
display:flex;
gap:6px;
margin-bottom:10px;
}

#chat-input input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#120d28;
color:white;
min-width:0;
}

#chat-input button{
padding:12px 16px;
border:none;
border-radius:10px;
background:#ff4df2;
color:white;
font-weight:700;
}

</style>
</head>

<body>

<div class="app">

<div class="top">

<div class="menuBtn">☰</div>

<div class="logo">
<h1>MARVALOUS<br>BINGO</h1>
</div>

<div class="menuBtn">☰</div>

</div>

<div class="top" style="align-items:center;">

<div class="liveThumb" onclick="openStream()">
<img src="https://static-cdn.jtvnw.net/previews-ttv/live_user_marvalouscomps-320x180.jpg">
</div>

<div class="numberWrap" style="flex:1;">

<div class="numberCircle">
<div id="currentNumber">85</div>
</div>

</div>

<div style="width:70px;text-align:center;font-weight:700;">
2 LINES
<br><br>
GAME 90
</div>

</div>

<div class="recentNumbers" id="recentRow">

<div class="recentCell">14</div>
<div class="recentCell">63</div>
<div class="recentCell">27</div>
<div class="recentCell">42</div>
<div class="recentCell">91</div>

</div>

<div class="ticketArea" id="ticketArea"></div>

<div class="ticketFooter">
Your Tickets: 4
</div>

<div class="bottom">

<div class="chatPreview" onclick="openChat()">

<h3>Live Chat</h3>

<div class="chatLine" id="chatPreview">
Player1: Nice win!
</div>

<div class="chatLine">
Player2: GG
</div>

</div>

<button class="bingoBtn" onclick="checkBingo()">
BINGO!
</button>

</div>

<div class="nav">

<div class="navItem">
🏠<br>Mode
</div>

<div class="navItem">
🎟️<br>Tickets
</div>

<div class="navItem">
🎮<br>Game
</div>

<div class="navItem" onclick="openStream()">
📺<br>Live Stream
</div>

</div>

</div>

<!-- STREAM MODAL -->

<div class="modal" id="streamModal">

<div class="modalContent">

<div id="video-container">
<iframe src="https://player.twitch.tv/?channel=marvalouscomps&parent=marvalous-bingo.netlify.app"></iframe>
</div>

<button class="closeBtn" onclick="closeStream()">
Close Stream
</button>

</div>

</div>

<!-- CHAT MODAL -->

<div class="modal" id="chatModal">

<div class="modalContent">

<div id="messages"></div>

<div id="chat-input">

<input id="name" placeholder="Name">

<input id="msg" placeholder="Message...">

<button onclick="sendMsg()">Send</button>

</div>

<button class="closeBtn" onclick="closeChat()">
Close Chat
</button>

</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyD-4DJXkJUhgxA4RBJoWnvDKtwpzx69eQQ",
databaseURL:"https://marvalous-bingo-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

function generateMiniTicket(){

let arr=[];

for(let i=0;i<25;i++){

arr.push(Math.floor(Math.random()*90)+1);

}

return arr;

}

let tickets=[
generateMiniTicket(),
generateMiniTicket()
];

function renderTickets(){

const area=document.getElementById('ticketArea');

area.innerHTML='';

tickets.forEach(ticket=>{

let board=document.createElement('div');

board.className='ticket';

ticket.forEach(n=>{

let div=document.createElement('div');

div.className='ticketCell';

if(Math.random()>.7){

div.classList.add('marked');

}

div.innerText=n;

board.appendChild(div);

});

area.appendChild(board);

});

}

renderTickets();

/* NUMBER */

db.ref('currentNumber').on('value',snap=>{

let num=snap.val();

if(!num) return;

document.getElementById('currentNumber').innerText=num;

});

/* RECENT */

db.ref('calledNumbers').on('value',snap=>{

const called=Object.values(snap.val()||{}).slice(-5).reverse();

const row=document.getElementById('recentRow');

row.innerHTML='';

called.forEach(n=>{

let d=document.createElement('div');

d.className='recentCell';

d.innerText=n;

row.appendChild(d);

});

});

/* CHAT */

function sendMsg(){

let name=document.getElementById('name').value||'Player';

let msg=document.getElementById('msg').value;

if(!msg) return;

db.ref('chat').push({

name:name,
message:msg

});

document.getElementById('msg').value='';

}

db.ref('chat').limitToLast(20).on('child_added',snap=>{

let d=snap.val();

let div=document.createElement('div');

div.className='msg';

div.innerHTML='<b>'+d.name+':</b> '+d.message;

let box=document.getElementById('messages');

box.appendChild(div);

box.scrollTop=box.scrollHeight;

document.getElementById('chatPreview').innerHTML=
'<b>'+d.name+':</b> '+d.message;

});

/* BINGO */

function checkBingo(){

alert('🎉 Bingo Claimed!');

}

/* MODALS */

function openStream(){

document.getElementById('streamModal').style.display='flex';

}

function closeStream(){

document.getElementById('streamModal').style.display='none';

}

function openChat(){

document.getElementById('chatModal').style.display='flex';

}

function closeChat(){

document.getElementById('chatModal').style.display='none';

}

</script>

</body>
</html>
