<!DOCTYPE html>
<html>
<head>
<title>Marvalous Bingo 90</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
font-family:'Poppins',sans-serif;
}

body{
background:
radial-gradient(circle at top,#3d006e 0%,#140021 45%,#050008 100%);
color:white;
padding:10px;
overflow-x:hidden;
}

/* LOGO */

.logo{
text-align:center;
margin-bottom:10px;
}

.logo h1{
font-size:34px;
font-weight:900;
line-height:0.9;
color:white;
text-shadow:
0 0 10px #ff4df2,
0 0 25px #ff4df2;
}

.logo p{
margin-top:4px;
font-size:10px;
letter-spacing:4px;
color:#48ffee;
}

/* STREAM */

#video-container{
width:100%;
max-width:850px;
margin:auto;
margin-bottom:10px;
background:#1a1033;
padding:6px;
border-radius:20px;
border:2px solid #a93dff;
box-shadow:0 0 18px rgba(255,0,255,.25);
}

#video-container iframe{
width:100%;
aspect-ratio:16/9;
border:none;
border-radius:14px;
}

/* CHAT */

#chat-box{
width:100%;
max-width:850px;
margin:auto;
margin-bottom:14px;
background:#1a1033;
border-radius:20px;
padding:10px;
border:2px solid #8e42ff;
}

#messages{
height:95px;
overflow-y:auto;
text-align:left;
padding:8px;
background:#12071f;
border-radius:12px;
margin-bottom:8px;
font-size:13px;
}

.msg{
margin-bottom:5px;
}

.msg b{
color:#47f2ff;
}

#chat-input{
display:flex;
gap:6px;
}

#chat-input input{
flex:1;
height:38px;
border:none;
border-radius:10px;
padding:0 10px;
background:#0d0217;
color:white;
outline:none;
font-size:13px;
}

#chat-input button{
width:70px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#b84dff,#ff4df2);
color:white;
font-weight:700;
}

/* CURRENT NUMBER */

.numberWrap{
text-align:center;
margin-bottom:12px;
}

#currentNumber{
font-size:78px;
font-weight:900;
line-height:1;
color:white;
text-shadow:
0 0 12px #ff4df2,
0 0 30px #ff4df2;
}

#mode{
margin-top:4px;
font-size:16px;
color:#48ffee;
}

/* TICKETS */

#tickets{
width:100%;
max-width:900px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:14px;
}

.ticket{
background:#12071f;
border:2px solid #b84dff;
border-radius:16px;
padding:4px;
overflow:hidden;
}

.ticketGrid{
display:grid;
grid-template-columns:repeat(9,1fr);
gap:1px;
}

.cell{
background:#090012;
min-height:28px;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:700;
border-radius:3px;
}

.blank{
background:#140021;
}

.marked{
background:linear-gradient(45deg,#00ffee,#4de1ff);
color:black;
box-shadow:0 0 12px rgba(71,242,255,.9);
}

/* CALLED BOARD */

#calledBoard{
width:100%;
max-width:900px;
margin:auto;
display:grid;
grid-template-columns:repeat(10,1fr);
gap:4px;
margin-bottom:80px;
}

.calledNum{
background:#1b1233;
height:28px;
border-radius:6px;
display:flex;
align-items:center;
justify-content:center;
font-size:11px;
color:#aaa;
}

.calledActive{
background:#ff4df2;
color:white;
}

.latest{
background:#00ffee !important;
color:black !important;
font-weight:900;
}

/* FLOATING BINGO BUTTON */

.main{
position:fixed;
bottom:18px;
left:50%;
transform:translateX(-50%);
width:140px;
height:52px;
border:none;
border-radius:16px;
background:linear-gradient(45deg,#00ffee,#47f2ff);
color:black;
font-size:20px;
font-weight:900;
box-shadow:0 0 18px #47f2ff;
z-index:999;
}

/* MOBILE */

@media(max-width:700px){

.logo h1{
font-size:28px;
}

#currentNumber{
font-size:64px;
}

#tickets{
grid-template-columns:1fr;
gap:8px;
}

.cell{
min-height:26px;
font-size:11px;
}

.calledNum{
height:24px;
font-size:10px;
}

#messages{
height:85px;
}

}

</style>
</head>

<body>

<div class="logo">
<h1>MARVALOUS BINGO</h1>
<p>REAL PEOPLE • REAL WINNERS</p>
</div>

<div id="video-container">
<iframe
src="https://player.twitch.tv/?channel=marvalouscomps&parent=marvalous-bingo.netlify.app"
allowfullscreen>
</iframe>
</div>

<div id="chat-box">

<div id="messages"></div>

<div id="chat-input">

<input id="name" placeholder="Name">

<input id="msg" placeholder="Type message...">

<button onclick="sendMsg()">Send</button>

</div>

</div>

<div class="numberWrap">

<div id="currentNumber">-</div>

<div id="mode">Mode: 1 LINE</div>

</div>

<div id="tickets"></div>

<div id="calledBoard"></div>

<button class="main" onclick="checkBingo()">
BINGO
</button>

<script>

const firebaseConfig={
 apiKey:"AIzaSyD-4DJXkJUhgxA4RBJoWnvDKtwpzx69eQQ",
 databaseURL:"https://marvalous-bingo-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let playerName=localStorage.getItem('playerName')||'Player';

let playerId=localStorage.getItem('playerId');

if(!playerId){

 playerId=Date.now().toString();

 localStorage.setItem('playerId',playerId);

}

/* RESET OLD */

if(localStorage.getItem('fixedCardsV3')!=="yes"){

 localStorage.removeItem('cards');

 localStorage.setItem('fixedCardsV3',"yes");

}

/* TICKET GENERATOR */

function generateTicket(){

const ranges=[
[1,9],[10,19],[20,29],[30,39],[40,49],
[50,59],[60,69],[70,79],[80,90]
];

let ticket=[
["","","","","","","","",""],
["","","","","","","","",""],
["","","","","","","","",""]
];

let used=new Set();

for(let row=0;row<3;row++){

let cols=[];

while(cols.length<5){

let col=Math.floor(Math.random()*9);

if(!cols.includes(col)) cols.push(col);

}

cols.sort((a,b)=>a-b);

cols.forEach(col=>{

let min=ranges[col][0];
let max=ranges[col][1];

let num;

do{

num=Math.floor(Math.random()*(max-min+1))+min;

}while(used.has(num));

used.add(num);

ticket[row][col]=num;

});

}

for(let col=0;col<9;col++){

let nums=[];

for(let row=0;row<3;row++){

if(ticket[row][col]!=="") nums.push(ticket[row][col]);

}

nums.sort((a,b)=>a-b);

let i=0;

for(let row=0;row<3;row++){

if(ticket[row][col]!==""){

ticket[row][col]=nums[i];
i++;

}

}

}

return ticket;

}

/* LOAD CARDS */

let savedCards=localStorage.getItem('cards');

let cards=savedCards
?JSON.parse(savedCards)
:[
generateTicket(),
generateTicket(),
generateTicket(),
generateTicket()
];

localStorage.setItem('cards',JSON.stringify(cards));

/* RENDER */

function renderBoards(){

const wrap=document.getElementById('tickets');

wrap.innerHTML='';

cards.forEach(ticket=>{

let board=document.createElement('div');

board.className='ticket';

let grid=document.createElement('div');

grid.className='ticketGrid';

ticket.flat().forEach(n=>{

let div=document.createElement('div');

if(n===''){

div.className='cell blank';

}else{

div.className='cell';
div.innerText=n;
div.dataset.num=n;

}

grid.appendChild(div);

});

board.appendChild(grid);

wrap.appendChild(board);

});

}

renderBoards();

/* GAME RESET */

let currentGameId;

db.ref('gameId').on('value',snap=>{

let gameId=snap.val();

if(!gameId) return;

if(currentGameId!==gameId){

currentGameId=gameId;

let savedGame=localStorage.getItem('gameId');

if(savedGame!==String(gameId)){

cards=[
generateTicket(),
generateTicket(),
generateTicket(),
generateTicket()
];

localStorage.setItem('cards',JSON.stringify(cards));

localStorage.setItem('gameId',gameId);

location.reload();

}

}

});

/* CALLED BOARD */

for(let i=1;i<=90;i++){

let div=document.createElement('div');

div.className='calledNum';

div.id='called-'+i;

div.innerText=i;

document.getElementById('calledBoard').appendChild(div);

}

/* AUTO MARK */

let lastCalled=0;

db.ref('calledNumbers').on('value',snap=>{

const called=Object.values(snap.val()||{});

document.querySelectorAll('.cell').forEach(c=>{

c.classList.remove('marked');

});

called.forEach(num=>{

document.querySelectorAll('.cell').forEach(c=>{

if(c.dataset.num==num){

c.classList.add('marked');

}

});

});

document.querySelectorAll('.calledNum').forEach(c=>{

c.classList.remove('calledActive');
c.classList.remove('latest');

});

called.forEach(num=>{

let ball=document.getElementById('called-'+num);

if(ball){

ball.classList.add('calledActive');

}

});

let latest=called[called.length-1];

if(latest){

let latestBall=document.getElementById('called-'+latest);

if(latestBall){

latestBall.classList.add('latest');

}

}

});

/* CURRENT NUMBER */

db.ref('currentNumber').on('value',snap=>{

let num=snap.val();

if(!num) return;

document.getElementById('currentNumber').innerText=num;

if(lastCalled!==num){

lastCalled=num;

let speech=new SpeechSynthesisUtterance(num);

speech.rate=.9;

speechSynthesis.cancel();

speechSynthesis.speak(speech);

}

});

/* MODE */

db.ref('mode').on('value',snap=>{

let mode=snap.val()||'1line';

document.getElementById('mode').innerText=
'Mode: '+(
mode==='1line'?'1 LINE':
mode==='2lines'?'2 LINES':'FULL HOUSE'
);

});

/* BINGO */

function checkBingo(){

db.ref('bingoClaims').push({

name:playerName,
time:Date.now()

});

db.ref('bingoSound').set(Date.now());

alert('🎉 Bingo claimed!');

}

/* CHAT */

function sendMsg(){

let name=document.getElementById('name').value||'Player';

let msg=document.getElementById('msg').value;

if(!msg) return;

localStorage.setItem('playerName',name);

db.ref('chat').push({

name:name,
message:msg

});

document.getElementById('msg').value='';

}

db.ref('chat').limitToLast(50).on('child_added',snap=>{

let d=snap.val();

let div=document.createElement('div');

div.className='msg';

div.innerHTML='<b>'+d.name+':</b> '+d.message;

let box=document.getElementById('messages');

box.appendChild(div);

box.scrollTop=box.scrollHeight;

});

/* SOUND */

const bingoAudio=new Audio(
'https://www.soundjay.com/human/cheering-01.mp3'
);

bingoAudio.volume=1;

document.body.addEventListener('click',()=>{

bingoAudio.play()
.then(()=>{

bingoAudio.pause();

bingoAudio.currentTime=0;

})
.catch(()=>{});

},{once:true});

db.ref('bingoSound').on('value',snap=>{

if(!snap.val()) return;

bingoAudio.currentTime=0;

bingoAudio.play().catch(()=>{});

});

</script>

</body>
</html>
