<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marvalous Bingo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:
radial-gradient(circle at top,#4b006f 0%,#210032 45%,#050008 100%);
color:white;
overflow-x:hidden;
padding:10px;
}

.wrapper{
max-width:920px;
margin:auto;
}

/* LOGO */

.logo{
text-align:center;
margin-bottom:10px;
}

.logo h1{
font-size:72px;
font-weight:900;
line-height:.88;
color:white;
text-shadow:
0 0 10px #ff4df2,
0 0 35px #ff4df2;
}

.logo p{
margin-top:8px;
font-size:14px;
letter-spacing:8px;
color:#49ffee;
}

/* VIDEO */

.videoWrap{
background:#12001d;
border:4px solid #cf42ff;
border-radius:28px;
padding:12px;
box-shadow:0 0 25px rgba(255,0,255,.4);
margin-bottom:14px;
}

.videoBox{
overflow:hidden;
border-radius:22px;
background:black;
aspect-ratio:16/9;
}

.videoBox iframe{
width:100%;
height:100%;
border:none;
}

/* CHAT */

.chatWrap{
background:#12001d;
border:4px solid #cf42ff;
border-radius:28px;
padding:14px;
box-shadow:0 0 25px rgba(255,0,255,.4);
margin-bottom:14px;
}

.messages{
height:130px;
overflow-y:auto;
background:#05000b;
border-radius:22px;
padding:16px;
margin-bottom:12px;
}

.msg{
font-size:16px;
margin-bottom:10px;
}

.msg b{
color:#4ffcff;
}

.chatInputs{
display:grid;
grid-template-columns:1fr 1fr 120px;
gap:10px;
}

.chatInputs input{
height:56px;
border:none;
border-radius:18px;
padding:0 18px;
background:black;
color:white;
font-size:18px;
outline:none;
min-width:0;
}

.sendBtn{
border:none;
border-radius:18px;
background:linear-gradient(45deg,#b84dff,#ff4df2);
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
}

/* NUMBER */

.numberWrap{
text-align:center;
margin:8px 0 16px;
}

#currentNumber{
font-size:120px;
font-weight:900;
line-height:1;
color:white;
text-shadow:
0 0 10px white,
0 0 30px #ff4df2,
0 0 60px #ff4df2;
}

#mode{
font-size:24px;
font-weight:700;
color:#49ffee;
}

/* TICKETS */

#tickets{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-bottom:16px;
}

.ticket{
background:#090011;
border:3px solid #cf42ff;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 14px rgba(255,0,255,.25);
}

.ticketGrid{
display:grid;
grid-template-columns:repeat(9,1fr);
}

.cell{
height:64px;
border-right:1px solid #cf42ff;
border-bottom:1px solid #cf42ff;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:700;
background:#0b0014;
}

.ticketGrid .cell:nth-child(9n){
border-right:none;
}

.ticketGrid .cell:nth-last-child(-n+9){
border-bottom:none;
}

.blank{
background:#090011;
}

.marked{
background:#2ef3ff;
color:black;
font-weight:900;
box-shadow:
0 0 10px #2ef3ff,
0 0 25px #2ef3ff inset;
}

/* CALLED BOARD */

#calledBoard{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:8px;
margin-bottom:18px;
}

.calledNum{
height:52px;
border-radius:10px;
background:#1a1635;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:600;
color:#d8d8d8;
}

.calledActive{
background:#d94dff;
color:white;
}

.latest{
background:#2ef3ff !important;
color:black !important;
font-weight:900;
}

/* BUTTON */

.bingoBtn{
width:240px;
height:82px;
display:block;
margin:0 auto 20px;
border:none;
border-radius:26px;
background:linear-gradient(45deg,#25f1ff,#5ef2ff);
color:black;
font-size:48px;
font-weight:900;
cursor:pointer;
box-shadow:0 0 25px #25f1ff;
}

/* MOBILE */

@media(max-width:768px){

body{
padding:6px;
overflow-x:hidden;
}

.wrapper{
max-width:100%;
}

.logo{
margin-bottom:6px;
}

.logo h1{
font-size:38px;
line-height:.9;
}

.logo p{
font-size:8px;
letter-spacing:4px;
margin-top:3px;
}

.videoWrap{
padding:6px;
border-radius:18px;
margin-bottom:8px;
}

.chatWrap{
padding:8px;
border-radius:18px;
margin-bottom:8px;
}

.messages{
height:70px;
padding:8px;
margin-bottom:6px;
}

.msg{
font-size:11px;
margin-bottom:4px;
}

.chatInputs{
grid-template-columns:1fr 1fr 72px;
gap:6px;
}

.chatInputs input{
height:34px;
font-size:12px;
padding:0 10px;
border-radius:10px;
min-width:0;
}

.sendBtn{
height:34px;
font-size:12px;
border-radius:10px;
}

.numberWrap{
margin:4px 0 8px;
}

#currentNumber{
font-size:60px;
}

#mode{
font-size:12px;
}

#tickets{
grid-template-columns:1fr 1fr;
gap:8px;
margin-bottom:10px;
}

.cell{
height:28px;
font-size:11px;
}

#calledBoard{
gap:4px;
margin-bottom:10px;
}

.calledNum{
height:24px;
font-size:10px;
border-radius:6px;
}

.bingoBtn{
width:120px;
height:46px;
font-size:20px;
border-radius:16px;
margin-bottom:10px;
}

}

</style>
</head>

<body>

<div class="wrapper">

<div class="logo">
<h1>MARVALOUS<br>BINGO</h1>
<p>REAL PEOPLE • REAL WINNERS</p>
</div>

<div class="videoWrap">

<div class="videoBox">

<iframe
src="https://player.twitch.tv/?channel=marvalouscomps&parent=bingo.netlify.app"
allowfullscreen>
</iframe>

</div>

</div>

<div class="chatWrap">

<div class="messages" id="messages"></div>

<div class="chatInputs">

<input id="name" placeholder="Name">

<input id="msg" placeholder="Type message...">

<button class="sendBtn" onclick="sendMsg()">
Send
</button>

</div>

</div>

<div class="numberWrap">

<div id="currentNumber">0</div>

<div id="mode">Mode: 2 LINES</div>

</div>

<div id="tickets"></div>

<div id="calledBoard"></div>

<button class="bingoBtn" onclick="checkBingo()">
BINGO
</button>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyD-4DJXkJUhgxA4RBJoWnvDKtwpzx69eQQ",
databaseURL:"https://marvalous-bingo-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let playerName=localStorage.getItem('playerName')||'Player';

function generateTicket(){

const ranges=[
[1,9],[10,19],[20,29],[30,39],[40,49],
[50,59],[60,69],[70,79],[80,90]
];

let ticket=[
["","","","","","","","",""],
["","","","","","","","",""],
["","","","","","","","",""]
];

let used=new Set();

for(let row=0;row<3;row++){

let cols=[];

while(cols.length<5){

let col=Math.floor(Math.random()*9);

if(!cols.includes(col)) cols.push(col);

}

cols.sort((a,b)=>a-b);

cols.forEach(col=>{

let min=ranges[col][0];
let max=ranges[col][1];

let num;

do{
num=Math.floor(Math.random()*(max-min+1))+min;
}
while(used.has(num));

used.add(num);

ticket[row][col]=num;

});

}

for(let col=0;col<9;col++){

let nums=[];

for(let row=0;row<3;row++){

if(ticket[row][col]!=="") nums.push(ticket[row][col]);

}

nums.sort((a,b)=>a-b);

let i=0;

for(let row=0;row<3;row++){

if(ticket[row][col]!==""){

ticket[row][col]=nums[i];
i++;

}

}

}

return ticket;

}

if(localStorage.getItem('layoutFinalV1')!=="yes"){

localStorage.removeItem('cards');

localStorage.setItem('layoutFinalV1',"yes");

}

let savedCards=localStorage.getItem('cards');

let cards=savedCards
?JSON.parse(savedCards)
:[
generateTicket(),
generateTicket(),
generateTicket(),
generateTicket()
];

localStorage.setItem('cards',JSON.stringify(cards));

function renderBoards(){

const wrap=document.getElementById('tickets');

wrap.innerHTML='';

cards.forEach(ticket=>{

let board=document.createElement('div');

board.className='ticket';

let grid=document.createElement('div');

grid.className='ticketGrid';

ticket.flat().forEach(n=>{

let div=document.createElement('div');

if(n===''){

div.className='cell blank';

}else{

div.className='cell';
div.innerText=n;
div.dataset.num=n;

}

grid.appendChild(div);

});

board.appendChild(grid);

wrap.appendChild(board);

});

}

renderBoards();

/* CALLED BOARD */

for(let i=1;i<=90;i++){

let div=document.createElement('div');

div.className='calledNum';

div.id='called-'+i;

div.innerText=i;

document.getElementById('calledBoard').appendChild(div);

}

/* FIREBASE */

db.ref('currentNumber').on('value',snap=>{

document.getElementById('currentNumber').innerText=snap.val()||0;

});

db.ref('mode').on('value',snap=>{

let mode=snap.val()||'2lines';

document.getElementById('mode').innerText=
'Mode: '+(
mode==='1line'
?'1 LINE'
:mode==='2lines'
?'2 LINES'
:'FULL HOUSE'
);

});

db.ref('calledNumbers').on('value',snap=>{

const called=Object.values(snap.val()||{});

document.querySelectorAll('.cell').forEach(c=>{

c.classList.remove('marked');

});

called.forEach(num=>{

document.querySelectorAll('.cell').forEach(c=>{

if(c.dataset.num==num){

c.classList.add('marked');

}

});

});

document.querySelectorAll('.calledNum').forEach(c=>{

c.classList.remove('calledActive');
c.classList.remove('latest');

});

called.forEach(num=>{

let ball=document.getElementById('called-'+num);

if(ball){

ball.classList.add('calledActive');

}

});

let latest=called[called.length-1];

if(latest){

let latestBall=document.getElementById('called-'+latest);

if(latestBall){

latestBall.classList.add('latest');

}

}

});

/* CHAT */

function sendMsg(){

let name=document.getElementById('name').value||'Player';

let msg=document.getElementById('msg').value;

if(!msg) return;

db.ref('chat').push({

name:name,
message:msg

});

document.getElementById('msg').value='';

}

db.ref('chat').limitToLast(50).on('child_added',snap=>{

let d=snap.val();

let div=document.createElement('div');

div.className='msg';

div.innerHTML='<b>'+d.name+':</b> '+d.message;

let box=document.getElementById('messages');

box.appendChild(div);

box.scrollTop=box.scrollHeight;

});

/* BINGO */

function checkBingo(){

db.ref('bingoClaims').push({

name:playerName,
time:Date.now()

});

alert('🎉 Bingo claimed!');

}

</script>

</body>
</html>
