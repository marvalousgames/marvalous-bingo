<!DOCTYPE html>
<html>
<head>
  <title>Marvalous Bingo 90</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      background:#090512;
      color:white;
      font-family:'Poppins',sans-serif;
      overflow-x:hidden;
    }

    body::before{
      content:'';
      position:fixed;
      inset:0;
      background:
      radial-gradient(circle at top,#8c2dff44,transparent 40%),
      radial-gradient(circle at bottom,#ff4df222,transparent 35%);
      z-index:-1;
      pointer-events:none;
    }

    .container{
      width:95%;
      max-width:900px;
      margin:auto;
      padding:18px 0 40px;
    }

    h1{
      text-align:center;
      font-size:46px;
      margin:10px 0 5px;
      color:white;
      text-shadow:
      0 0 10px #ff4df2,
      0 0 25px #ff4df2,
      0 0 45px #8c2dff;
    }

    .subTitle{
      text-align:center;
      color:#00ffcc;
      font-size:12px;
      letter-spacing:3px;
      margin-bottom:20px;
    }

    .panel{
      background:rgba(28,23,53,.92);
      border:2px solid #c44dff;
      border-radius:22px;
      padding:16px;
      margin-bottom:18px;
      box-shadow:
      0 0 25px rgba(196,77,255,.22),
      inset 0 0 25px rgba(255,255,255,.03);
    }

    .panelTitle{
      text-align:center;
      font-weight:700;
      margin-bottom:14px;
      font-size:20px;
    }

    #video-container{
      width:100%;
      height:240px;
      border-radius:18px;
      overflow:hidden;
      border:2px solid #d94dff;
      background:#120d28;
      box-shadow:0 0 25px rgba(217,77,255,.3);
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
    }

    .numberWrap{
      margin-top:18px;
      background:#120d28;
      border-radius:20px;
      border:2px solid #d94dff;
      padding:20px;
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    .numberWrap::before{
      content:'';
      position:absolute;
      width:400px;
      height:400px;
      background:radial-gradient(circle,#ff4df233,transparent 70%);
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
    }

    #currentNumber{
      position:relative;
      z-index:2;
      font-size:110px;
      line-height:1;
      font-weight:900;
      color:white;
      text-shadow:
      0 0 15px #ff4df2,
      0 0 35px #ff4df2,
      0 0 60px #8c2dff;
    }

    #mode{
      color:#00ffcc;
      font-size:18px;
      font-weight:700;
      margin-top:10px;
      letter-spacing:2px;
      position:relative;
      z-index:2;
    }

    .mainButton{
      width:100%;
      margin-top:18px;
      background:linear-gradient(45deg,#00ffcc,#00d9ff);
      border:none;
      color:black;
      font-weight:800;
      font-size:22px;
      padding:18px;
      border-radius:16px;
      box-shadow:0 0 25px rgba(0,255,204,.4);
    }

    .footerText{
      text-align:center;
      color:#9c84d6;
      margin-top:14px;
      font-size:12px;
      letter-spacing:1px;
    }

    #chat-box{
      margin-top:18px;
    }

    #messages{
      height:170px;
      overflow-y:auto;
      background:#120d28;
      border-radius:14px;
      padding:12px;
      text-align:left;
      border:1px solid #31245f;
      margin-bottom:10px;
    }

    .msg{
      margin-bottom:8px;
      font-size:14px;
    }

    .msg b{
      color:#00ffcc;
    }

    #chat-input{
      display:flex;
      gap:6px;
    }

    #chat-input input{
      flex:1;
      background:#120d28;
      border:1px solid #44336f;
      border-radius:10px;
      color:white;
      padding:12px;
      outline:none;
    }

    #chat-input button{
      background:linear-gradient(45deg,#b84dff,#ff4df2);
      border:none;
      color:white;
      border-radius:10px;
      padding:0 18px;
      font-weight:700;
    }

    #tickets{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .ticket{
      display:grid;
      grid-template-columns:repeat(9,1fr);
      gap:2px;
      background:#d94dff;
      padding:3px;
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 0 20px rgba(217,77,255,.25);
    }

    .cell{
      min-height:54px;
      background:#120d28;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      font-weight:600;
      border-radius:3px;
    }

    .blank{
      background:#0b0818;
    }

    .marked{
      background:linear-gradient(45deg,#b84dff,#ff4df2);
      color:white;
      font-weight:800;
      box-shadow:
      inset 0 0 12px rgba(255,255,255,.3),
      0 0 12px rgba(255,77,242,.8);
    }

    .infoGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:18px;
    }

    .infoCard{
      background:rgba(28,23,53,.92);
      border:2px solid #c44dff;
      border-radius:18px;
      padding:14px;
      text-align:center;
      box-shadow:0 0 20px rgba(196,77,255,.2);
    }

    .infoCard h3{
      margin:0;
      font-size:12px;
      color:#00ffcc;
      letter-spacing:1px;
    }

    .infoCard p{
      margin:8px 0 0;
      font-size:24px;
      font-weight:800;
    }

    @media(max-width:700px){

      h1{
        font-size:34px;
      }

      #currentNumber{
        font-size:82px;
      }

      .cell{
        min-height:40px;
        font-size:16px;
      }

    }

  </style>
</head>

<body>

<div class="container">

  <h1>MARVALOUS BINGO</h1>

  <div class="subTitle">
    REAL PEOPLE • REAL BINGO • REAL WINNERS
  </div>

  <!-- LIVE SECTION -->

  <div class="panel">

    <div id="video-container">
      <iframe src="https://player.twitch.tv/?channel=marvalouscomps&parent=marvalous-bingo.netlify.app"></iframe>
    </div>

    <div class="numberWrap">

      <div id="currentNumber">-</div>

      <div id="mode">Mode: 1 LINE</div>

    </div>

    <button class="mainButton" onclick="checkBingo()">
      🎉 BINGO 🎉
    </button>

    <div class="footerText">
      EYES DOWN • GOOD LUCK • PLAY RESPONSIBLY
    </div>

    <div id="chat-box">

      <div class="panelTitle" style="margin-top:20px;">
        LIVE CHAT
      </div>

      <div id="messages"></div>

      <div id="chat-input">

        <input id="name" placeholder="Name">

        <input id="msg" placeholder="Type message...">

        <button onclick="sendMsg()">Send</button>

      </div>

    </div>

  </div>

  <!-- TICKETS -->

  <div class="panel">

    <div class="panelTitle">
      YOUR TICKETS
    </div>

    <div id="tickets"></div>

  </div>

  <!-- INFO CARDS -->

  <div class="infoGrid">

    <div class="infoCard">
      <h3>GAME MODE</h3>
      <p id="topMode">1 LINE</p>
    </div>

    <div class="infoCard">
      <h3>TICKETS</h3>
      <p>4</p>
    </div>

    <div class="infoCard">
      <h3>LIVE GAME</h3>
      <p>90 BALL</p>
    </div>

    <div class="infoCard">
      <h3>STATUS</h3>
      <p>LIVE</p>
    </div>

  </div>

</div>

<script>

const firebaseConfig={
 apiKey:"AIzaSyD-4DJXkJUhgxA4RBJoWnvDKtwpzx69eQQ",
 databaseURL:"https://marvalous-bingo-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let playerName=localStorage.getItem('playerName')||'Player';

let playerId=localStorage.getItem('playerId');

if(!playerId){

 playerId=Date.now().toString();

 localStorage.setItem('playerId',playerId);

}

if(localStorage.getItem('fixedCardsV2')!=="yes"){

 localStorage.removeItem('cards');

 localStorage.setItem('fixedCardsV2',"yes");

}

function generateTicket(){

  const ranges = [
    [1,9],
    [10,19],
    [20,29],
    [30,39],
    [40,49],
    [50,59],
    [60,69],
    [70,79],
    [80,90]
  ];

  let ticket = [
    ["","","","","","","","",""],
    ["","","","","","","","",""],
    ["","","","","","","","",""]
  ];

  let used = new Set();

  for(let row=0; row<3; row++){

    let cols=[];

    while(cols.length<5){

      let col=Math.floor(Math.random()*9);

      if(!cols.includes(col)){

        cols.push(col);

      }

    }

    cols.sort((a,b)=>a-b);

    cols.forEach(col=>{

      let min=ranges[col][0];
      let max=ranges[col][1];

      let num;

      do{

        num=Math.floor(Math.random()*(max-min+1))+min;

      }while(used.has(num));

      used.add(num);

      ticket[row][col]=num;

    });

  }

  for(let col=0; col<9; col++){

    let nums=[];

    for(let row=0; row<3; row++){

      if(ticket[row][col]!==""){

        nums.push(ticket[row][col]);

      }

    }

    nums.sort((a,b)=>a-b);

    let i=0;

    for(let row=0; row<3; row++){

      if(ticket[row][col]!==""){

        ticket[row][col]=nums[i];

        i++;

      }

    }

  }

  return ticket;

}

let savedCards=localStorage.getItem('cards');

let cards=savedCards
?JSON.parse(savedCards)
:[generateTicket(),generateTicket(),generateTicket(),generateTicket()];

localStorage.setItem('cards',JSON.stringify(cards));

function renderBoards(){

 const wrap=document.getElementById('tickets');

 wrap.innerHTML='';

 cards.forEach(ticket=>{

  let board=document.createElement('div');

  board.className='ticket';

  ticket.flat().forEach(n=>{

   let div=document.createElement('div');

   if(n===''){

    div.className='cell blank';

   }else{

    div.className='cell';

    div.innerText=n;

    div.dataset.num=n;

   }

   board.appendChild(div);

  });

  wrap.appendChild(board);

 });

}

renderBoards();

let currentGameId;

db.ref('gameId').on('value',snap=>{

 let gameId=snap.val();

 if(!gameId) return;

 if(currentGameId!==gameId){

  currentGameId=gameId;

  let savedGame=localStorage.getItem('gameId');

  if(savedGame!==String(gameId)){

   cards=[
 generateTicket(),
 generateTicket(),
 generateTicket(),
 generateTicket()
];

   localStorage.setItem('cards',JSON.stringify(cards));

   localStorage.setItem('gameId',gameId);

   location.reload();

  }

  db.ref('players/'+playerId).set({

   name:playerName,

   cards:cards

  });

 }

});

let lastCalled=0;

db.ref('calledNumbers').on('value',snap=>{

 const called=Object.values(snap.val()||{});

 document.querySelectorAll('.cell').forEach(c=>{

  c.classList.remove('marked');

 });

 called.forEach(num=>{

  document.querySelectorAll('.cell').forEach(c=>{

   if(c.dataset.num==num){

    c.classList.add('marked');

   }

  });

 });

});

db.ref('currentNumber').on('value',snap=>{

 let num=snap.val();

 if(!num) return;

 document.getElementById('currentNumber').innerText=num;

 if(lastCalled!==num){

  lastCalled=num;

  let speech=new SpeechSynthesisUtterance(num);

  speech.rate=.9;

  speechSynthesis.cancel();

  speechSynthesis.speak(speech);

 }

});

db.ref('mode').on('value',snap=>{

 let mode=snap.val()||'1line';

 let text=
  mode==='1line'?'1 LINE':
  mode==='2lines'?'2 LINES':'FULL HOUSE';

 document.getElementById('mode').innerText='Mode: '+text;

 document.getElementById('topMode').innerText=text;

});

function checkBingo(){

 db.ref('bingoClaims').push({

  name:playerName,

  time:Date.now()

 });

 db.ref('bingoSound').set(Date.now());

 alert('🎉 Bingo claimed!');

}

function sendMsg(){

 let name=document.getElementById('name').value||'Player';

 let msg=document.getElementById('msg').value;

 if(!msg) return;

 localStorage.setItem('playerName',name);

 db.ref('chat').push({

  name:name,

  message:msg

 });

 document.getElementById('msg').value='';

}

db.ref('chat').limitToLast(50).on('child_added',snap=>{

 let d=snap.val();

 let div=document.createElement('div');

 div.className='msg';

 div.innerHTML='<b>'+d.name+':</b> '+d.message;

 let box=document.getElementById('messages');

 box.appendChild(div);

 box.scrollTop=box.scrollHeight;

});

const bingoAudio=new Audio(
 'https://www.soundjay.com/human/cheering-01.mp3'
);

bingoAudio.volume=1;

document.body.addEventListener('click',()=>{

 bingoAudio.play()
 .then(()=>{

  bingoAudio.pause();

  bingoAudio.currentTime=0;

 })
 .catch(()=>{});

},{once:true});

db.ref('bingoSound').on('value',snap=>{

 if(!snap.val()) return;

 bingoAudio.currentTime=0;

 bingoAudio.play().catch(()=>{});

});

</script>

</body>
</html>
