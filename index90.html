<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marvalous Bingo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:
radial-gradient(circle at top,#4b0a73,#090512 70%);
font-family:'Poppins',sans-serif;
color:white;
min-height:100vh;
overflow-y:auto;
overflow-x:hidden;
}

.app{
max-width:430px;
margin:auto;
padding:10px 10px 30px;
display:flex;
flex-direction:column;
gap:10px;
}

/* HEADER */

.topBar{
display:flex;
justify-content:space-between;
align-items:flex-start;
}

.logo{
text-align:center;
flex:1;
}

.logo h1{
font-size:38px;
line-height:.9;
font-weight:800;
color:white;
text-shadow:
0 0 10px #ff4df2,
0 0 25px #ff4df2;
}

.logo span{
display:block;
font-size:14px;
letter-spacing:4px;
color:#3dfff2;
margin-top:6px;
}

.sideInfo{
width:75px;
text-align:right;
font-weight:800;
font-size:14px;
padding-top:5px;
}

.menu{
font-size:60px;
line-height:45px;
font-weight:300;
}

/* MAIN */

.mainArea{
display:grid;
grid-template-columns:100px 1fr 75px;
align-items:center;
gap:10px;
}

.stream{
width:100px;
height:100px;
border-radius:24px;
overflow:hidden;
border:4px solid #d14dff;
box-shadow:0 0 18px #ff4df2;
background:#12071f;
}

.stream iframe{
width:100%;
height:100%;
border:none;
}

.ballWrap{
display:flex;
justify-content:center;
align-items:center;
}

.ball{
width:250px;
height:250px;
border-radius:50%;
border:8px solid #ff4df2;
display:flex;
justify-content:center;
align-items:center;
font-size:120px;
font-weight:800;
background:#14071f;
box-shadow:
0 0 35px #ff4df2,
inset 0 0 40px #5c167a;
}

.rightStats{
display:flex;
flex-direction:column;
gap:22px;
font-size:18px;
font-weight:800;
text-align:center;
}

/* LAST NUMBERS */

.lastNumbers{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:3px;
border:4px solid #c84dff;
border-radius:28px;
overflow:hidden;
background:#c84dff;
}

.lastNum{
background:#14071f;
height:74px;
display:flex;
justify-content:center;
align-items:center;
font-size:26px;
font-weight:800;
}

/* TICKETS */

.ticketPanel{
background:#1a1033;
border:4px solid #b84dff;
border-radius:34px;
padding:12px;
}

.ticketTitle{
text-align:center;
font-size:30px;
font-weight:800;
margin-bottom:12px;
}

.ticketGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.ticket{
background:#13081f;
border:4px solid #8240ff;
border-radius:26px;
padding:8px;
display:grid;
grid-template-columns:repeat(9,1fr);
gap:4px;
}

.cell{
aspect-ratio:1;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
font-weight:700;
background:#090312;
}

.blank{
background:transparent;
}

.marked{
background:#59ecff;
color:white;
box-shadow:0 0 12px #59ecff;
}

/* BOTTOM */

.bottom{
display:grid;
grid-template-columns:1fr 105px;
gap:10px;
height:160px;
}

.chat{
background:#1a1033;
border:4px solid #7647ff;
border-radius:28px;
padding:12px;
display:flex;
flex-direction:column;
}

.chat h2{
font-size:22px;
margin-bottom:6px;
}

#messages{
flex:1;
overflow-y:auto;
font-size:13px;
margin-bottom:8px;
}

.msg{
margin-bottom:5px;
}

.msg b{
color:#4fe9ff;
}

.chat input{
width:100%;
margin-bottom:6px;
padding:10px;
border:none;
border-radius:14px;
background:#12071f;
color:white;
font-size:14px;
outline:none;
}

.sendBtn{
width:100%;
padding:10px;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#b84dff,#ff4df2);
color:white;
font-size:15px;
font-weight:700;
}

.bingoBtn{
border:none;
border-radius:22px;
background:linear-gradient(45deg,#48f3ff,#29d9ff);
font-size:24px;
font-weight:800;
color:white;
box-shadow:0 0 14px #48e7ff;
max-height:140px;
align-self:center;
}

/* MOBILE */

@media(max-width:430px){

.ball{
width:210px;
height:210px;
font-size:100px;
}

.stream{
width:85px;
height:85px;
}

.ticketTitle{
font-size:24px;
}

.cell{
font-size:11px;
}

.lastNum{
height:62px;
font-size:22px;
}

.bottom{
grid-template-columns:1fr 95px;
height:150px;
}

}

</style>
</head>

<body>

<div class="app">

<!-- TOP -->

<div class="topBar">

<div class="menu">☰</div>

<div class="logo">
<h1>MARVALOUS<br>BINGO</h1>
<span>REAL PEOPLE • REAL WINNERS</span>
</div>

<div class="sideInfo">
<div id="modeText">2 LINES</div>
<br>
<div>GAME 90</div>
</div>

</div>

<!-- MAIN -->

<div class="mainArea">

<div class="stream">
<iframe
src="https://player.twitch.tv/?channel=marvalouscomps&parent=bingo.netlify.app&muted=true"
allowfullscreen>
</iframe>
</div>

<div class="ballWrap">
<div class="ball" id="currentNumber">-</div>
</div>

<div class="rightStats"></div>

</div>

<!-- LAST CALLED -->

<div class="lastNumbers" id="lastNumbers">

<div class="lastNum">-</div>
<div class="lastNum">-</div>
<div class="lastNum">-</div>
<div class="lastNum">-</div>
<div class="lastNum">-</div>

</div>

<!-- TICKETS -->

<div class="ticketPanel">

<div class="ticketTitle">
Your Tickets: 4
</div>

<div class="ticketGrid" id="tickets"></div>

</div>

<!-- BOTTOM -->

<div class="bottom">

<div class="chat">

<h2>Live Chat</h2>

<div id="messages"></div>

<input id="name" placeholder="Name">

<input id="msg" placeholder="Message...">

<button class="sendBtn" onclick="sendMsg()">
Send
</button>

</div>

<button class="bingoBtn" onclick="checkBingo()">
BINGO!
</button>

</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyD-4DJXkJUhgxA4RBJoWnvDKtwpzx69eQQ",
databaseURL:"https://marvalous-bingo-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let playerId=localStorage.getItem('playerId');

if(!playerId){

playerId=Date.now().toString();

localStorage.setItem('playerId',playerId);

}

let playerName=localStorage.getItem('playerName')||'Player';

/* GENERATE 90 BALL TICKET */

function generateTicket(){

const ranges=[
[1,9],[10,19],[20,29],[30,39],[40,49],
[50,59],[60,69],[70,79],[80,90]
];

let ticket=[
["","","","","","","","",""],
["","","","","","","","",""],
["","","","","","","","",""]
];

let used=new Set();

for(let row=0;row<3;row++){

let cols=[];

while(cols.length<5){

let col=Math.floor(Math.random()*9);

if(!cols.includes(col)) cols.push(col);

}

cols.sort((a,b)=>a-b);

cols.forEach(col=>{

let min=ranges[col][0];
let max=ranges[col][1];

let num;

do{
num=Math.floor(Math.random()*(max-min+1))+min;
}while(used.has(num));

used.add(num);

ticket[row][col]=num;

});

}

for(let col=0;col<9;col++){

let nums=[];

for(let row=0;row<3;row++){

if(ticket[row][col]!=="") nums.push(ticket[row][col]);

}

nums.sort((a,b)=>a-b);

let i=0;

for(let row=0;row<3;row++){

if(ticket[row][col]!==""){

ticket[row][col]=nums[i];
i++;

}

}

}

return ticket;

}

/* RESET SAFE */

if(localStorage.getItem('fixedCardsV7')!=="yes"){

localStorage.removeItem('cards');

localStorage.setItem('fixedCardsV7',"yes");

}

let savedCards=localStorage.getItem('cards');

let cards=savedCards
?JSON.parse(savedCards)
:[
generateTicket(),
generateTicket(),
generateTicket(),
generateTicket()
];

localStorage.setItem('cards',JSON.stringify(cards));

/* RENDER */

function renderBoards(){

const wrap=document.getElementById('tickets');

wrap.innerHTML='';

cards.forEach(ticket=>{

let board=document.createElement('div');

board.className='ticket';

ticket.flat().forEach(n=>{

let div=document.createElement('div');

if(n===''){

div.className='cell blank';

}else{

div.className='cell';
div.innerText=n;
div.dataset.num=n;

}

board.appendChild(div);

});

wrap.appendChild(board);

});

}

renderBoards();

/* GAME RESET */

let currentGameId;

db.ref('gameId').on('value',snap=>{

let gameId=snap.val();

if(!gameId) return;

if(currentGameId!==gameId){

currentGameId=gameId;

let savedGame=localStorage.getItem('gameId');

if(savedGame!==String(gameId)){

cards=[
generateTicket(),
generateTicket(),
generateTicket(),
generateTicket()
];

localStorage.setItem('cards',JSON.stringify(cards));
localStorage.setItem('gameId',gameId);

location.reload();

}

}

});

/* CALLED NUMBERS */

db.ref('calledNumbers').on('value',snap=>{

const called=Object.values(snap.val()||{});

document.querySelectorAll('.cell').forEach(c=>{

c.classList.remove('marked');

});

called.forEach(num=>{

document.querySelectorAll('.cell').forEach(c=>{

if(c.dataset.num==num){

c.classList.add('marked');

}

});

});

const last=called.slice(-5).reverse();

const boxes=document.querySelectorAll('.lastNum');

boxes.forEach((b,i)=>{

b.innerText=last[i]||'-';

});

});

/* CURRENT NUMBER */

db.ref('currentNumber').on('value',snap=>{

let num=snap.val();

if(!num) return;

document.getElementById('currentNumber').innerText=num;

});

/* MODE */

db.ref('mode').on('value',snap=>{

let mode=snap.val()||'1line';

let text=
mode==='1line'?'1 LINE':
mode==='2lines'?'2 LINES':'FULL HOUSE';

document.getElementById('modeText').innerText=text;

});

/* BINGO */

function checkBingo(){

db.ref('bingoClaims').push({

name:playerName,
time:Date.now()

});

alert('BINGO CLAIMED!');

}

/* CHAT */

function sendMsg(){

let name=document.getElementById('name').value||'Player';

let msg=document.getElementById('msg').value;

if(!msg) return;

localStorage.setItem('playerName',name);

db.ref('chat').push({

name:name,
message:msg

});

document.getElementById('msg').value='';

}

db.ref('chat').limitToLast(50).on('child_added',snap=>{

let d=snap.val();

let div=document.createElement('div');

div.className='msg';

div.innerHTML='<b>'+d.name+':</b> '+d.message;

let box=document.getElementById('messages');

box.appendChild(div);

box.scrollTop=box.scrollHeight;

});

</script>

</body>
</html>
