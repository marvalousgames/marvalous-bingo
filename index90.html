<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marvalous Bingo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

@media(max-width:768px){

body{
padding:6px;
overflow:hidden;
}

.wrapper{
transform:scale(.78);
transform-origin:top center;
width:128%;
margin-left:-14%;
}

.logo{
margin-bottom:4px;
}

.logo h1{
font-size:34px;
line-height:.9;
}

.logo p{
font-size:8px;
letter-spacing:4px;
margin-top:2px;
}

.videoWrap{
padding:6px;
border-radius:18px;
margin-bottom:8px;
}

.chatWrap{
padding:8px;
border-radius:18px;
margin-bottom:8px;
}

.messages{
height:72px;
padding:8px;
margin-bottom:6px;
}

.msg{
font-size:11px;
margin-bottom:4px;
}

.chatInputs{
grid-template-columns:1fr 1fr 72px;
gap:6px;
}

.chatInputs input{
height:34px;
font-size:12px;
padding:0 10px;
border-radius:10px;
}

.sendBtn{
height:34px;
font-size:12px;
border-radius:10px;
}

.numberWrap{
margin:4px 0 8px;
}

#currentNumber{
font-size:62px;
}

#mode{
font-size:12px;
}

#tickets{
gap:8px;
margin-bottom:10px;
}

.cell{
height:28px;
font-size:11px;
}

#calledBoard{
gap:4px;
margin-bottom:10px;
}

.calledNum{
height:24px;
font-size:10px;
border-radius:6px;
}

.bingoBtn{
width:120px;
height:44px;
font-size:20px;
border-radius:16px;
margin-bottom:0;
}

}

/* MOBILE */

@media(max-width:768px){

.logo h1{
font-size:42px;
}

.logo p{
font-size:10px;
letter-spacing:5px;
}

.videoWrap,
.chatWrap{
border-radius:22px;
padding:10px;
}

.messages{
height:92px;
padding:12px;
}

.msg{
font-size:14px;
}

.chatInputs{
grid-template-columns:1fr 1fr 82px;
gap:8px;
}

.chatInputs input{
height:44px;
font-size:15px;
border-radius:14px;
padding:0 12px;
min-width:0;
}

.sendBtn{
height:44px;
font-size:14px;
border-radius:14px;
}

#currentNumber{
font-size:86px;
}

#mode{
font-size:16px;
}

#tickets{
grid-template-columns:1fr 1fr;
gap:10px;
}

.cell{
height:42px;
font-size:14px;
}

#calledBoard{
gap:5px;
}

.calledNum{
height:34px;
font-size:12px;
border-radius:8px;
}

.bingoBtn{
width:170px;
height:64px;
font-size:26px;
border-radius:22px;
}

}

</style>
</head>

<body>

<div class="wrapper">

<div class="logo">
<h1>MARVALOUS<br>BINGO</h1>
<p>REAL PEOPLE • REAL WINNERS</p>
</div>

<div class="videoWrap">

<div class="videoBox">

<iframe
src="https://player.twitch.tv/?channel=marvalouscomps&parent=bingo.netlify.app"
allowfullscreen>
</iframe>

</div>

</div>

<div class="chatWrap">

<div class="messages" id="messages"></div>

<div class="chatInputs">

<input id="name" placeholder="Name">

<input id="msg" placeholder="Type message...">

<button class="sendBtn" onclick="sendMsg()">
Send
</button>

</div>

</div>

<div class="numberWrap">

<div id="currentNumber">0</div>

<div id="mode">Mode: 2 LINES</div>

</div>

<div id="tickets"></div>

<div id="calledBoard"></div>

<button class="bingoBtn" onclick="checkBingo()">
BINGO
</button>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyD-4DJXkJUhgxA4RBJoWnvDKtwpzx69eQQ",
databaseURL:"https://marvalous-bingo-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let playerName=localStorage.getItem('playerName')||'Player';

let playerId=localStorage.getItem('playerId');

if(!playerId){

playerId=Date.now().toString();

localStorage.setItem('playerId',playerId);

}

/* FIXED 4 CARDS */

if(localStorage.getItem('layoutV4')!=="yes"){

localStorage.removeItem('cards');

localStorage.setItem('layoutV4',"yes");

}

function generateTicket(){

const ranges=[
[1,9],[10,19],[20,29],[30,39],[40,49],
[50,59],[60,69],[70,79],[80,90]
];

let ticket=[
["","","","","","","","",""],
["","","","","","","","",""],
["","","","","","","","",""]
];

let used=new Set();

for(let row=0;row<3;row++){

let cols=[];

while(cols.length<5){

let col=Math.floor(Math.random()*9);

if(!cols.includes(col)) cols.push(col);

}

cols.sort((a,b)=>a-b);

cols.forEach(col=>{

let min=ranges[col][0];
let max=ranges[col][1];

let num;

do{

num=Math.floor(Math.random()*(max-min+1))+min;

}while(used.has(num));

used.add(num);

ticket[row][col]=num;

});

}

for(let col=0;col<9;col++){

let nums=[];

for(let row=0;row<3;row++){

if(ticket[row][col]!==""){

nums.push(ticket[row][col]);

}

}

nums.sort((a,b)=>a-b);

let i=0;

for(let row=0;row<3;row++){

if(ticket[row][col]!==""){

ticket[row][col]=nums[i];
i++;

}

}

}

return ticket;

}

/* 4 TICKETS */

let savedCards=localStorage.getItem('cards');

let cards=savedCards
?JSON.parse(savedCards)
:[
generateTicket(),
generateTicket(),
generateTicket(),
generateTicket()
];

localStorage.setItem('cards',JSON.stringify(cards));

function renderBoards(){

const wrap=document.getElementById('tickets');

wrap.innerHTML='';

cards.forEach(ticket=>{

let board=document.createElement('div');

board.className='ticket';

let grid=document.createElement('div');

grid.className='ticketGrid';

ticket.flat().forEach(n=>{

let div=document.createElement('div');

if(n===''){

div.className='cell blank';

}else{

div.className='cell';
div.innerText=n;
div.dataset.num=n;

}

grid.appendChild(div);

});

board.appendChild(grid);

wrap.appendChild(board);

});

}

renderBoards();

/* CALLED BOARD */

for(let i=1;i<=90;i++){

let div=document.createElement('div');

div.className='calledNum';

div.id='called-'+i;

div.innerText=i;

document.getElementById('calledBoard').appendChild(div);

}

/* GAME */

db.ref('currentNumber').on('value',snap=>{

let num=snap.val()||0;

document.getElementById('currentNumber').innerText=num;

});

db.ref('mode').on('value',snap=>{

let mode=snap.val()||'2lines';

document.getElementById('mode').innerText=
'Mode: '+(
mode==='1line'
?'1 LINE'
:mode==='2lines'
?'2 LINES'
:'FULL HOUSE'
);

});

db.ref('calledNumbers').on('value',snap=>{

const called=Object.values(snap.val()||{});

document.querySelectorAll('.cell').forEach(c=>{

c.classList.remove('marked');

});

called.forEach(num=>{

document.querySelectorAll('.cell').forEach(c=>{

if(c.dataset.num==num){

c.classList.add('marked');

}

});

});

document.querySelectorAll('.calledNum').forEach(c=>{

c.classList.remove('calledActive');
c.classList.remove('latest');

});

called.forEach(num=>{

let ball=document.getElementById('called-'+num);

if(ball){

ball.classList.add('calledActive');

}

});

let latest=called[called.length-1];

if(latest){

let latestBall=document.getElementById('called-'+latest);

if(latestBall){

latestBall.classList.add('latest');

}

}

});

/* CHAT */

function sendMsg(){

let name=document.getElementById('name').value||'Player';

let msg=document.getElementById('msg').value;

if(!msg) return;

localStorage.setItem('playerName',name);

db.ref('chat').push({

name:name,
message:msg

});

document.getElementById('msg').value='';

}

db.ref('chat').limitToLast(50).on('child_added',snap=>{

let d=snap.val();

let div=document.createElement('div');

div.className='msg';

div.innerHTML='<b>'+d.name+':</b> '+d.message;

let box=document.getElementById('messages');

box.appendChild(div);

box.scrollTop=box.scrollHeight;

});

/* BINGO */

function checkBingo(){

db.ref('bingoClaims').push({

name:playerName,
time:Date.now()

});

alert('🎉 Bingo claimed!');

}

</script>

</body>
</html>
