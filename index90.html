<body>

<div class="container">

<h1>MARVALOUS BINGO</h1>

<div class="subTitle">
REAL PEOPLE • REAL WINNERS
</div>

<!-- TOP STREAM SECTION -->

<div class="panel">

<div id="video-container">
<iframe src="https://player.twitch.tv/?channel=marvalouscomps&parent=marvalous-bingo.netlify.app"></iframe>
</div>

<div class="numberWrap">

<div id="currentNumber">-</div>

<div id="mode">Mode: 1 LINE</div>

</div>

<button class="mainButton" onclick="checkBingo()">
🎉 BINGO 🎉
</button>

<div class="panelTitle" style="margin-top:25px;">
LIVE CHAT
</div>

<div id="messages"></div>

<div id="chat-input">

<input id="name" placeholder="Name">

<input id="msg" placeholder="Type message...">

<button onclick="sendMsg()">Send</button>

</div>

</div>

<!-- TICKETS IN MIDDLE -->

<div class="panel">

<div class="panelTitle">
YOUR TICKETS
</div>

<div id="tickets"></div>

</div>

<!-- INFO BOXES AT VERY BOTTOM -->

<div class="infoGrid">

<div class="infoCard">
<h3>GAME MODE</h3>
<p id="topMode">1 LINE</p>
</div>

<div class="infoCard">
<h3>TICKETS</h3>
<p>4</p>
</div>

<div class="infoCard">
<h3>LIVE GAME</h3>
<p>90 BALL</p>
</div>

<div class="infoCard">
<h3>STATUS</h3>
<p>LIVE</p>
</div>

</div>

</div>
