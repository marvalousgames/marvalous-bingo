<!DOCTYPE html>
<html>
<head>
  <title>Marvalous Bingo</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0e0b1f;
      color: white;
      text-align: center;
    }

    h1 {
      color: #b84dff;
      margin-top: 10px;
    }

    #video-container {
      width: 95%;
      max-width: 700px;
      height: 320px;
      margin: 15px auto;
      border-radius: 15px;
      overflow: hidden;
      background: #1c1735;
      box-shadow: 0 0 25px rgba(184,77,255,0.4);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #chat-box {
      width: 95%;
      max-width: 700px;
      margin: 10px auto;
      background: #1c1735;
      border-radius: 15px;
      padding: 10px;
    }

    #messages {
      height: 180px;
      overflow-y: auto;
      text-align: left;
      padding: 10px;
      font-size: 14px;
    }

    .msg {
      margin-bottom: 6px;
    }

    .msg b {
      color: #00ffcc;
    }

    #chat-input {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    #chat-input input {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: none;
    }

    #chat-input button {
      background: #b84dff;
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
    }

    #currentNumber {
      font-size: 46px;
      margin: 15px 0;
      color: #ff4df2;
    }

    #mode {
      color: #00ffcc;
      margin-bottom: 10px;
    }

    #tickets {
      width: 95%;
      max-width: 900px;
      margin: auto;
    }

    .ticket {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      background: white;
      border: 2px solid #444;
      margin-bottom: 20px;
    }

    .cell {
      background: white;
      color: black;
      padding: 18px 8px;
      font-size: 28px;
      font-weight: bold;
      border: 1px solid #999;
      min-height: 45px;

      display: flex;
      align-items: center;
      justify-content: center;

      cursor: pointer;
    }

    .free {
      background: #f2f2f2;
      color: transparent;
      cursor: default;
    }

    .marked {
      background: #ffeb3b;
      color: black;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      background: #00ffcc;
      font-weight: bold;
    }

    #winner {
      display: none;
      background: #00ffcc;
      color: black;
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- NAME POPUP -->
<div id="nameModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div style="background:#1c1735;padding:20px;border-radius:12px;text-align:center;width:80%;max-width:300px;">
    <h2 style="color:#b84dff;">Enter your name</h2>

    <input id="modalName" placeholder="Your name" style="width:100%;padding:10px;border-radius:8px;border:none;margin-top:10px;">

    <button onclick="saveName()" style="margin-top:10px;width:100%;padding:10px;background:#00ffcc;border:none;border-radius:8px;font-weight:bold;">
      Join Game
    </button>
  </div>
</div>

<h1>MARVALOUS BINGO</h1>

<div id="video-container">
  <iframe src="https://player.twitch.tv/?channel=marvalouscomps&parent=marvalous-bingo.netlify.app"></iframe>
</div>

<div id="chat-box">
  <div id="messages"></div>

  <div id="chat-input">
    <input id="name" placeholder="Name">
    <input id="msg" placeholder="Type message...">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<div id="currentNumber">Waiting...</div>

<div id="mode">Mode: 1 LINE</div>

<div id="winner">🎉 WE HAVE A WINNER 🎉</div>

<div id="tickets"></div>

<button onclick="checkBingo()">BINGO</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyD-4DJXkJUhgxA4RBJoWnvDKtwpzx69eQQ",
  databaseURL: "https://marvalous-bingo-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* PLAYER */

let playerName = localStorage.getItem("playerName") || "Player";

let playerId = localStorage.getItem("playerId");

if (!playerId) {
  playerId = Date.now().toString();
  localStorage.setItem("playerId", playerId);
}

/* CARD */

function generateCard() {

  let rows = [
    ["","","","","","","","",""],
    ["","","","","","","","",""],
    ["","","","","","","","",""]
  ];

  let nums = [];

  for(let i=1;i<=90;i++){
    nums.push(i);
  }

  nums.sort(()=>Math.random()-0.5);

  let used = nums.slice(0,15);

  used.sort((a,b)=>a-b);

  let rowCounts=[0,0,0];

  used.forEach(num=>{

    let col=Math.floor((num-1)/10);

    if(num===90) col=8;

    let possible=[];

    for(let r=0;r<3;r++){
      if(rowCounts[r]<5 && rows[r][col]===""){
        possible.push(r);
      }
    }

    let row=possible[Math.floor(Math.random()*possible.length)];

    rows[row][col]=num;

    rowCounts[row]++;

  });

  return rows.flat();

}

/* LOAD CARD */

let cards = [
  generateCard(),
  generateCard(),
  generateCard()
];

renderBoard();

/* GAME SYNC */

let currentGameId;

db.ref("gameId").on("value", snap=>{

  let gameId=snap.val();

  if(!gameId) return;

  if(currentGameId!==gameId){

    currentGameId=gameId;

    let savedGame=localStorage.getItem("gameId");

    if(savedGame!==String(gameId)){

      cards = [
        generateCard(),
        generateCard(),
        generateCard()
      ];

      localStorage.setItem("gameId",gameId);

      location.reload();
    }

    db.ref("players/"+playerId).set({
      name: playerName,
      cards: cards
    });

  }

});

/* BOARD */

function renderBoard(){

  const tickets=document.getElementById("tickets");

  tickets.innerHTML="";

  cards.forEach(card=>{

    let board=document.createElement("div");

    board.className="ticket";

    card.forEach(n=>{

      let div=document.createElement("div");

      if(n===""){
        div.className="cell free";
        div.innerText="";
      } else {
        div.className="cell";
        div.innerText=n;
        div.onclick=()=>div.classList.toggle("marked");
      }

      board.appendChild(div);

    });

    tickets.appendChild(board);

  });

}

/* NUMBER */

let lastCalledNumber = null;

db.ref("currentNumber").on("value",snap=>{

  let num=snap.val();

  if(!num) return;

  document.getElementById("currentNumber").innerText=num;

  document.querySelectorAll(".cell").forEach(c=>{
    if(c.innerText==num)c.classList.add("marked");
  });

  if(lastCalledNumber !== num){

    lastCalledNumber = num;

    let speech = new SpeechSynthesisUtterance(num);

    speech.rate = 0.9;
    speech.pitch = 1;

    speechSynthesis.cancel();
    speechSynthesis.speak(speech);

  }

});

/* MODE */

db.ref("mode").on("value",snap=>{

  let mode=snap.val()||"1line";

  document.getElementById("mode").innerText=
  "Mode: "+(mode==="1line"?"1 LINE":mode==="2lines"?"2 LINES":"FULL HOUSE");

});

/* BINGO */

function checkBingo(){

  alert("90 Ball Bingo checking coming next");

}

/* CHAT */

function sendMsg(){

  let name=document.getElementById("name").value||"Player";

  let msg=document.getElementById("msg").value;

  if(!msg)return;

  localStorage.setItem("playerName",name);

  db.ref("chat").push({
    name:name,
    message:msg
  });

  document.getElementById("msg").value="";

}

db.ref("chat").limitToLast(50).on("child_added",snap=>{

  let d=snap.val();

  let div=document.createElement("div");

  div.className="msg";

  div.innerHTML="<b>"+d.name+":</b> "+d.message;

  let box=document.getElementById("messages");

  box.appendChild(div);

  box.scrollTop=box.scrollHeight;

});

/* NAME MODAL */

window.onload = () => {

  let modal = document.getElementById("nameModal");

  let saved = localStorage.getItem("playerName");

  if(saved){
    document.getElementById("name").value = saved;
    modal.style.display = "none";
  }

  window.saveName = function () {

    let name = document.getElementById("modalName").value.trim();

    if(!name){
      alert("Enter name");
      return;
    }

    localStorage.setItem("playerName", name);

    playerName = name;

    document.getElementById("name").value = name;

    modal.style.display = "none";

  };

};

</script>

</body>
</html>
