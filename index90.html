<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marvalous Bingo 90</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#090512;
font-family:'Poppins',sans-serif;
color:white;
overflow:hidden;
height:100vh;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at top,#8c2dff44,transparent 40%),
radial-gradient(circle at bottom,#ff4df222,transparent 35%);
z-index:-1;
}

.container{
height:100vh;
display:flex;
flex-direction:column;
padding:10px;
gap:10px;
}

/* HEADER */

.header{
text-align:center;
}

.header h1{
font-size:28px;
font-weight:800;
line-height:1;
text-shadow:
0 0 10px #ff4df2,
0 0 30px #ff4df2;
}

.subTitle{
font-size:10px;
letter-spacing:4px;
color:#00ffcc;
margin-top:6px;
}

/* TOP SECTION */

.topGrid{
display:grid;
grid-template-columns:2fr 1fr;
gap:10px;
height:34vh;
}

.panel{
background:#1c1735;
border:2px solid #b84dff;
border-radius:20px;
padding:10px;
box-shadow:
0 0 20px rgba(184,77,255,.25),
inset 0 0 12px rgba(255,255,255,.03);
}

/* STREAM */

#video-container{
width:100%;
height:100%;
overflow:hidden;
border-radius:14px;
}

iframe{
width:100%;
height:100%;
border:none;
}

/* SIDE PANEL */

.sidePanel{
display:flex;
flex-direction:column;
gap:10px;
}

.numberWrap{
flex:1;
background:#120d28;
border:2px solid #d94dff;
border-radius:18px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
}

.numberWrap::before{
content:'';
position:absolute;
width:220px;
height:220px;
background:radial-gradient(circle,#ff4df244,transparent 70%);
}

#currentNumber{
position:relative;
font-size:68px;
font-weight:900;
line-height:1;
text-shadow:
0 0 15px #ff4df2,
0 0 35px #ff4df2;
}

#mode{
position:relative;
font-size:14px;
font-weight:700;
color:#00ffcc;
margin-top:6px;
}

.mainButton{
height:60px;
border:none;
border-radius:16px;
background:linear-gradient(45deg,#00ffcc,#00d9ff);
font-size:22px;
font-weight:800;
color:black;
box-shadow:0 0 20px rgba(0,255,204,.5);
}

/* CHAT */

.chatBox{
height:16vh;
display:flex;
flex-direction:column;
}

.chatTitle{
text-align:center;
font-size:18px;
font-weight:800;
margin-bottom:8px;
}

#messages{
flex:1;
overflow-y:auto;
background:#120d28;
border:1px solid #31245f;
border-radius:10px;
padding:8px;
font-size:13px;
margin-bottom:8px;
}

.msg{
margin-bottom:5px;
}

.msg b{
color:#00ffcc;
}

#chat-input{
display:flex;
gap:6px;
}

#chat-input input{
flex:1;
padding:10px;
background:#120d28;
border:1px solid #44336f;
border-radius:10px;
color:white;
font-size:13px;
}

#chat-input button{
padding:0 14px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#b84dff,#ff4df2);
color:white;
font-weight:700;
}

/* TICKETS */

.ticketPanel{
flex:1;
display:flex;
flex-direction:column;
min-height:0;
}

.ticketTitle{
text-align:center;
font-size:20px;
font-weight:800;
margin-bottom:8px;
}

#tickets{
flex:1;
overflow:hidden;
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.ticket{
display:grid;
grid-template-columns:repeat(9,1fr);
gap:1px;
background:#d94dff;
padding:2px;
border-radius:10px;
overflow:hidden;
height:100%;
}

.cell{
background:#120d28;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:700;
min-height:22px;
}

.blank{
background:#0b0818;
}

.marked{
background:linear-gradient(45deg,#b84dff,#ff4df2);
box-shadow:0 0 10px rgba(255,77,242,.7);
}

/* INFO */

.infoGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
height:70px;
}

.infoCard{
background:#1c1735;
border:2px solid #b84dff;
border-radius:14px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.infoCard h3{
font-size:10px;
color:#00ffcc;
margin-bottom:4px;
}

.infoCard p{
font-size:18px;
font-weight:800;
}

/* MOBILE */

@media(max-width:700px){

.topGrid{
height:30vh;
}

#currentNumber{
font-size:54px;
}

.mainButton{
font-size:18px;
height:54px;
}

.ticketTitle{
font-size:16px;
}

.cell{
font-size:11px;
min-height:20px;
}

.infoCard p{
font-size:15px;
}

}

</style>
</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<h1>MARVALOUS BINGO</h1>

<div class="subTitle">
REAL PEOPLE • REAL WINNERS
</div>

</div>

<!-- TOP -->

<div class="topGrid">

<div class="panel">

<div id="video-container">
<iframe src="https://player.twitch.tv/?channel=marvalouscomps&parent=marvalous-bingo.netlify.app"></iframe>
</div>

</div>

<div class="sidePanel">

<div class="numberWrap">

<div id="currentNumber">-</div>

<div id="mode">Mode: 1 LINE</div>

</div>

<button class="mainButton" onclick="checkBingo()">
🎉 BINGO
</button>

</div>

</div>

<!-- CHAT -->

<div class="panel chatBox">

<div class="chatTitle">
LIVE CHAT
</div>

<div id="messages"></div>

<div id="chat-input">

<input id="name" placeholder="Name">

<input id="msg" placeholder="Message...">

<button onclick="sendMsg()">Send</button>

</div>

</div>

<!-- TICKETS -->

<div class="panel ticketPanel">

<div class="ticketTitle">
YOUR TICKETS
</div>

<div id="tickets"></div>

</div>

<!-- INFO -->

<div class="infoGrid">

<div class="infoCard">
<h3>MODE</h3>
<p id="topMode">1 LINE</p>
</div>

<div class="infoCard">
<h3>TICKETS</h3>
<p>4</p>
</div>

<div class="infoCard">
<h3>GAME</h3>
<p>90</p>
</div>

<div class="infoCard">
<h3>LIVE</h3>
<p>ON</p>
</div>

</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyD-4DJXkJUhgxA4RBJoWnvDKtwpzx69eQQ",
databaseURL:"https://marvalous-bingo-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let playerName=localStorage.getItem('playerName')||'Player';

let playerId=localStorage.getItem('playerId');

if(!playerId){

playerId=Date.now().toString();

localStorage.setItem('playerId',playerId);

}

function generateTicket(){

const ranges=[
[1,9],[10,19],[20,29],[30,39],[40,49],
[50,59],[60,69],[70,79],[80,90]
];

let ticket=[
["","","","","","","","",""],
["","","","","","","","",""],
["","","","","","","","",""]
];

let used=new Set();

for(let row=0;row<3;row++){

let cols=[];

while(cols.length<5){

let col=Math.floor(Math.random()*9);

if(!cols.includes(col)) cols.push(col);

}

cols.sort((a,b)=>a-b);

cols.forEach(col=>{

let min=ranges[col][0];
let max=ranges[col][1];

let num;

do{

num=Math.floor(Math.random()*(max-min+1))+min;

}while(used.has(num));

used.add(num);

ticket[row][col]=num;

});

}

for(let col=0;col<9;col++){

let nums=[];

for(let row=0;row<3;row++){

if(ticket[row][col]!=="") nums.push(ticket[row][col]);

}

nums.sort((a,b)=>a-b);

let i=0;

for(let row=0;row<3;row++){

if(ticket[row][col]!==""){

ticket[row][col]=nums[i];

i++;

}

}

}

return ticket;

}

let savedCards=localStorage.getItem('cards');

let cards=savedCards
?JSON.parse(savedCards)
:[
generateTicket(),
generateTicket(),
generateTicket(),
generateTicket()
];

localStorage.setItem('cards',JSON.stringify(cards));

function renderBoards(){

const wrap=document.getElementById('tickets');

wrap.innerHTML='';

cards.forEach(ticket=>{

let board=document.createElement('div');

board.className='ticket';

ticket.flat().forEach(n=>{

let div=document.createElement('div');

if(n===''){

div.className='cell blank';

}else{

div.className='cell';

div.innerText=n;

div.dataset.num=n;

}

board.appendChild(div);

});

wrap.appendChild(board);

});

}

renderBoards();

db.ref('calledNumbers').on('value',snap=>{

const called=Object.values(snap.val()||{});

document.querySelectorAll('.cell').forEach(c=>{

c.classList.remove('marked');

});

called.forEach(num=>{

document.querySelectorAll('.cell').forEach(c=>{

if(c.dataset.num==num){

c.classList.add('marked');

}

});

});

});

db.ref('currentNumber').on('value',snap=>{

let num=snap.val();

if(!num) return;

document.getElementById('currentNumber').innerText=num;

});

db.ref('mode').on('value',snap=>{

let mode=snap.val()||'1line';

let text=
mode==='1line'?'1 LINE':
mode==='2lines'?'2 LINES':'FULL HOUSE';

document.getElementById('mode').innerText='Mode: '+text;

document.getElementById('topMode').innerText=text;

});

function checkBingo(){

alert('🎉 Bingo claimed!');

}

function sendMsg(){

let name=document.getElementById('name').value||'Player';

let msg=document.getElementById('msg').value;

if(!msg) return;

db.ref('chat').push({

name:name,
message:msg

});

document.getElementById('msg').value='';

}

db.ref('chat').limitToLast(50).on('child_added',snap=>{

let d=snap.val();

let div=document.createElement('div');

div.className='msg';

div.innerHTML='<b>'+d.name+':</b> '+d.message;

let box=document.getElementById('messages');

box.appendChild(div);

box.scrollTop=box.scrollHeight;

});

</script>

</body>
</html>
