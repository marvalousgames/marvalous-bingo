<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Marvalous Bingo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .neon-purple { text-shadow: 0 0 15px rgb(168 85 247), 0 0 30px rgb(168 85 247); }
    .neon-cyan { text-shadow: 0 0 15px rgb(34 211 238), 0 0 30px rgb(34 211 238); }
    .ticket-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 2px;
      background: #1f2937;
      padding: 3px;
      border-radius: 8px;
    }
    .ticket-cell {
      aspect-ratio: 1/1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      background: #334155;
      color: white;
      border-radius: 4px;
    }
    .called { 
      background: #22d3ee !important; 
      color: black !important; 
      font-weight: 700;
    }
  </style>
</head>
<body class="h-screen bg-gradient-to-b from-purple-950 to-black text-white overflow-hidden flex flex-col">

  <!-- HEADER -->
  <div class="bg-black/60 border-b border-purple-500 px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <i class="fas fa-bars text-2xl"></i>
      <h1 class="text-2xl font-bold tracking-wider neon-purple">MARVALOUS BINGO</h1>
    </div>
    <div class="text-right">
      <div class="text-sm text-purple-300">2 LINES</div>
      <div class="text-xl font-bold">GAME 90</div>
    </div>
  </div>

  <div class="flex-1 overflow-hidden flex flex-col p-3 gap-3">

    <!-- LIVE STREAM + CALLED NUMBER -->
    <div class="flex gap-3">
      <!-- Live Stream -->
      <div class="w-28 flex-shrink-0">
        <div class="relative bg-black rounded-xl overflow-hidden border border-purple-500">
          <div class="bg-red-600 text-xs px-2 py-0.5 absolute top-2 left-2 rounded">LIVE</div>
          <img src="https://picsum.photos/id/64/200/140" alt="Live Stream" class="w-full h-20 object-cover">
          <div class="text-center text-xs py-1 bg-black/80">marvalouscomps</div>
        </div>
      </div>

      <!-- Called Number -->
      <div class="flex-1 flex flex-col items-center justify-center">
        <div class="relative w-48 h-48">
          <div class="absolute inset-0 bg-purple-600/30 rounded-full blur-3xl"></div>
          <div class="relative w-full h-full border-8 border-purple-500 rounded-full flex items-center justify-center neon-purple">
            <div class="text-8xl font-bold">66</div>
          </div>
        </div>
      </div>
    </div>

    <!-- LAST CALLED -->
    <div class="bg-black/70 border border-purple-600 rounded-2xl p-3">
      <div class="text-purple-300 text-sm mb-2 text-center">LAST CALLED</div>
      <div class="grid grid-cols-5 gap-2 text-center">
        <div class="bg-purple-900 rounded-xl py-2 text-lg font-bold">24</div>
        <div class="bg-purple-900 rounded-xl py-2 text-lg font-bold">74</div>
        <div class="bg-purple-900 rounded-xl py-2 text-lg font-bold">19</div>
        <div class="bg-purple-900 rounded-xl py-2 text-lg font-bold">27</div>
        <div class="bg-cyan-500 text-black rounded-xl py-2 text-lg font-bold">45</div>
      </div>
    </div>

    <!-- TICKETS -->
    <div class="flex-1 overflow-hidden">
      <div class="flex justify-between items-center mb-2">
        <h3 class="font-semibold">Your Tickets: <span class="text-purple-400">4</span></h3>
        <div class="text-xs bg-purple-900 px-3 py-1 rounded-full">2 LINES MODE</div>
      </div>

      <div class="grid grid-cols-2 gap-3 h-full">
        <!-- Ticket 1 -->
        <div class="ticket-grid text-[10px]">
          <div class="ticket-cell">16</div><div class="ticket-cell"></div><div class="ticket-cell">41</div><div class="ticket-cell">52</div><div class="ticket-cell"></div><div class="ticket-cell"></div><div class="ticket-cell">83</div>
          <div class="ticket-cell">1</div><div class="ticket-cell">21</div><div class="ticket-cell">33</div><div class="ticket-cell called">54</div><div class="ticket-cell">77</div>
          <div class="ticket-cell">2</div><div class="ticket-cell">29</div><div class="ticket-cell">39</div><div class="ticket-cell">55</div><div class="ticket-cell called">85</div>
        </div>

        <!-- Ticket 2 -->
        <div class="ticket-grid text-[10px]">
          <div class="ticket-cell">4</div><div class="ticket-cell">20</div><div class="ticket-cell"></div><div class="ticket-cell">50</div><div class="ticket-cell">62</div><div class="ticket-cell"></div><div class="ticket-cell">89</div>
          <div class="ticket-cell">6</div><div class="ticket-cell">23</div><div class="ticket-cell called">44</div><div class="ticket-cell">53</div><div class="ticket-cell">70</div>
          <div class="ticket-cell">8</div><div class="ticket-cell">12</div><div class="ticket-cell">28</div><div class="ticket-cell">59</div><div class="ticket-cell">72</div>
        </div>

        <!-- Ticket 3 & 4 would go here in real code (you can duplicate above) -->
        <!-- For brevity I showed 2, but you can copy the same structure for the bottom two -->
      </div>
    </div>

  </div>

  <!-- BOTTOM SECTION -->
  <div class="grid grid-cols-2 gap-3 p-3 bg-black/80 border-t border-purple-600">
    <!-- Live Chat -->
    <div class="bg-zinc-900 rounded-2xl p-3 text-sm">
      <div class="font-semibold mb-2 flex items-center gap-2">
        <i class="fas fa-comment-dots"></i> Live Chat
      </div>
      <div class="space-y-1 text-xs max-h-20 overflow-y-auto">
        <div><span class="text-cyan-400">Kee:</span> hi</div>
        <div><span class="text-cyan-400">Kee:</span> hi again</div>
        <div><span class="text-cyan-400">Kee:</span> hey</div>
      </div>
    </div>

    <!-- BINGO Button -->
    <button onclick="claimBingo()" 
            class="bg-gradient-to-r from-cyan-400 to-purple-500 text-black font-bold text-3xl py-6 rounded-3xl active:scale-95 transition-transform neon-cyan">
      BINGO!
    </button>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bg-black border-t border-purple-600 py-2 flex justify-around text-xs">
    <div class="flex flex-col items-center text-purple-400">
      <i class="fas fa-home"></i><span>Mode</span>
    </div>
    <div class="flex flex-col items-center text-purple-400">
      <i class="fas fa-ticket-alt"></i><span>Tickets</span>
    </div>
    <div class="flex flex-col items-center text-purple-400">
      <i class="fas fa-dice"></i><span>Game</span>
    </div>
    <div class="flex flex-col items-center text-purple-400">
      <i class="fas fa-video"></i><span>Live</span>
    </div>
  </div>

  <script>
    function claimBingo() {
      alert("🎉 BINGO claimed! (This would trigger real logic)");
    }

    // Tailwind script already included via CDN
  </script>
</body>
</html>
