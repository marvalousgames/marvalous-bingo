function generateTicket(){

const ranges=[
[1,9],[10,19],[20,29],[30,39],[40,49],
[50,59],[60,69],[70,79],[80,90]
];

let ticket=[
["","","","","","","","",""],
["","","","","","","","",""],
["","","","","","","","",""]
];

let used=new Set();

for(let row=0;row<3;row++){

let cols=[];

while(cols.length<5){

let col=Math.floor(Math.random()*9);

if(!cols.includes(col)) cols.push(col);

}

cols.sort((a,b)=>a-b);

cols.forEach(col=>{

let min=ranges[col][0];
let max=ranges[col][1];

let num;

do{
num=Math.floor(Math.random()*(max-min+1))+min;
}
while(used.has(num));

used.add(num);

ticket[row][col]=num;

});

}

for(let col=0;col<9;col++){

let nums=[];

for(let row=0;row<3;row++){

if(ticket[row][col]!=="") nums.push(ticket[row][col]);

}

nums.sort((a,b)=>a-b);

let i=0;

for(let row=0;row<3;row++){

if(ticket[row][col]!==""){

ticket[row][col]=nums[i];
i++;

}

}

}

return ticket;

}

db.ref('calledNumbers').on('value',snap=>{

const called=Object.values(snap.val()||{});

if(data.seen) return;
if(data.type==='approved'){

showResultPopup(
'🏆 YOU WON!',
'Congratulations! Your bingo claim was successful.'
);
db.ref('playerAlerts/'+playerNameAlert).update({
seen:true
});
}

if(data.type==='denied'){

showResultPopup(
'❌ CLAIM UNSUCCESSFUL',
'Sorry, this claim was not approved. Please keep playing!'
);
db.ref('playerAlerts/'+playerNameAlert).update({
seen:true
});
}

});
let lastClaimTime = 0;

db.ref('liveClaimAlert').on('value',snap=>{

const data = snap.val();

if(!data) return;

if(data.time === lastClaimTime) return;

lastClaimTime = data.time;

const myName =
localStorage.getItem('playerName');

/* PLAY CLAIM SOUND */

const audio = new Audio(
'https://marvalous-bingo.netlify.app/bingo.mp3'
);

audio.volume = 1;

audio.play();

/* DON'T SHOW POPUP TO CLAIMER */

if(data.name === myName) return;

/* SHOW ALERT TO EVERYONE ELSE */

const popup=document.createElement('div');

popup.innerHTML=`
<div style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.82);
display:flex;
align-items:center;
justify-content:center;
z-index:999999;
">

<div style="
background:#1c1735;
border:3px solid #ffe066;
border-radius:24px;
padding:30px;
width:85%;
max-width:320px;
text-align:center;
box-shadow:0 0 35px #ffe066;
">

<div style="
font-size:42px;
margin-bottom:10px;
">
⚠️
</div>

<div style="
font-size:28px;
font-weight:900;
color:#ffe066;
margin-bottom:15px;
">
BINGO CLAIMED
</div>

<div style="
font-size:20px;
margin-bottom:25px;
color:white;
">
${data.name} has claimed bingo!
</div>

<button onclick="this.closest('div').parentElement.remove()" style="
border:none;
background:linear-gradient(45deg,#ff4df2,#b84dff);
color:white;
font-size:18px;
font-weight:700;
padding:12px 30px;
border-radius:14px;
cursor:pointer;
">
CLOSE
</button>

</div>
</div>
`;

document.body.appendChild(popup);

});
</script>

</body>
</html>
