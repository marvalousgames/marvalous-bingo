<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Marvalous Bingo 90</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:'Poppins',sans-serif;
background:
radial-gradient(circle at top,#4b0078 0%,#1a002e 45%,#050008 100%);
overflow:hidden;
height:100vh;
padding:10px;
color:white;
}

.page{
width:100%;
max-width:820px;
margin:auto;
height:calc(100vh - 20px);
display:flex;
flex-direction:column;
gap:10px;
}

/* LOGO */

.logo{
text-align:center;
flex-shrink:0;
}

.logo h1{
font-size:42px;
line-height:.88;
font-weight:900;
color:white;
text-shadow:
0 0 10px #ff4df2,
0 0 30px #ff4df2;
}

.logo p{
font-size:8px;
letter-spacing:4px;
margin-top:6px;
color:#49ffee;
}

/* STREAM */

.streamWrap{
background:#130022;
border:3px solid #c44dff;
border-radius:24px;
padding:8px;
box-shadow:0 0 20px rgba(255,0,255,.3);
flex-shrink:0;
}

.streamBox{
width:100%;
aspect-ratio:16/9;
overflow:hidden;
border-radius:18px;
background:black;
}

.streamBox iframe{
width:100%;
height:100%;
border:none;
}

/* CHAT */

.chatWrap{
background:#130022;
border:3px solid #c44dff;
border-radius:24px;
padding:10px;
box-shadow:0 0 20px rgba(255,0,255,.25);
flex-shrink:0;
}

#messages{
height:90px;
overflow-y:auto;
background:#050008;
border-radius:16px;
padding:12px;
margin-bottom:10px;
font-size:13px;
}

.msg{
margin-bottom:8px;
}

.msg b{
color:#49ffee;
}

.chatInputs{
display:grid;
grid-template-columns:1fr 1.3fr 90px;
gap:8px;
}

.chatInputs input{
height:42px;
border:none;
border-radius:14px;
background:#050008;
padding:0 12px;
color:white;
font-size:14px;
outline:none;
}

.chatInputs button{
border:none;
border-radius:14px;
background:linear-gradient(45deg,#b84dff,#ff4df2);
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
}

/* NUMBER */

.numberWrap{
text-align:center;
flex-shrink:0;
}

#currentNumber{
font-size:72px;
line-height:1;
font-weight:900;
color:white;
text-shadow:
0 0 10px #ff4df2,
0 0 28px #ff4df2;
}

#mode{
margin-top:4px;
font-size:16px;
font-weight:700;
color:#49ffee;
}

/* TICKETS */

#tickets{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
flex-shrink:0;
}

.ticket{
background:#090014;
border:3px solid #d94dff;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 15px rgba(255,0,255,.25);
}

.ticketGrid{
display:grid;
grid-template-columns:repeat(9,1fr);
}

.cell{
height:38px;
border-right:1px solid #c44dff;
border-bottom:1px solid #c44dff;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
font-weight:600;
background:#090014;
}

.ticketGrid .cell:nth-child(9n){
border-right:none;
}

.ticketGrid .cell:nth-last-child(-n+9){
border-bottom:none;
}

.blank{
color:transparent;
background:#090014;
}

.marked{
background:#37f4ff;
color:black;
font-weight:900;
box-shadow:0 0 16px #37f4ff inset;
}

/* CALLED BOARD */

#calledBoard{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:5px;
flex:1;
}

.calledNum{
height:34px;
background:#1a1735;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:600;
}

.calledActive{
background:linear-gradient(45deg,#c84dff,#ff4df2);
}

.latest{
background:#37f4ff !important;
color:black !important;
font-weight:900;
}

/* BINGO BUTTON */

.bingoBtn{
width:170px;
height:58px;
margin:auto;
border:none;
border-radius:18px;
background:linear-gradient(45deg,#28efff,#54f5ff);
color:black;
font-size:24px;
font-weight:900;
box-shadow:0 0 24px rgba(40,239,255,.7);
cursor:pointer;
flex-shrink:0;
}

</style>
</head>

<body>

<div class="page">

<div class="logo">
<h1>MARVALOUS BINGO</h1>
<p>REAL PEOPLE • REAL WINNERS</p>
</div>

<div class="streamWrap">
<div class="streamBox">

<iframe
src="https://player.twitch.tv/?channel=marvalouscomps&parent=bingo.netlify.app"
allowfullscreen>
</iframe>

</div>
</div>

<div class="chatWrap">

<div id="messages"></div>

<div class="chatInputs">

<input id="name" placeholder="Name">

<input id="msg" placeholder="Type message...">

<button onclick="sendMsg()">Send</button>

</div>

</div>

<div class="numberWrap">

<div id="currentNumber">-</div>

<div id="mode">Mode: 1 LINE</div>

</div>

<div id="tickets"></div>

<div id="calledBoard"></div>

<button class="bingoBtn" onclick="checkBingo()">
BINGO
</button>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyD-4DJXkJUhgxA4RBJoWnvDKtwpzx69eQQ",
databaseURL:"https://marvalous-bingo-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let playerName=localStorage.getItem('playerName')||'Player';

function generateTicket(){

const ranges=[
[1,9],[10,19],[20,29],[30,39],[40,49],
[50,59],[60,69],[70,79],[80,90]
];

let ticket=[
["","","","","","","","",""],
["","","","","","","","",""],
["","","","","","","","",""]
];

let used=new Set();

for(let row=0;row<3;row++){

let cols=[];

while(cols.length<5){

let col=Math.floor(Math.random()*9);

if(!cols.includes(col)) cols.push(col);

}

cols.sort((a,b)=>a-b);

cols.forEach(col=>{

let min=ranges[col][0];
let max=ranges[col][1];

let num;

do{
num=Math.floor(Math.random()*(max-min+1))+min;
}
while(used.has(num));

used.add(num);

ticket[row][col]=num;

});

}

for(let col=0;col<9;col++){

let nums=[];

for(let row=0;row<3;row++){

if(ticket[row][col]!=="") nums.push(ticket[row][col]);

}

nums.sort((a,b)=>a-b);

let i=0;

for(let row=0;row<3;row++){

if(ticket[row][col]!==""){

ticket[row][col]=nums[i];
i++;

}

}

}

return ticket;

}

let savedCards=localStorage.getItem('cards');

let cards=savedCards
?JSON.parse(savedCards)
:[
generateTicket(),
generateTicket(),
generateTicket(),
generateTicket()
];

if(cards.length<4){

cards.push(generateTicket());

}

localStorage.setItem('cards',JSON.stringify(cards));

function renderBoards(){

const wrap=document.getElementById('tickets');

wrap.innerHTML='';

cards.forEach(ticket=>{

let board=document.createElement('div');

board.className='ticket';

let grid=document.createElement('div');

grid.className='ticketGrid';

ticket.flat().forEach(n=>{

let div=document.createElement('div');

if(n===''){

div.className='cell blank';

}else{

div.className='cell';

div.innerText=n;

div.dataset.num=n;

}

grid.appendChild(div);

});

board.appendChild(grid);

wrap.appendChild(board);

});

}

renderBoards();

/* CALLED BOARD */

for(let i=1;i<=90;i++){

let div=document.createElement('div');

div.className='calledNum';

div.id='called-'+i;

div.innerText=i;

document.getElementById('calledBoard').appendChild(div);

}

/* CURRENT NUMBER */

db.ref('currentNumber').on('value',snap=>{

let num=snap.val();

if(num!==null){

document.getElementById('currentNumber').innerText=num;

}

});

/* MODE */

db.ref('mode').on('value',snap=>{

let mode=snap.val()||'1line';

document.getElementById('mode').innerText=
'Mode: '+(
mode==='1line'?'1 LINE':
mode==='2lines'?'2 LINES':
'FULL HOUSE'
);

});

/* MARK NUMBERS */

db.ref('calledNumbers').on('value',snap=>{

const called=Object.values(snap.val()||{});

document.querySelectorAll('.cell').forEach(c=>{

c.classList.remove('marked');

});

called.forEach(num=>{

document.querySelectorAll('.cell').forEach(c=>{

if(c.dataset.num==num){

c.classList.add('marked');

}

});

});

document.querySelectorAll('.calledNum').forEach(c=>{

c.classList.remove('calledActive');
c.classList.remove('latest');

});

called.forEach(num=>{

let ball=document.getElementById('called-'+num);

if(ball){

ball.classList.add('calledActive');

}

});

let latest=called[called.length-1];

if(latest){

let latestBall=document.getElementById('called-'+latest);

if(latestBall){

latestBall.classList.add('latest');

}

}

});

/* CHAT */

function sendMsg(){

let name=document.getElementById('name').value||'Player';

let msg=document.getElementById('msg').value;

if(!msg.trim()) return;

localStorage.setItem('playerName',name);

db.ref('chat').push({

name:name,
message:msg

});

document.getElementById('msg').value='';

}

db.ref('chat').limitToLast(50).on('child_added',snap=>{

let d=snap.val();

let div=document.createElement('div');

div.className='msg';

div.innerHTML='<b>'+d.name+':</b> '+d.message;

let box=document.getElementById('messages');

box.appendChild(div);

box.scrollTop=box.scrollHeight;

});

/* BINGO */

function checkBingo(){

db.ref('bingoClaims').push({

name:playerName,
time:Date.now()

});

alert('🎉 Bingo claimed!');

}

</script>

</body>
</html>
