<!DOCTYPE html>
<html>
<head>
  <title>Marvalous Bingo</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0e0b1f;
      color: white;
      text-align: center;
    }

    /* 🔥 NEW TITLE STYLE */
    #title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    #title h1 {
      color: #b84dff;
      font-size: 70px;
      margin: 0;
    }

    .title-logo {
      width: 80px; /* change this if you want smaller/bigger */
      height: auto;
      filter: drop-shadow(0 0 6px #b84dff);
    }

    /* 🔴 LIVE BOX (like your drawing) */
    #video-container {
      width: 90%;
      max-width: 500px;
      height: 40vh;
      background: #1c1735;
      margin: 20px auto;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(184,77,255,0.3);
      position: relative;
      overflow: hidden;
    }

    #offline-message {
      color: #ff4df2;
      font-size: 22px;
      font-weight: bold;
      z-index: 2;
    }

    #live-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    /* 🔢 CURRENT NUMBER */
    #currentNumber {
      font-size: 48px;
      margin: 20px 0;
      color: #ff4df2;
    }

    /* 🎯 BIGGER BOARD */
    #board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      padding: 15px;
      max-width: 520px;
      margin: 20px auto;
    }

    /* 🔲 BIG CELLS */
    .cell {
      background: #1c1735;
      padding: 28px;
      border-radius: 14px;
      font-weight: bold;
      font-size: 24px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .marked {
      background: #b84dff;
      color: white;
    }

    /* 🎮 BETTER BUTTON */
    button {
      background: linear-gradient(45deg, #b84dff, #ff4df2);
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      color: white;
      font-weight: bold;
      margin-top: 15px;
      font-size: 16px;
    }

  </style>
</head>

<body>

  <!-- 🔥 UPDATED TITLE WITH LOGOS -->
  <div id="title">
    <img src="logo.png" class="title-logo">
    <h1>MARVALOUS BINGO</h1>
    <img src="logo.png" class="title-logo">
  </div>

  <div id="video-container">
    <div id="offline-message">
      🔴 LIVE STARTING SOON...
    </div>

    <iframe 
      id="live-video"
      src="https://www.youtube.com/embed/live_stream?channel=UC3z0lJrQ7nF4UQ8c3S1n5Ww"
      allowfullscreen>
    </iframe>
  </div>

  <!-- 🔢 CURRENT NUMBER -->
  <div id="currentNumber">Waiting...</div>

  <!-- 🎯 BINGO BOARD -->
  <div id="board"></div>

  <!-- 🎮 HOST BUTTON -->
  <button onclick="callNumber()">CALL NUMBER</button>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD-4DJXkJUhgxA4RBJoWnvDKtwpzx69eQQ",
      authDomain: "marvalous-bingo.firebaseapp.com",
      databaseURL: "https://marvalous-bingo-default-rtdb.firebaseio.com",
      projectId: "marvalous-bingo",
      storageBucket: "marvalous-bingo.firebasestorage.app",
      messagingSenderId: "785335567662",
      appId: "1:785335567662:web:f06398c58a11e8b7c826bf"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function generateCard() {
      let nums = [];
      while (nums.length < 25) {
        let n = Math.floor(Math.random() * 75) + 1;
        if (!nums.includes(n)) nums.push(n);
      }
      return nums;
    }

    let card = generateCard();
    const board = document.getElementById("board");

    card.forEach(n => {
      let div = document.createElement("div");
      div.className = "cell";
      div.innerText = n;
      board.appendChild(div);
    });

    db.ref("currentNumber").on("value", (snap) => {
      let num = snap.val();
      if (num) {
        document.getElementById("currentNumber").innerText = num;

        document.querySelectorAll(".cell").forEach(c => {
          if (c.innerText == num) {
            c.classList.add("marked");
          }
        });
      }
    });

    function callNumber() {
      let num = Math.floor(Math.random() * 75) + 1;
      db.ref("currentNumber").set(num);
    }

    window.callNumber = callNumber;

    function checkLiveStatus() {
      const iframe = document.getElementById("live-video");
      const message = document.getElementById("offline-message");

      if (!iframe || !message) return;

      fetch("https://www.youtube.com/oembed?url=https://www.youtube.com/channel/UC3z0lJrQ7nF4UQ8c3S1n5Ww/live&format=json")
        .then(res => {
          if (res.ok) {
            iframe.style.display = "block";
            message.style.display = "none";
          } else {
            iframe.style.display = "none";
            message.style.display = "block";
          }
        })
        .catch(() => {});
    }

    setInterval(checkLiveStatus, 10000);
    checkLiveStatus();
  </script>

</body>
</html>
