<!DOCTYPE html>
<html>
<head>
  <title>Marvalous Bingo</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0e0b1f;
      color: white;
      text-align: center;
    }

    h1 {
      color: #b84dff;
      margin-top: 10px;
    }

    /* 🎥 VIDEO */
    #video-container {
      width: 95%;
      max-width: 700px;
      height: 320px;
      margin: 15px auto;
      border-radius: 15px;
      overflow: hidden;
      background: #1c1735;
      box-shadow: 0 0 25px rgba(184,77,255,0.4);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* 💬 CHAT */
    #chat-box {
      width: 95%;
      max-width: 700px;
      margin: 10px auto;
      background: #1c1735;
      border-radius: 15px;
      padding: 10px;
    }

    #messages {
      height: 180px;
      overflow-y: auto;
      text-align: left;
      padding: 10px;
      font-size: 14px;
    }

    .msg {
      margin-bottom: 6px;
    }

    .msg b {
      color: #00ffcc;
    }

    #chat-input {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    #chat-input input {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: none;
    }

    #chat-input button {
      background: #b84dff;
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
    }

    /* 🔢 NUMBER */
    #currentNumber {
      font-size: 46px;
      margin: 15px 0;
      color: #ff4df2;
    }

    #mode {
      color: #00ffcc;
      margin-bottom: 10px;
    }

    /* 🎯 BINGO BOARD */
    #board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      max-width: 600px;
      margin: auto;
      border: 4px solid #b84dff;
      border-radius: 12px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(45deg, #b84dff, #7a2cff);
      font-weight: bold;
      font-size: 22px;
      padding: 12px;
      border-right: 2px solid #0e0b1f;
    }

    .cell {
      background: #1c1735;
      padding: 28px;
      font-size: 22px;
      border: 1px solid #0e0b1f;
      cursor: pointer;
    }

    .marked {
      background: linear-gradient(45deg, #b84dff, #ff4df2);
    }

    .free {
      background: #00ffcc;
      color: black;
      font-weight: bold;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      background: #00ffcc;
      font-weight: bold;
    }

    #winner {
      display: none;
      background: #00ffcc;
      color: black;
      padding: 10px;
      margin-top: 10px;
    }

    /* 👤 NAME POPUP */
    #nameModal {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.9);
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    #nameModal input {
      padding:10px;
      border-radius:8px;
      border:none;
      width:200px;
    }

    #nameModal button {
      margin-top:10px;
      background:#b84dff;
      color:white;
    }

  </style>
</head>

<body>

<!-- 👤 NAME POPUP -->
<div id="nameModal">
  <div style="background:#1c1735;padding:25px;border-radius:12px;">
    <h2>Enter Your Name</h2>
    <input id="playerNameInput" placeholder="Your name">
    <br>
    <button onclick="saveName()">Join Game</button>
  </div>
</div>

<h1>MARVALOUS BINGO</h1>

<!-- 🎥 TWITCH -->
<div id="video-container">
  <iframe 
    src="https://player.twitch.tv/?channel=marvalouscomps&parent=marvalous-bingo.netlify.app"
    allowfullscreen>
  </iframe>
</div>

<!-- 💬 CHAT -->
<div id="chat-box">
  <div id="messages"></div>

  <div id="chat-input">
    <input id="msg" placeholder="Type message...">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<div id="currentNumber">Waiting...</div>
<div id="mode">Mode: 1 LINE</div>

<div id="winner">🎉 WE HAVE A WINNER 🎉</div>

<div id="board"></div>

<button onclick="checkBingo()">BINGO</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD-4DJXkJUhgxA4RBJoWnvDKtwpzx69eQQ",
  databaseURL: "https://marvalous-bingo-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 👤 PLAYER NAME */
let playerName = localStorage.getItem("bingoName");

if (playerName) {
  document.getElementById("nameModal").style.display = "none";
}

function saveName() {
  let name = document.getElementById("playerNameInput").value.trim();
  if (!name) return alert("Enter your name");

  playerName = name;
  localStorage.setItem("bingoName", name);
  document.getElementById("nameModal").style.display = "none";
}

/* 🎯 CARD */
function generateCard() {
  function getNumbers(min, max, count) {
    let nums = [];
    while (nums.length < count) {
      let n = Math.floor(Math.random() * (max - min + 1)) + min;
      if (!nums.includes(n)) nums.push(n);
    }
    return nums;
  }

  let card = [];
  let B = getNumbers(1,15,5);
  let I = getNumbers(16,30,5);
  let N = getNumbers(31,45,4);
  let G = getNumbers(46,60,5);
  let O = getNumbers(61,75,5);

  for (let i=0;i<5;i++){
    card.push(B[i],I[i], i===2?"FREE":N[i>2?i-1:i],G[i],O[i]);
  }

  return card;
}

let saved = localStorage.getItem("card");
let card = saved ? JSON.parse(saved) : generateCard();
localStorage.setItem("card", JSON.stringify(card));

const board = document.getElementById("board");

["B","I","N","G","O"].forEach(l=>{
  let h=document.createElement("div");
  h.className="header";
  h.innerText=l;
  board.appendChild(h);
});

card.forEach(n=>{
  let d=document.createElement("div");

  if(n==="FREE"){
    d.className="cell free marked";
    d.innerText="FREE";
  } else {
    d.className="cell";
    d.innerText=n;
    d.onclick=()=>d.classList.toggle("marked");
  }

  board.appendChild(d);
});

/* 🔢 LISTENERS */
db.ref("currentNumber").on("value",snap=>{
  let num=snap.val();
  if(!num)return;
  document.getElementById("currentNumber").innerText=num;

  document.querySelectorAll(".cell").forEach(c=>{
    if(c.innerText==num)c.classList.add("marked");
  });
});

db.ref("mode").on("value",snap=>{
  let m=snap.val()||"1line";
  document.getElementById("mode").innerText="Mode: "+m.toUpperCase();
});

db.ref("winner").on("value",snap=>{
  if(snap.val())document.getElementById("winner").style.display="block";
});

/* 🎯 BINGO */
function checkBingo(){
  if(!playerName) return alert("Enter name first");

  db.ref("bingoClaims").push({
    name: playerName,
    time: Date.now()
  });

  alert("Bingo submitted!");
}

/* 💬 CHAT */
function sendMsg(){
  if(!playerName) return;

  let msg=document.getElementById("msg").value;
  if(!msg)return;

  db.ref("chat").push({
    name: playerName,
    message: msg
  });

  document.getElementById("msg").value="";
}

db.ref("chat").limitToLast(50).on("child_added",snap=>{
  let d=snap.val();
  let div=document.createElement("div");
  div.className="msg";
  div.innerHTML="<b>"+d.name+":</b> "+d.message;

  let m=document.getElementById("messages");
  m.appendChild(div);
  m.scrollTop=m.scrollHeight;
});
</script>

</body>
</html>
