  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0e0b1f;
      color: white;
      text-align: center;
    }

    /* 🔥 NEW TITLE STYLE */
    #title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    #title h1 {
      color: #b84dff;
      font-size: 70px;
      margin: 0;
    }

    .title-logo {
      width: 85px; /* ⬅️ slightly bigger like you wanted */
      height: auto;
      filter: drop-shadow(0 0 6px #b84dff);
    }

    /* 🔴 LIVE BOX */
    #video-container {
      width: 90%;
      max-width: 500px;
      height: 40vh;
      background: #1c1735;
      margin: 20px auto;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(184,77,255,0.3);
      position: relative;
      overflow: hidden;
    }

    #offline-message {
      color: #ff4df2;
      font-size: 22px;
      font-weight: bold;
      z-index: 2;
    }

    #live-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    /* 🔢 CURRENT NUMBER */
    #currentNumber {
      font-size: 48px;
      margin: 20px 0;
      color: #ff4df2;
    }

    /* 🎯 BOARD */
    #board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      padding: 15px;
      max-width: 520px;
      margin: 20px auto;
    }

    /* 🔲 CELLS */
    .cell {
      background: #1c1735;
      padding: 28px;
      border-radius: 14px;
      font-weight: bold;
      font-size: 24px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .marked {
      background: #b84dff;
      color: white;
    }

    /* 🎮 BUTTON */
    button {
      background: linear-gradient(45deg, #b84dff, #ff4df2);
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      color: white;
      font-weight: bold;
      margin-top: 15px;
      font-size: 16px;
    }

  </style>
</head>
