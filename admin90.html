<!DOCTYPE html>
<html>
<head>
  <title>Marvalous Bingo 90</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    body{
      margin:0;
      font-family:'Poppins',sans-serif;
      background:#0e0b1f;
      color:white;
      text-align:center;
    }

    h1{
      color:#b84dff;
      margin-top:10px;
    }

    #video-container{
      width:95%;
      max-width:700px;
      height:320px;
      margin:15px auto;
      border-radius:15px;
      overflow:hidden;
      background:#1c1735;
      box-shadow:0 0 25px rgba(184,77,255,0.4);
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
    }

    #chat-box{
      width:95%;
      max-width:700px;
      margin:10px auto;
      background:#1c1735;
      border-radius:15px;
      padding:10px;
    }

    #messages{
      height:180px;
      overflow-y:auto;
      text-align:left;
      padding:10px;
      font-size:14px;
    }

    .msg{
      margin-bottom:6px;
    }

    .msg b{
      color:#00ffcc;
    }

    #chat-input{
      display:flex;
      gap:6px;
      margin-top:8px;
    }

    #chat-input input{
      flex:1;
      padding:8px;
      border-radius:8px;
      border:none;
    }

    #chat-input button{
      background:#b84dff;
      border:none;
      color:white;
      padding:8px 12px;
      border-radius:8px;
    }

    #currentNumber{
      font-size:56px;
      margin:15px 0;
      color:#ff4df2;
    }

    #mode{
      color:#00ffcc;
      margin-bottom:15px;
      font-size:18px;
    }

    .ticket{
      display:grid;
      grid-template-columns:repeat(9,1fr);
      gap:2px;
      max-width:700px;
      margin:15px auto;
      background:#b84dff;
      padding:3px;
      border-radius:12px;
      overflow:hidden;
    }

    .cell{
      background:#1c1735;
      min-height:58px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      cursor:pointer;
    }

    .blank{
      background:#120d28;
      cursor:default;
    }

    .marked{
      background:linear-gradient(45deg,#b84dff,#ff4df2);
      color:white;
      font-weight:bold;
    }

    button{
      margin-top:15px;
      padding:12px 20px;
      border-radius:10px;
      border:none;
      background:#00ffcc;
      font-weight:bold;
    }

    #nameModal{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.9);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:9999;
    }

    #modalBox{
      background:#1c1735;
      padding:20px;
      border-radius:12px;
      width:80%;
      max-width:300px;
    }

  </style>
</head>

<body>

<div id="nameModal">

  <div id="modalBox">

    <h2 style="color:#b84dff;">
      Enter your name
    </h2>

    <input id="modalName" placeholder="Your name"
    style="
      width:100%;
      padding:10px;
      border:none;
      border-radius:8px;
      margin-top:10px;
    ">

    <button onclick="saveName()"
    style="
      width:100%;
    ">
      Join Game
    </button>

  </div>

</div>

<h1>MARVALOUS BINGO</h1>

<div id="video-container">

  <iframe
    src="https://player.twitch.tv/?channel=marvalouscomps&parent=bingo.netlify.app">
  </iframe>

</div>

<div id="chat-box">

  <div id="messages"></div>

  <div id="chat-input">

    <input id="name" placeholder="Name">

    <input id="msg" placeholder="Type message...">

    <button onclick="sendMsg()">
      Send
    </button>

  </div>

</div>

<div id="currentNumber">
  Waiting...
</div>

<div id="mode">
  Mode: 1 LINE
</div>

<div id="tickets"></div>

<button onclick="checkBingo()">
  BINGO
</button>

<script>

const firebaseConfig = {
  apiKey:"AIzaSyD-4DJXkJUhgxA4RBJoWnvDKtwpzx69eQQ",
  databaseURL:"https://marvalous-bingo-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* PLAYER */

let playerName = localStorage.getItem("playerName") || "Player";

let playerId = localStorage.getItem("playerId");

if(!playerId){

  playerId = Date.now().toString();

  localStorage.setItem("playerId",playerId);

}

/* GENERATE 90 BALL TICKETS */

function generateTicket(){

  let ticket = Array(27).fill("");

  let used = [];

  for(let row=0;row<3;row++){

    let cols=[];

    while(cols.length<5){

      let c=Math.floor(Math.random()*9);

      if(!cols.includes(c)) cols.push(c);

    }

    cols.sort((a,b)=>a-b);

    cols.forEach(col=>{

      let min = col*10+1;
      let max = col===8 ? 90 : col*10+10;

      let num;

      do{
        num=Math.floor(Math.random()*(max-min+1))+min;
      }while(used.includes(num));

      used.push(num);

      ticket[row*9+col]=num;

    });

  }

  return ticket;

}

function generateTickets(){

  return [
    generateTicket(),
    generateTicket(),
    generateTicket()
  ];

}

/* LOAD */

let saved = localStorage.getItem("tickets");

let tickets = saved
? JSON.parse(saved)
: generateTickets();

renderTickets();

/* GAME SYNC */

let currentGameId;

db.ref("gameId").on("value",snap=>{

  let gameId=snap.val();

  if(!gameId)return;

  if(currentGameId!==gameId){

    currentGameId=gameId;

    let savedGame=localStorage.getItem("gameId");

    if(savedGame!==String(gameId)){

      tickets=generateTickets();

      localStorage.setItem(
        "tickets",
        JSON.stringify(tickets)
      );

      localStorage.setItem(
        "gameId",
        gameId
      );

      location.reload();

    }

    db.ref("players/"+playerId).set({

      name:playerName,

      card:tickets

    });

  }

});

/* RENDER */

function renderTickets(){

  const wrap=document.getElementById("tickets");

  wrap.innerHTML="";

  tickets.forEach((ticket,t)=>{

    let html=`<div class="ticket">`;

    ticket.forEach(n=>{

      html += `
        <div class="cell ${n==="" ? "blank" : ""}">
          ${n}
        </div>
      `;

    });

    html += `</div>`;

    wrap.innerHTML += html;

  });

}

/* AUTO MARK */

db.ref("calledNumbers").on("value",snap=>{

  let called=Object.values(snap.val() || {});

  document.querySelectorAll(".cell").forEach(c=>{

    let n=Number(c.innerText);

    if(called.includes(n)){

      c.classList.add("marked");

    }

  });

});

/* SPEAK */

let lastCalled=null;

db.ref("currentNumber").on("value",snap=>{

  let num=snap.val();

  if(!num)return;

  document.getElementById("currentNumber")
  .innerText=num;

  if(lastCalled!==num){

    lastCalled=num;

    let speech=
    new SpeechSynthesisUtterance(num);

    speech.rate=0.9;

    speechSynthesis.cancel();

    speechSynthesis.speak(speech);

  }

});

/* MODE */

db.ref("mode").on("value",snap=>{

  let mode=snap.val() || "1line";

  document.getElementById("mode")
  .innerText=
  "Mode: "+
  (
    mode==="1line"
    ? "1 LINE"
    : mode==="2lines"
    ? "2 LINES"
    : "FULL HOUSE"
  );

});

/* CHAT */

function sendMsg(){

  let name=
  document.getElementById("name").value
  || "Player";

  let msg=
  document.getElementById("msg").value;

  if(!msg)return;

  localStorage.setItem(
    "playerName",
    name
  );

  db.ref("chat").push({

    name:name,

    message:msg

  });

  document.getElementById("msg").value="";

}

db.ref("chat")
.limitToLast(50)
.on("child_added",snap=>{

  let d=snap.val();

  let div=document.createElement("div");

  div.className="msg";

  div.innerHTML=
  "<b>"+d.name+":</b> "+d.message;

  let box=document.getElementById("messages");

  box.appendChild(div);

  box.scrollTop=box.scrollHeight;

});

/* CLAIM */

function checkBingo(){

  db.ref("bingoClaims").push({

    name:playerName,

    time:Date.now()

  });

  alert("🎉 Bingo claimed!");

}

/* NAME MODAL */

window.onload=()=>{

  let modal=document.getElementById("nameModal");

  let saved=
  localStorage.getItem("playerName");

  if(saved){

    document.getElementById("name").value=saved;

    modal.style.display="none";

  }

};

function saveName(){

  let name=
  document.getElementById("modalName")
  .value
  .trim();

  if(!name){

    alert("Enter name");

    return;

  }

  localStorage.setItem(
    "playerName",
    name
  );

  playerName=name;

  document.getElementById("name").value=name;

  document.getElementById("nameModal")
  .style.display="none";

  db.ref("players/"+playerId).set({

    name:playerName,

    card:tickets

  });

}

</script>

</body>
</html>
