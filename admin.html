<!DOCTYPE html>
<html>
<head>
  <title>Bingo Admin</title>
</head>

<body style="background:#0e0b1f;color:white;text-align:center;font-family:Arial;">

<h1>BINGO ADMIN</h1>

<h2 id="current">Current: 0</h2>

<button onclick="callNumber()">CALL NEXT</button>
<button onclick="resetGame()">RESET</button>

<div id="claims"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD-4DJXkJUhgxA4RBJoWnvDKtwpzx69eQQ",
  databaseURL: "https://marvalous-bingo-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let called = [];

/* CALL NUMBER */
function callNumber() {
  let num;
  do {
    num = Math.floor(Math.random() * 75) + 1;
  } while (called.includes(num));

  called.push(num);

  db.ref("currentNumber").set(num);
}

/* RESET */
function resetGame() {
  db.ref("calledNumbers").remove();
  db.ref("bingoClaims").remove();
  db.ref("players").remove();

  db.ref("currentNumber").set(0);
  db.ref("winner").set(false);

  alert("Reset done");
}

/* CURRENT */
db.ref("currentNumber").on("value", snap => {
  document.getElementById("current").innerText =
    "Current: " + (snap.val() || 0);
});

/* CLAIMS */
db.ref("bingoClaims").on("value", snap => {
  let data = snap.val() || {};
  let html = "";

  Object.values(data).forEach(c => {
    html += "<p>" + c.name + "</p>";
  });

  document.getElementById("claims").innerHTML = html;
});
</script>

</body>
</html>
