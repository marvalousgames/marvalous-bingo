<!DOCTYPE html>
<html>
<head>
  <title>Bingo Admin</title>

  <style>
    body {
      background:#0e0b1f;
      color:white;
      font-family:sans-serif;
      text-align:center;
    }

    h1 { color:#b84dff; }

    button {
      padding:10px 15px;
      margin:5px;
      border:none;
      border-radius:8px;
      background:#00ffcc;
      font-weight:bold;
      cursor:pointer;
    }

    .panel {
      background:#1c1735;
      padding:15px;
      margin:10px;
      border-radius:10px;
    }

    .card {
      display:grid;
      grid-template-columns:repeat(5,1fr);
      max-width:250px;
      margin:10px auto;
      gap:3px;
    }

    .cell {
      background:#222;
      padding:8px;
      font-size:14px;
    }

    #selectedPlayer {
      display:none;
      background:#2a214f;
      padding:20px;
      margin:15px;
      border-radius:10px;
    }

    #calledNumbers {
      font-size:14px;
      margin-top:10px;
      opacity:0.8;
    }
  </style>
</head>

<body>

<h1>🎯 BINGO ADMIN</h1>

<!-- CURRENT NUMBER -->
<div class="panel">
  <h2 id="current">Current: -</h2>
  <button onclick="callNumber()">CALL NEXT</button>
  <div id="calledNumbers"></div>
</div>

<!-- MODE -->
<div class="panel">
  <h2>Game Mode</h2>
  <button onclick="setMode('1line')">1 Line</button>
  <button onclick="setMode('2lines')">2 Lines</button>
  <button onclick="setMode('fullhouse')">Full House</button>
</div>

<!-- CLAIMS -->
<div class="panel">
  <h2>Bingo Claims</h2>
  <div id="claims"></div>
</div>

<!-- SELECTED PLAYER -->
<div id="selectedPlayer">
  <h2 id="selectedName"></h2>
  <div id="selectedCard" class="card"></div>
  <button onclick="approveWin()">APPROVE WINNER</button>
</div>

<!-- PLAYERS -->
<div class="panel">
  <h2>All Players</h2>
  <div id="players"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD-4DJXkJUhgxA4RBJoWnvDKtwpzx69eQQ",
  databaseURL: "https://marvalous-bingo-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 🔊 SPEAK NUMBER */
function speak(text) {
  let msg = new SpeechSynthesisUtterance(text);
  msg.rate = 0.9;
  msg.pitch = 1;
  speechSynthesis.speak(msg);
}

/* 🎯 CALL NUMBER */
function callNumber() {
  db.ref("calledNumbers").once("value").then(snap => {
    let called = snap.val() || [];

    let num;
    do {
      num = Math.floor(Math.random()*75)+1;
    } while (called.includes(num));

    called.push(num);

    db.ref("calledNumbers").set(called);
    db.ref("currentNumber").set(num);

    // 🔊 SPEAK IT
    speak("Number " + num);
  });
}

/* 🎮 MODE */
function setMode(mode) {
  db.ref("mode").set(mode);
}

/* CURRENT NUMBER */
db.ref("currentNumber").on("value", snap => {
  document.getElementById("current").innerText =
    "Current: " + snap.val();
});

/* CALLED NUMBERS LIST */
db.ref("calledNumbers").on("value", snap => {
  let nums = snap.val() || [];
  document.getElementById("calledNumbers").innerText =
    "Called: " + nums.join(", ");
});

/* CLAIMS */
db.ref("bingoClaims").on("value", snap => {
  let data = snap.val() || {};
  let html = "";

  Object.entries(data).forEach(([id, claim]) => {
    html += `
      <div>
        ${claim.name}
        <button onclick="checkCard('${claim.playerId}')">CHECK</button>
      </div>
    `;
  });

  document.getElementById("claims").innerHTML = html;
});

/* SHOW PLAYER CARD */
function checkCard(playerId) {
  db.ref("players/" + playerId).once("value").then(snap => {
    let player = snap.val();

    document.getElementById("selectedPlayer").style.display = "block";
    document.getElementById("selectedName").innerText = player.name;

    let html = player.card.map(n =>
      `<div class="cell">${n}</div>`
    ).join("");

    document.getElementById("selectedCard").innerHTML = html;

    window.scrollTo({ top: 0, behavior: "smooth" });
  });
}

/* APPROVE WIN */
function approveWin() {
  db.ref("winner").set(true);
  alert("Winner approved!");
}

/* PLAYERS LIST */
db.ref("players").on("value", snap => {
  let data = snap.val() || {};
  let html = "";

  Object.values(data).forEach(player => {
    html += `
      <div>
        <b>${player.name}</b>
      </div>
    `;
  });

  document.getElementById("players").innerHTML = html;
});
</script>

</body>
</html>
